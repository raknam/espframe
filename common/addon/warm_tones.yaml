# =============================================================================
# WARM TONES - Sun-based display color temperature
# =============================================================================
# Shifts displayed photos toward warm tones (reduced blue, slight red boost)
# as sunset approaches, mimicking the golden hour effect. Uses the existing
# sunrise/sunset globals from backlight_schedule.yaml.
#
# The warmth curve ramps linearly over 60 minutes before sunset, stays full
# warm through the night, then ramps back to neutral over 60 minutes after
# sunrise. The tint is applied directly to the RGB565 image buffer after
# accent color extraction, using precomputed lookup tables for speed.
#
# The "Turn on until sunrise" switch forces full warmth immediately and
# auto-disables after sunrise the next morning.
# =============================================================================

# -----------------------------------------------------------------------------
# Last applied warmth (for retint skip) and retint flag
# -----------------------------------------------------------------------------
globals:
  - id: warm_tone_last_w
    type: float
    initial_value: '0.0f'
  - id: warm_tone_retint
    type: bool
    initial_value: 'false'

# -----------------------------------------------------------------------------
# Switches: base tone (display blue correction), night tone (sun-based), override (warm until sunrise)
# -----------------------------------------------------------------------------
switch:
  # Base tone: correct display blue cast (manual warm tint)
  - platform: template
    name: "Screen: Tone Adjustment"
    id: base_tone_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:palette"
    on_turn_on:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones
    on_turn_off:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones

  # Night tone: sun-based ramp (sunset → sunrise) when enabled
  - platform: template
    name: "Screen: Night Tone Adjustment"
    id: warm_tones_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:weather-sunset"

  # Override: force full warmth now; auto-off after next sunrise (interval below)
  - platform: template
    name: "Screen: Warm Tone Override"
    id: warm_tone_override
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:weather-night"
    on_turn_on:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones
    on_turn_off:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones

# -----------------------------------------------------------------------------
# Numbers: base tone strength (0–100%), night warmth intensity (10–100%)
# -----------------------------------------------------------------------------
number:
  # Base tone strength (0–100%); used only when "Tone Adjustment" is on
  - platform: template
    name: "Screen: Display Tone"
    id: base_tone
    internal: true
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 0
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:thermometer"
    on_value:
      then:
        - lambda: 'id(warm_tone_retint) = true;'
        - script.execute: apply_warm_tones

  # Night/override warmth strength (10–100%); scales the sun-based or override amount
  - platform: template
    name: "Screen: Warm Tone Intensity"
    id: warm_tone_intensity
    internal: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 50
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:palette"

# -----------------------------------------------------------------------------
# Apply warmth to current image buffer (LUT-based RGB565 tint; portrait pair or single slot)
# -----------------------------------------------------------------------------
script:
  - id: apply_warm_tones
    mode: restart
    then:
      - lambda: |-
          bool retint = id(warm_tone_retint);
          id(warm_tone_retint) = false;

          // Base tone: correction for display blue cast (only when enabled)
          float base_w = id(base_tone_enabled).state ? (id(base_tone).state / 100.0f) : 0.0f;

          // Night warmth: sun-based or manual override
          float night_w = 0.0f;
          bool override_on = id(warm_tone_override).state;
          if (override_on) {
            night_w = id(warm_tone_intensity).state / 100.0f;
          } else if (id(warm_tones_enabled).state && id(sunrise_sunset_valid)) {
            auto now = id(sntp_time).now();
            if (!now.is_valid() && base_w < 0.01f) return;
            if (now.is_valid()) {
              int now_min = now.hour * 60 + now.minute;
              int rise_min = id(sunrise_hour) * 60 + id(sunrise_minute);
              int set_min  = id(sunset_hour)  * 60 + id(sunset_minute);
              float warmth = 0.0f;
              if (now_min >= set_min) {
                warmth = 1.0f;
              } else if (now_min >= set_min - WARM_TONE_LEAD_MINUTES) {
                warmth = (float)(now_min - (set_min - WARM_TONE_LEAD_MINUTES)) / WARM_TONE_LEAD_MINUTES;
              } else if (now_min < rise_min) {
                warmth = 1.0f;
              } else if (now_min < rise_min + WARM_TONE_LEAD_MINUTES) {
                warmth = 1.0f - (float)(now_min - rise_min) / WARM_TONE_LEAD_MINUTES;
              }
              night_w = warmth * (id(warm_tone_intensity).state / 100.0f);
            }
          }

          float w = base_w + night_w;

          // When called from a toggle change, buffer already has a tint applied.
          // When called from the normal pipeline (new image), buffer is fresh.
          float last_w = retint ? id(warm_tone_last_w) : 0.0f;

          // Skip if the buffer already has the target warmth applied
          if (fabsf(w - last_w) < 0.01f) return;

          // Integer-only log (no %f / _dtoa_r) — warmth is ~0..1
          int last_c = (int)(last_w * 100.0f + 0.5f);
          int w_c = (int)(w * 100.0f + 0.5f);
          if (last_c > 100) last_c = 100;
          if (w_c > 100) w_c = 100;
          ESP_LOGI("warm", "Warmth=%d.%02d->%d.%02d (intensity=%d%%)",
                   last_c / 100, last_c % 100, w_c / 100, w_c % 100, (int)id(warm_tone_intensity).state);

          // Build transition LUTs: undo last_w, apply new w in a single step.
          // For each channel value in the buffer (which has last_w baked in),
          // recover the original value then apply the new w.
          float r_undo = (last_w > 0.005f) ? 1.0f / (1.0f + last_w * 0.06f) : 1.0f;
          float g_undo = (last_w > 0.005f) ? 1.0f / (1.0f - last_w * 0.07f) : 1.0f;
          float b_undo = (last_w > 0.005f) ? 1.0f / (1.0f - last_w * 0.28f) : 1.0f;
          float r_apply = 1.0f + w * 0.06f;
          float g_apply = 1.0f - w * 0.07f;
          float b_apply = 1.0f - w * 0.28f;

          uint8_t r_lut[32], g_lut[64], b_lut[32];
          for (int i = 0; i < 32; i++) {
            int v = (i << 3) | (i >> 2);
            int nv = (int)(v * r_undo * r_apply);
            r_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 3);
          }
          for (int i = 0; i < 64; i++) {
            int v = (i << 2) | (i >> 4);
            int nv = (int)(v * g_undo * g_apply);
            g_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 2);
          }
          for (int i = 0; i < 32; i++) {
            int v = (i << 3) | (i >> 2);
            int nv = (int)(v * b_undo * b_apply);
            b_lut[i] = (uint8_t)((nv > 255 ? 255 : (nv < 0 ? 0 : nv)) >> 3);
          }

          auto tint_buffer = [&](esphome::image::Image *img) {
            if (!img) return;
            lv_img_dsc_t *dsc = img->get_lv_img_dsc();
            if (!dsc || !dsc->data) return;
            uint8_t *buf = const_cast<uint8_t*>(dsc->data);
            int total = img->get_width() * img->get_height();
            for (int i = 0; i < total; i++) {
              int pos = i * 2;
              uint16_t px = buf[pos] | (buf[pos + 1] << 8);
              uint8_t r5 = r_lut[(px >> 11) & 0x1F];
              uint8_t g6 = g_lut[(px >> 5) & 0x3F];
              uint8_t b5 = b_lut[px & 0x1F];
              uint16_t out = (r5 << 11) | (g6 << 5) | b5;
              buf[pos]     = out & 0xFF;
              buf[pos + 1] = (out >> 8) & 0xFF;
            }
          };

          if (id(immich_is_portrait_pair)) {
            if (id(portrait_using_preload)) {
              tint_buffer(id(immich_portrait_preload_left));
              tint_buffer(id(immich_portrait_preload_right));
            } else {
              tint_buffer(id(immich_portrait_left));
              tint_buffer(id(immich_portrait_right));
            }
            lv_obj_invalidate(id(portrait_pair_container));
          } else {
            int s = id(active_slot);
            esphome::image::Image *img = (s == 0) ? id(immich_img_0)
                                       : (s == 1) ? id(immich_img_1)
                                       :            id(immich_img_2);
            tint_buffer(img);
            lv_obj_invalidate(id(slideshow_img));
          }

          id(warm_tone_last_w) = w;

# -----------------------------------------------------------------------------
# Override auto-off: turn off "Warm until sunrise" when sunrise has passed
# -----------------------------------------------------------------------------
interval:
  - interval: 60s
    then:
      - lambda: |-
          if (!id(warm_tone_override).state) return;
          if (!id(sunrise_sunset_valid)) return;
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;
          int now_min = now.hour * 60 + now.minute;
          int rise_min = id(sunrise_hour) * 60 + id(sunrise_minute);
          int set_min  = id(sunset_hour)  * 60 + id(sunset_minute);
          bool past_sunrise = (now_min >= rise_min && now_min < set_min);
          if (past_sunrise) {
            ESP_LOGI("warm", "Override auto-off: sunrise passed");
            id(warm_tone_override).turn_off();
          }
