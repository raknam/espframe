# =============================================================================
# IMMICH FILTER - Photo source selection and filtering
# =============================================================================
# Controls which photos the frame displays: all photos, favorites only,
# specific albums, or specific people. Values persist across reboots via NVS.
# =============================================================================

# -----------------------------------------------------------------------------
# Photo source (All / Favorites / Album / Person / Memories)
# -----------------------------------------------------------------------------
select:
  - platform: template
    name: "Photos: Source"
    id: photo_source_select
    options:
      - "All Photos"
      - "Favorites"
      - "Album"
      - "Person"
      - "Memories"
    initial_option: "All Photos"
    optimistic: true
    restore_value: true
    icon: "mdi:image-filter-frames"
    web_server:
      sorting_group_id: sg_photos
    on_value:
      then:
        - lambda: 'ESP_LOGI("immich", "Photo source: %s", x.c_str());'
        - script.execute: auto_apply_photo_source

# -----------------------------------------------------------------------------
# Date range filter (optional, YYYY-MM-DD; empty = no bound)
# -----------------------------------------------------------------------------
text:
  - platform: template
    name: "Photos: Date From"
    id: immich_date_from
    internal: true
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 10
    mode: text
    icon: "mdi:calendar-start"
    set_action:
      - lambda: |-
          id(immich_date_from).publish_state(x);
          ESP_LOGI("immich", "Date From configured: %s", x.c_str());
      - script.execute: auto_apply_photo_source

  - platform: template
    name: "Photos: Date To"
    id: immich_date_to
    internal: true
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 10
    mode: text
    icon: "mdi:calendar-end"
    set_action:
      - lambda: |-
          id(immich_date_to).publish_state(x);
          ESP_LOGI("immich", "Date To configured: %s", x.c_str());
      - script.execute: auto_apply_photo_source

# -----------------------------------------------------------------------------
# Album IDs and Person IDs (used when source is Album or Person)
# -----------------------------------------------------------------------------
  - platform: template
    name: "Photos: Album IDs"
    id: immich_album_ids
    internal: true
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 255
    mode: text
    icon: "mdi:folder-image"
    web_server:
      sorting_group_id: sg_photos
    set_action:
      - lambda: |-
          std::string v = decode_url_commas(x);
          id(immich_album_ids).publish_state(v);
          ESP_LOGI("immich", "Album IDs configured (%d chars)", v.length());
      - script.execute: auto_apply_photo_source

  - platform: template
    name: "Photos: Person IDs"
    id: immich_person_ids
    internal: true
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 255
    mode: text
    icon: "mdi:account-group"
    web_server:
      sorting_group_id: sg_photos
    set_action:
      - lambda: |-
          std::string v = decode_url_commas(x);
          id(immich_person_ids).publish_state(v);
          ESP_LOGI("immich", "Person IDs configured (%d chars)", v.length());
      - script.execute: auto_apply_photo_source

# -----------------------------------------------------------------------------
# Manual apply and auto-apply (flush slots and refetch)
# -----------------------------------------------------------------------------
button:
  - platform: template
    name: "Apply Photo Source"
    id: apply_photo_source
    internal: true
    icon: "mdi:check-circle"
    web_server:
      sorting_group_id: sg_photos
    on_press:
      - script.stop: auto_apply_photo_source
      - lambda: 'ESP_LOGI("immich", "Photo source applied — flushing all slots");'
      - script.execute: flush_slots_and_refetch

# -----------------------------------------------------------------------------
# Delayed auto-apply after source/album/person change
# -----------------------------------------------------------------------------
script:
  - id: flush_slots_and_refetch
    mode: single
    then:
      - lambda: |-
          id(slot0).ready = false;
          id(slot1).ready = false;
          id(slot2).ready = false;
          id(portrait_preload_slot) = -1;
          id(portrait_preload_left_ready) = false;
          id(portrait_preload_right_ready) = false;
          if (id(preload_noncritical_in_flight)) {
            id(preload_noncritical_in_flight) = false;
            if (id(noncritical_remote_updates_in_flight) > 0) id(noncritical_remote_updates_in_flight)--;
          }
          id(active_slot_displayed) = false;
          id(target_slot) = id(active_slot);
      - script.execute: immich_fetch_into_slot

  - id: auto_apply_photo_source
    mode: restart
    then:
      - delay: 1s
      - lambda: 'ESP_LOGI("immich", "Photo source auto-applied — flushing all slots");'
      - script.execute: flush_slots_and_refetch
