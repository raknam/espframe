# =============================================================================
# IMMICH SLIDESHOW - Ring buffer, display, and navigation
# =============================================================================
# 3-slot ring buffer of remote_image components for instant swiping. Two
# images are prefetched ahead; touch/swipe advances or goes back. Portrait
# pairs are detected and displayed side-by-side; backward navigation
# re-downloads from stored URL. Slot and display state use custom structs
# (SlotMeta, DisplayMeta) defined in device config.
# =============================================================================

# -----------------------------------------------------------------------------
# Globals: per-slot metadata, display state, ring buffer, portrait state
# -----------------------------------------------------------------------------
globals:
  # Per-slot metadata (struct replaces 60+ individual globals)
  - id: slot0
    type: SlotMeta
  - id: slot1
    type: SlotMeta
  - id: slot2
    type: SlotMeta

  # Current and previous display metadata
  - id: current_display
    type: DisplayMeta
  - id: prev_display
    type: DisplayMeta

  # Ring buffer state
  - id: active_slot
    type: int
    initial_value: '0'
  - id: target_slot
    type: int
    initial_value: '0'
  - id: active_slot_displayed
    type: bool
    initial_value: 'false'
  - id: immich_last_advance_ms
    type: uint32_t
    initial_value: '0'
  - id: last_prefetch_start_ms
    type: uint32_t
    initial_value: '0'
  - id: last_short_tap_ms
    type: uint32_t
    initial_value: '0'
  - id: last_downloaded_slot
    type: int
    initial_value: '-1'
  - id: deferred_fetch_target
    type: int
    initial_value: '0'
  - id: immich_download_retries
    type: int
    initial_value: '0'
  - id: slot_flags
    type: SlotFlags
  - id: preload_noncritical_in_flight
    type: bool
    initial_value: 'false'
  - id: noncritical_remote_updates_in_flight
    type: int
    initial_value: '0'
  # Portrait pair state (struct replaces 8 individual booleans)
  - id: portrait
    type: PortraitState
  - id: portrait_search_datetime
    type: std::string
    initial_value: '""'
  - id: portrait_primary_asset_id
    type: std::string
    initial_value: '""'
  - id: companion_target_slot
    type: int
    initial_value: '0'
  - id: portrait_companion_url
    type: std::string
    initial_value: '""'

  # Portrait preload state
  - id: portrait_preload_slot
    type: int
    initial_value: '-1'
  - id: portrait_preload_left_ready
    type: bool
    initial_value: 'false'
  - id: portrait_preload_right_ready
    type: bool
    initial_value: 'false'
  - id: last_photo_displayed_ms
    type: uint32_t
    initial_value: '0'

# -----------------------------------------------------------------------------
# Portrait pairing toggle (persisted across reboots)
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: "Photos: Portrait Pairing"
    id: portrait_pairing_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:image-multiple"
    web_server:
      sorting_group_id: sg_photos

# -----------------------------------------------------------------------------
# 3-slot full-size ring buffer and portrait pair / preload remote_image components
# -----------------------------------------------------------------------------
remote_image:
  - id: immich_img_0
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 0;
            auto &meta = id(slot0);
            if (!handle_slot_download_complete(slot, meta, id(slot_flags), id(noncritical_remote_updates_in_flight), id(immich_download_retries))) return;
            bool is_active = (id(active_slot) == slot);
            bool pair = meta.is_portrait && id(portrait_pairing_enabled).state;
            if (is_active) {
              copy_slot_to_display(meta, id(current_display));
              if (!pair) id(active_slot_displayed) = true;
            }
            if (is_active && !pair) {
              id(immich_display_current).execute();
            } else if (is_active && pair) {
              if (!(id(active_slot_displayed) && id(portrait).is_pair)) id(immich_start_portrait_active).execute();
            } else if (!is_active && pair) {
              if (id(companion_target_slot) == slot || id(portrait_preload_slot) == slot) return;
              id(companion_target_slot) = slot;
              id(portrait_search_datetime) = meta.datetime;
              id(portrait_primary_asset_id) = meta.asset_id;
              id(immich_fetch_portrait_companion).execute();
            } else if (!is_active) {
              id(delayed_prefetch_chain).execute();
            }
    on_error:
      then:
        - lambda: |-
            id(slot_flags).fetch_in_flight[0] = false;
            clear_noncritical(0, id(slot_flags), id(noncritical_remote_updates_in_flight));
        - lambda: 'id(last_downloaded_slot) = 0;'
        - script.execute: handle_slot_download_error

  - id: immich_img_1
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 1;
            auto &meta = id(slot1);
            if (!handle_slot_download_complete(slot, meta, id(slot_flags), id(noncritical_remote_updates_in_flight), id(immich_download_retries))) return;
            bool is_active = (id(active_slot) == slot);
            bool pair = meta.is_portrait && id(portrait_pairing_enabled).state;
            if (is_active) {
              copy_slot_to_display(meta, id(current_display));
              if (!pair) id(active_slot_displayed) = true;
            }
            if (is_active && !pair) {
              id(immich_display_current).execute();
            } else if (is_active && pair) {
              if (!(id(active_slot_displayed) && id(portrait).is_pair)) id(immich_start_portrait_active).execute();
            } else if (!is_active && pair) {
              if (id(companion_target_slot) == slot || id(portrait_preload_slot) == slot) return;
              id(companion_target_slot) = slot;
              id(portrait_search_datetime) = meta.datetime;
              id(portrait_primary_asset_id) = meta.asset_id;
              id(immich_fetch_portrait_companion).execute();
            } else if (!is_active) {
              id(delayed_prefetch_chain).execute();
            }
    on_error:
      then:
        - lambda: |-
            id(slot_flags).fetch_in_flight[1] = false;
            clear_noncritical(1, id(slot_flags), id(noncritical_remote_updates_in_flight));
        - lambda: 'id(last_downloaded_slot) = 1;'
        - script.execute: handle_slot_download_error

  - id: immich_img_2
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 2;
            auto &meta = id(slot2);
            if (!handle_slot_download_complete(slot, meta, id(slot_flags), id(noncritical_remote_updates_in_flight), id(immich_download_retries))) return;
            bool is_active = (id(active_slot) == slot);
            bool pair = meta.is_portrait && id(portrait_pairing_enabled).state;
            if (is_active) {
              copy_slot_to_display(meta, id(current_display));
              if (!pair) id(active_slot_displayed) = true;
            }
            if (is_active && !pair) {
              id(immich_display_current).execute();
            } else if (is_active && pair) {
              if (!(id(active_slot_displayed) && id(portrait).is_pair)) id(immich_start_portrait_active).execute();
            } else if (!is_active && pair) {
              if (id(companion_target_slot) == slot || id(portrait_preload_slot) == slot) return;
              id(companion_target_slot) = slot;
              id(portrait_search_datetime) = meta.datetime;
              id(portrait_primary_asset_id) = meta.asset_id;
              id(immich_fetch_portrait_companion).execute();
            } else if (!is_active) {
              id(delayed_prefetch_chain).execute();
            }
    on_error:
      then:
        - lambda: |-
            id(slot_flags).fetch_in_flight[2] = false;
            clear_noncritical(2, id(slot_flags), id(noncritical_remote_updates_in_flight));
        - lambda: 'id(last_downloaded_slot) = 2;'
        - script.execute: handle_slot_download_error

  # Portrait pair half-width components (640x800 each, side-by-side)
  - id: immich_portrait_left
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait).left_ready = true;
            ESP_LOGD("immich", "Portrait left ready");
        - if:
            condition:
              lambda: 'return id(portrait).companion_found && !id(portrait).right_ready && !id(portrait).right_requested;'
            then:
              - lambda: 'id(portrait).right_requested = true;'
              - remote_image.set_url:
                  id: immich_portrait_right
                  url: !lambda 'return id(portrait_companion_url);'
                  update: false
              - script.execute: deferred_portrait_right_update
        - if:
            condition:
              lambda: 'return id(portrait).left_ready && id(portrait).right_ready;'
            then:
              - script.execute: immich_display_portrait_pair
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait left decode failed, falling back to single");
            id(portrait).left_ready = false;
            id(portrait).companion_found = false;
            if (!id(active_slot_displayed)) {
              id(active_slot_displayed) = true;
              id(portrait).workflow_busy = false;
              id(immich_display_current).execute();
            }

  - id: immich_portrait_right
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait).right_ready = true;
            ESP_LOGD("immich", "Portrait right ready");
        - if:
            condition:
              lambda: 'return id(portrait).left_ready && id(portrait).right_ready;'
            then:
              - script.execute: immich_display_portrait_pair
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait right decode failed, falling back to single");
            id(portrait).right_ready = false;
            id(portrait).right_requested = false;
            id(portrait).companion_found = false;
            if (!id(active_slot_displayed)) {
              id(active_slot_displayed) = true;
              id(portrait).workflow_busy = false;
              id(immich_display_current).execute();
            }

  # Portrait preload components (downloaded during prefetch for instant pair display)
  - id: immich_portrait_preload_left
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait_preload_left_ready) = true;
            ESP_LOGD("immich", "Portrait preload left ready (slot %d)", id(portrait_preload_slot));
        # Start right only after left finishes to avoid socket exhaustion (esp-tls "Failed to create socket")
        # Read companion URL from slot metadata (not shared global which may be cleared by active workflow)
        - if:
            condition:
              lambda: |-
                int ps = id(portrait_preload_slot);
                if (ps < 0) return false;
                auto &meta = get_slot(ps, id(slot0), id(slot1), id(slot2));
                return !meta.companion_url.empty();
            then:
              - remote_image.set_url:
                  id: immich_portrait_preload_right
                  url: !lambda |-
                    int ps = id(portrait_preload_slot);
                    auto &meta = get_slot(ps, id(slot0), id(slot1), id(slot2));
                    return meta.companion_url;
                  update: false
              - script.execute: deferred_preload_right_update
            else:
              - lambda: |-
                  ESP_LOGW("immich", "Preload right skipped — no companion URL for slot %d", id(portrait_preload_slot));
                  id(portrait_preload_right_ready) = false;
                  if (id(preload_noncritical_in_flight)) {
                    id(preload_noncritical_in_flight) = false;
                    if (id(noncritical_remote_updates_in_flight) > 0) id(noncritical_remote_updates_in_flight)--;
                  }
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload left failed");
            id(portrait_preload_left_ready) = false;
            if (id(preload_noncritical_in_flight)) {
              id(preload_noncritical_in_flight) = false;
              if (id(noncritical_remote_updates_in_flight) > 0) id(noncritical_remote_updates_in_flight)--;
            }

  - id: immich_portrait_preload_right
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait_preload_right_ready) = true;
            ESP_LOGD("immich", "Portrait preload right ready (slot %d)", id(portrait_preload_slot));
            if (id(preload_noncritical_in_flight)) {
              id(preload_noncritical_in_flight) = false;
              if (id(noncritical_remote_updates_in_flight) > 0) id(noncritical_remote_updates_in_flight)--;
            }
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload right failed");
            id(portrait_preload_right_ready) = false;
            if (id(preload_noncritical_in_flight)) {
              id(preload_noncritical_in_flight) = false;
              if (id(noncritical_remote_updates_in_flight) > 0) id(noncritical_remote_updates_in_flight)--;
            }

# -----------------------------------------------------------------------------
# Scripts: download error handler, display, advance, previous, prefetch
# -----------------------------------------------------------------------------
script:
  # Shared handler for any slot's on_error (retry up to MAX_ERROR_RETRIES)
  - id: handle_slot_download_error
    mode: restart
    then:
      - lambda: |-
          id(immich_download_retries)++;
          int s = id(last_downloaded_slot);
          ESP_LOGE("immich", "Slot %d decode failed (attempt %d)", s, id(immich_download_retries));
          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
          meta.ready = false;
          meta.asset_id = "";
          meta.pending_asset_id = "";
          meta.image_url = "";
      - if:
          condition:
            lambda: 'return id(immich_download_retries) < MAX_ERROR_RETRIES;'
          then:
            - delay: 2s
            - script.execute: immich_prefetch_chain
          else:
            - lambda: 'id(immich_download_retries) = 0;'

  # Start portrait pair download for the active slot (left then right or companion search)
  - id: immich_start_portrait_active
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(active_slot_displayed) && id(portrait).is_pair && id(portrait).using_preload;'
          then:
            - lambda: 'ESP_LOGD("immich", "Portrait pair already displayed from preload; skipping live portrait refresh");'
            - script.stop: immich_start_portrait_active
      - lambda: |-
          int s = id(active_slot);
          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
          id(portrait).left_ready = false;
          id(portrait).right_ready = false;
          id(portrait).no_companion_active = false;
          id(portrait).right_requested = false;
          id(portrait).using_preload = false;
          id(portrait).workflow_busy = true;
          id(portrait_primary_asset_id) = meta.asset_id;
          if (!meta.companion_url.empty()) {
            id(portrait).companion_found = true;
            id(portrait_companion_url) = meta.companion_url;
            ESP_LOGD("immich", "Portrait slot %d: companion URL known, starting left (right after)", s);
          } else {
            id(portrait).companion_found = false;
            id(portrait_companion_url) = "";
            id(portrait_search_datetime) = meta.datetime;
            id(companion_target_slot) = s;
            ESP_LOGD("immich", "Portrait slot %d: no companion, searching", s);
          }
      - remote_image.set_url:
          id: immich_portrait_left
          url: !lambda |-
            int s = id(active_slot);
            auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
            return meta.image_url;
          update: false
      - script.execute: deferred_portrait_left_update
      - if:
          condition:
            lambda: 'return id(portrait).companion_found;'
          then:
            - lambda: |-
                // Right image is started only after left finishes to avoid duplicate/in-flight updates.
                return;
      - if:
          condition:
            lambda: 'return !id(portrait).companion_found;'
          then:
            - script.execute: deferred_companion_search

  # Display whichever slot is active (single image or portrait pair; accent + warm tones)
  - id: immich_display_current
    mode: single
    then:
      - script.execute: hide_connection_failed
      - lambda: |-
          lv_obj_clear_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          id(portrait).is_pair = false;

          int s = id(active_slot);
          esphome::image::Image *imgs[] = { id(immich_img_0), id(immich_img_1), id(immich_img_2) };
          lv_img_set_src(id(slideshow_img), get_lv_image_descriptor_(imgs[s], 0));

          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
          lv_img_set_zoom(id(slideshow_img), meta.zoom);
          ESP_LOGI("immich", "SHOW slot %d: %s | %s | %s | portrait=%d", s, meta.asset_id.c_str(), meta.date.c_str(), meta.person.c_str(), meta.is_portrait);
          bool pair = meta.is_portrait && id(portrait_pairing_enabled).state;
          if (!pair) {
            id(active_slot_displayed) = true;
            id(portrait).workflow_busy = false;
          }
      - script.execute: extract_accent_color
      - script.execute: apply_warm_tones
      - if:
          condition:
            lambda: |-
              int s = id(active_slot);
              auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
              return meta.is_portrait && id(portrait_pairing_enabled).state && id(portrait_preload_slot) == s
                     && id(portrait_preload_left_ready) && id(portrait_preload_right_ready);
          then:
            - lambda: |-
                id(portrait).is_pair = true;
                id(portrait).using_preload = true;
                id(portrait_preload_slot) = -1;
                id(active_slot_displayed) = true;
                id(portrait).workflow_busy = false;
                lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
                lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
                ESP_LOGI("immich", "PAIR (preloaded) displayed for slot %d", id(active_slot));
            - lvgl.image.update:
                id: portrait_left_img
                src: immich_portrait_preload_left
            - lvgl.image.update:
                id: portrait_right_img
                src: immich_portrait_preload_right
            - script.execute: extract_accent_color
            - script.execute: apply_warm_tones
      - if:
          condition:
            lambda: |-
              int s = id(active_slot);
              auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
              return meta.is_portrait && id(portrait_pairing_enabled).state && !id(portrait).is_pair && !id(portrait).no_companion_active;
          then:
            - script.execute: immich_start_portrait_active
      - script.execute: update_clock_display

  # Advance forward: move ring index, display if ready, else fetch into slot
  - id: immich_advance_forward
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(active_slot_displayed);'
          then:
            - lambda: |-
                int s = id(active_slot);
                auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                if (meta.ready && id(portrait).workflow_busy) {
                  id(portrait).workflow_busy = false;
                  id(portrait).left_ready = false;
                  id(portrait).right_ready = false;
                  id(portrait).right_requested = false;
                  id(portrait).companion_found = false;
                  id(active_slot_displayed) = true;
                  copy_slot_to_display(meta, id(current_display));
                  id(immich_display_current).execute();
                } else if (!meta.ready) {
                  bool in_flight = id(slot_flags).fetch_in_flight[s];
                  uint32_t since_advance = millis() - id(immich_last_advance_ms);
                  if (in_flight && since_advance > 15000) {
                    ESP_LOGW("diag", "H3-FIX: Slot %d in_flight stuck for %ums, force-clearing", s, since_advance);
                    clear_noncritical(s, id(slot_flags), id(noncritical_remote_updates_in_flight));
                    id(slot_flags).fetch_in_flight[s] = false;
                    if (s == 0) id(immich_img_0).abort_download();
                    else if (s == 1) id(immich_img_1).abort_download();
                    else id(immich_img_2).abort_download();
                    in_flight = false;
                  }
                  if (!in_flight) {
                    ESP_LOGW("diag", "H3-FIX: Slot %d not ready and not downloading, re-fetching", s);
                    id(portrait).workflow_busy = false;
                    id(immich_last_advance_ms) = millis();
                    id(target_slot) = s;
                    id(deferred_fetch_into_slot).execute();
                  } else {
                    ESP_LOGW("immich", "Active slot %d not ready, download in progress", s);
                  }
                } else {
                  ESP_LOGW("immich", "Active slot not displayed yet, skipping advance");
                }
          else:
            - lambda: |-
                if (!id(current_display).asset_id.empty()) {
                  int s_old = id(active_slot);
                  auto &old_meta = get_slot(s_old, id(slot0), id(slot1), id(slot2));
                  id(prev_display) = id(current_display);
                  id(prev_display).zoom = old_meta.zoom;
                  id(prev_display).valid = true;
                }
                id(portrait).reset();
                int old_slot_idx = id(active_slot);
                id(active_slot) = (old_slot_idx + 1) % 3;
                id(active_slot_displayed) = false;
                auto &cleared = get_slot(old_slot_idx, id(slot0), id(slot1), id(slot2));
                cleared.ready = false;
                id(immich_last_advance_ms) = millis();
                ESP_LOGI("immich", "ADVANCE: slot %d -> %d", old_slot_idx, id(active_slot));
            - if:
                condition:
                  lambda: |-
                    int s = id(active_slot);
                    auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                    return meta.ready;
                then:
                  - lambda: |-
                      int s = id(active_slot);
                      auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                      copy_slot_to_display(meta, id(current_display));
                      bool pair = meta.is_portrait && id(portrait_pairing_enabled).state;
                      if (!pair) id(active_slot_displayed) = true;
                      ESP_LOGI("immich", "DISPLAY slot %d: %s | %s | %s | portrait=%d pair=%d",
                        s, id(current_display).asset_id.c_str(), id(current_display).date.c_str(), id(current_display).person.c_str(), meta.is_portrait, id(portrait).is_pair);
                  - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                          return !(meta.is_portrait && id(portrait_pairing_enabled).state);
                      then:
                        - script.execute: immich_display_current
                        - script.execute: delayed_prefetch_chain
                  - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                          return meta.is_portrait && id(portrait_pairing_enabled).state && id(portrait_preload_slot) == s
                                 && id(portrait_preload_left_ready) && id(portrait_preload_right_ready);
                      then:
                        - script.execute: immich_display_current
                        - script.execute: delayed_prefetch_chain
                  - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                          return meta.is_portrait && id(portrait_pairing_enabled).state && !(id(portrait_preload_slot) == s
                                 && id(portrait_preload_left_ready) && id(portrait_preload_right_ready));
                      then:
                        - script.execute: immich_start_portrait_active
                        - script.execute: delayed_prefetch_chain
                else:
                  - if:
                      condition:
                        lambda: 'return id(slot_flags).fetch_in_flight[id(active_slot)];'
                      then:
                        - lambda: |-
                            ESP_LOGD("immich", "Slot %d not ready but already downloading, waiting", id(active_slot));
                      else:
                        - lambda: |-
                            id(target_slot) = id(active_slot);
                            ESP_LOGD("immich", "Slot %d not ready, fetching fresh", id(active_slot));
                        - script.execute: deferred_fetch_into_slot

  # Show previous image (swipe back); re-downloads into slot from stored URL
  - id: immich_show_previous
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(prev_display).valid;'
          then:
            - logger.log:
                level: INFO
                tag: immich
                format: "No previous image available"
          else:
            - lambda: |-
                int cur_s = id(active_slot);
                auto &cur_meta = get_slot(cur_s, id(slot0), id(slot1), id(slot2));
                DisplayMeta tmp = id(current_display);
                tmp.zoom = cur_meta.zoom;

                id(current_display) = id(prev_display);
                id(prev_display) = tmp;

                id(portrait).reset();

                int prev_slot = (id(active_slot) + 2) % 3;
                id(active_slot) = prev_slot;
                id(active_slot_displayed) = false;

                auto &meta = get_slot(prev_slot, id(slot0), id(slot1), id(slot2));
                meta.ready = false;
                meta.is_portrait = false;
                meta.companion_url = "";
                meta.datetime = "";
                copy_display_to_slot(id(current_display), meta);
                meta.pending_asset_id = id(current_display).asset_id;

                std::string url = meta.image_url;
                bool fill = (id(photo_display_mode).current_option() == "Fill");
                if (prev_slot == 0) { id(immich_img_0).set_fill_mode(fill); id(immich_img_0).set_url(url); id(immich_img_0).update(); }
                else if (prev_slot == 1) { id(immich_img_1).set_fill_mode(fill); id(immich_img_1).set_url(url); id(immich_img_1).update(); }
                else { id(immich_img_2).set_fill_mode(fill); id(immich_img_2).set_url(url); id(immich_img_2).update(); }
                id(slot_flags).fetch_in_flight[prev_slot] = true;
                ESP_LOGD("immich", "Showing previous in slot %d: %s", prev_slot, id(current_display).asset_id.c_str());

  # Display portrait pair when both left and right images are ready
  - id: immich_display_portrait_pair
    mode: single
    then:
      - script.execute: hide_connection_failed
      - lambda: |-
          id(portrait).is_pair = true;
          id(active_slot_displayed) = true;
          id(portrait).workflow_busy = false;
          lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          ESP_LOGI("immich", "PAIR displayed for slot %d", id(active_slot));
      - lvgl.image.update:
          id: portrait_left_img
          src: immich_portrait_left
      - lvgl.image.update:
          id: portrait_right_img
          src: immich_portrait_right
      - script.execute: extract_accent_color
      - script.execute: apply_warm_tones
      - script.execute: update_clock_display
      - script.execute: delayed_prefetch_chain

  # Prefetch chain: fill the next empty slot(s) ahead of active_slot (skipped when backlight paused)
  - id: immich_prefetch_chain
    mode: single
    then:
      - lambda: |-
          if (id(backlight_paused)) {
            ESP_LOGD("immich", "Prefetch paused (backlight off)");
            return;
          }
          // Avoid piling up concurrent HTTP/decode work while portrait downloads
          // are still in progress (active pair or preload pair).
          bool active_portrait_busy = false;
          if (id(active_slot) == 0 || id(active_slot) == 1 || id(active_slot) == 2) {
            auto &active = get_slot(id(active_slot), id(slot0), id(slot1), id(slot2));
            if (active.is_portrait) {
              bool left_pending = !id(portrait).left_ready;
              bool right_pending = id(portrait).companion_found && !id(portrait).right_ready;
              active_portrait_busy = left_pending || right_pending;
            }
          }
          bool preload_busy = (id(portrait_preload_slot) != -1) &&
                              !(id(portrait_preload_left_ready) && id(portrait_preload_right_ready));
          if (active_portrait_busy || preload_busy) {
            ESP_LOGD("immich", "Prefetch deferred (portrait pipeline busy)");
            return;
          }
          if (id(portrait).workflow_busy) return;
          if (id(noncritical_remote_updates_in_flight) > 0) return;
          if ((millis() - id(last_prefetch_start_ms)) < 600) {
            ESP_LOGD("immich", "Prefetch throttled");
            return;
          }
          int next1 = (id(active_slot) + 1) % 3;
          int next2 = (id(active_slot) + 2) % 3;
          auto &n1 = get_slot(next1, id(slot0), id(slot1), id(slot2));
          auto &n2 = get_slot(next2, id(slot0), id(slot1), id(slot2));
          bool n1_in_flight = id(slot_flags).fetch_in_flight[next1];
          bool n2_in_flight = id(slot_flags).fetch_in_flight[next2];
          if (!n1.ready && !n1_in_flight) {
            id(target_slot) = next1;
            id(last_prefetch_start_ms) = millis();
            ESP_LOGD("immich", "Prefetch chain: filling slot %d (next)", next1);
            id(immich_fetch_into_slot).execute();
          } else if (!n2.ready && !n2_in_flight) {
            id(target_slot) = next2;
            id(last_prefetch_start_ms) = millis();
            ESP_LOGD("immich", "Prefetch chain: filling slot %d (next-next)", next2);
            id(immich_fetch_into_slot).execute();
          } else {
            ESP_LOGD("immich", "Prefetch chain: all slots filled");
          }

  # Run prefetch after short delay to avoid socket exhaustion when many callbacks fire at once
  - id: delayed_prefetch_chain
    mode: restart
    then:
      - delay: 500ms
      - script.execute: immich_prefetch_chain

  # Defer companion search when started from advance so interval callback returns quickly
  - id: deferred_companion_search
    mode: restart
    then:
      - delay: 200ms
      - script.execute: immich_fetch_portrait_companion

  # When advance finds slot not ready, defer fetch so interval callback returns quickly
  - id: deferred_fetch_into_slot
    mode: single
    then:
      - lambda: 'id(deferred_fetch_target) = id(target_slot);'
      - delay: 200ms
      - lambda: 'id(target_slot) = id(deferred_fetch_target);'
      - script.execute: immich_fetch_into_slot

  # Per-slot deferred update scripts — split from a single shared script to avoid
  # collisions when two API responses arrive within 150ms of each other.
  # Per-slot deferred update scripts — split to avoid collisions when two API
  # responses arrive within 150ms of each other.
  - id: deferred_slot0_image_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          if (!prepare_deferred_slot_update(0, id(active_slot), id(slot_flags), id(portrait).workflow_busy, id(noncritical_remote_updates_in_flight))) {
            id(delayed_prefetch_chain).execute(); return;
          }
          id(immich_img_0).set_fill_mode((id(photo_display_mode).current_option() == "Fill") && !id(slot0).is_portrait);
          id(immich_img_0).update();

  - id: deferred_slot1_image_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          if (!prepare_deferred_slot_update(1, id(active_slot), id(slot_flags), id(portrait).workflow_busy, id(noncritical_remote_updates_in_flight))) {
            id(delayed_prefetch_chain).execute(); return;
          }
          id(immich_img_1).set_fill_mode((id(photo_display_mode).current_option() == "Fill") && !id(slot1).is_portrait);
          id(immich_img_1).update();

  - id: deferred_slot2_image_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          if (!prepare_deferred_slot_update(2, id(active_slot), id(slot_flags), id(portrait).workflow_busy, id(noncritical_remote_updates_in_flight))) {
            id(delayed_prefetch_chain).execute(); return;
          }
          id(immich_img_2).set_fill_mode((id(photo_display_mode).current_option() == "Fill") && !id(slot2).is_portrait);
          id(immich_img_2).update();

  - id: deferred_portrait_left_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          bool fill = (id(photo_display_mode).current_option() == "Fill");
          id(immich_portrait_left).set_fill_mode(fill);
          id(immich_portrait_left).update();

  - id: deferred_portrait_right_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          bool fill = (id(photo_display_mode).current_option() == "Fill");
          id(immich_portrait_right).set_fill_mode(fill);
          id(immich_portrait_right).update();

  - id: deferred_preload_left_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          if (id(portrait).workflow_busy) {
            id(delayed_prefetch_chain).execute();
            return;
          }
          if (!id(preload_noncritical_in_flight)) {
            id(preload_noncritical_in_flight) = true;
            id(noncritical_remote_updates_in_flight)++;
          }
          id(immich_portrait_preload_left).update();

  - id: deferred_preload_right_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          if (id(portrait).workflow_busy) {
            if (id(preload_noncritical_in_flight)) {
              id(preload_noncritical_in_flight) = false;
              if (id(noncritical_remote_updates_in_flight) > 0) id(noncritical_remote_updates_in_flight)--;
            }
            id(delayed_prefetch_chain).execute();
            return;
          }
          id(immich_portrait_preload_right).update();
