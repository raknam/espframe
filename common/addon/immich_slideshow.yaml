# =============================================================================
# IMMICH SLIDESHOW - Ring buffer, display, and navigation
# =============================================================================
# 3-slot ring buffer of remote_image components for instant swiping. Two
# images are prefetched ahead; touch/swipe advances or goes back. Portrait
# pairs are detected and displayed side-by-side; backward navigation
# re-downloads from stored URL. Slot and display state use custom structs
# (SlotMeta, DisplayMeta) defined in device config.
# =============================================================================

# -----------------------------------------------------------------------------
# Globals: per-slot metadata, display state, ring buffer, portrait state
# -----------------------------------------------------------------------------
globals:
  # Per-slot metadata (struct replaces 60+ individual globals)
  - id: slot0
    type: SlotMeta
  - id: slot1
    type: SlotMeta
  - id: slot2
    type: SlotMeta

  # Current and previous display metadata
  - id: current_display
    type: DisplayMeta
  - id: prev_display
    type: DisplayMeta

  # Ring buffer state
  - id: active_slot
    type: int
    initial_value: '0'
  - id: target_slot
    type: int
    initial_value: '0'
  - id: active_slot_displayed
    type: bool
    initial_value: 'false'
  - id: immich_last_advance_ms
    type: uint32_t
    initial_value: '0'
  - id: last_prefetch_start_ms
    type: uint32_t
    initial_value: '0'
  - id: last_short_tap_ms
    type: uint32_t
    initial_value: '0'
  - id: last_downloaded_slot
    type: int
    initial_value: '-1'
  - id: immich_diag_reason
    type: std::string
    initial_value: '""'
  - id: last_immich_diag_ms
    type: uint32_t
    initial_value: '0'
  - id: deferred_fetch_target
    type: int
    initial_value: '0'
  - id: immich_download_retries
    type: int
    initial_value: '0'
  - id: immich_retry_cooldown_until_ms
    type: uint32_t
    initial_value: '0'
  - id: slot_flags
    type: SlotFlags
  - id: fetch_queue
    type: FetchQueue
  - id: preload_noncritical_in_flight
    type: bool
    initial_value: 'false'
  - id: noncritical_remote_updates_in_flight
    type: int
    initial_value: '0'
  # Portrait pair state (struct replaces 8 individual booleans)
  - id: portrait
    type: PortraitState
  - id: portrait_search_datetime
    type: std::string
    initial_value: '""'
  - id: portrait_primary_asset_id
    type: std::string
    initial_value: '""'
  - id: companion_target_slot
    type: int
    initial_value: '0'
  - id: portrait_companion_url
    type: std::string
    initial_value: '""'

  # Portrait preload state
  - id: portrait_preload_slot
    type: int
    initial_value: '-1'
  - id: portrait_preload_left_ready
    type: bool
    initial_value: 'false'
  - id: portrait_preload_right_ready
    type: bool
    initial_value: 'false'
  - id: last_photo_displayed_ms
    type: uint32_t
    initial_value: '0'

# -----------------------------------------------------------------------------
# Metadata display mode (persisted across reboots)
# -----------------------------------------------------------------------------
select:
  - platform: template
    name: "Device: Metadata Date Format"
    id: photo_metadata_date_format
    internal: true
    options:
      - "Relative Date"
      - "Date Taken"
    initial_option: "Date Taken"
    optimistic: true
    restore_value: true
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_device
    on_value:
      then:
        - script.execute: update_photo_metadata_display

# -----------------------------------------------------------------------------
# Portrait pairing and metadata toggles (persisted across reboots)
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: "Photos: Portrait Pairing"
    id: portrait_pairing_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:image-multiple"
    web_server:
      sorting_group_id: sg_photos

  - platform: template
    name: "Device: Metadata Date"
    id: photo_metadata_date_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_device
    on_turn_on:
      then:
        - script.execute: update_photo_metadata_display
    on_turn_off:
      then:
        - script.execute: update_photo_metadata_display

  - platform: template
    name: "Device: Metadata Location"
    id: photo_metadata_location_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: "mdi:map-marker-outline"
    web_server:
      sorting_group_id: sg_device
    on_turn_on:
      then:
        - script.execute: update_photo_metadata_display
    on_turn_off:
      then:
        - script.execute: update_photo_metadata_display

# -----------------------------------------------------------------------------
# 3-slot full-size ring buffer and portrait pair / preload remote_image components
# -----------------------------------------------------------------------------
remote_image:
  - id: immich_img_0
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 0;
            auto &meta = id(slot0);
            id(espframe_core).slideshow().on_slot_download_finished(
              slot, meta, id(slot_flags), id(noncritical_remote_updates_in_flight),
              id(immich_download_retries), id(active_slot), id(portrait_pairing_enabled).state,
              id(active_slot_displayed), id(current_display), id(portrait),
              id(companion_target_slot), id(portrait_preload_slot),
              id(portrait_search_datetime), id(portrait_primary_asset_id));
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            id(espframe_core).slideshow().on_slot_download_error(
              0, id(slot_flags), id(noncritical_remote_updates_in_flight),
              id(immich_diag_reason), id(last_downloaded_slot), "slot0 image error");
            id(espframe_slideshow_dispatch).execute();

  - id: immich_img_1
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 1;
            auto &meta = id(slot1);
            id(espframe_core).slideshow().on_slot_download_finished(
              slot, meta, id(slot_flags), id(noncritical_remote_updates_in_flight),
              id(immich_download_retries), id(active_slot), id(portrait_pairing_enabled).state,
              id(active_slot_displayed), id(current_display), id(portrait),
              id(companion_target_slot), id(portrait_preload_slot),
              id(portrait_search_datetime), id(portrait_primary_asset_id));
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            id(espframe_core).slideshow().on_slot_download_error(
              1, id(slot_flags), id(noncritical_remote_updates_in_flight),
              id(immich_diag_reason), id(last_downloaded_slot), "slot1 image error");
            id(espframe_slideshow_dispatch).execute();

  - id: immich_img_2
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${display_width}x${display_height}
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 2;
            auto &meta = id(slot2);
            id(espframe_core).slideshow().on_slot_download_finished(
              slot, meta, id(slot_flags), id(noncritical_remote_updates_in_flight),
              id(immich_download_retries), id(active_slot), id(portrait_pairing_enabled).state,
              id(active_slot_displayed), id(current_display), id(portrait),
              id(companion_target_slot), id(portrait_preload_slot),
              id(portrait_search_datetime), id(portrait_primary_asset_id));
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            id(espframe_core).slideshow().on_slot_download_error(
              2, id(slot_flags), id(noncritical_remote_updates_in_flight),
              id(immich_diag_reason), id(last_downloaded_slot), "slot2 image error");
            id(espframe_slideshow_dispatch).execute();

  # Portrait pair half-width components (640x800 each, side-by-side)
  - id: immich_portrait_left
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: END
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait left ready");
            id(espframe_core).slideshow().on_portrait_left_finished(id(portrait));
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait left decode failed, falling back to single");
            id(espframe_core).slideshow().on_portrait_left_error(
              id(portrait), id(immich_diag_reason), id(active_slot_displayed));
            id(espframe_slideshow_dispatch).execute();

  - id: immich_portrait_right
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: START
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait right ready");
            id(espframe_core).slideshow().on_portrait_right_finished(id(portrait));
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait right decode failed, falling back to single");
            id(espframe_core).slideshow().on_portrait_right_error(
              id(portrait), id(immich_diag_reason), id(active_slot_displayed));
            id(espframe_slideshow_dispatch).execute();

  # Portrait preload components (downloaded during prefetch for instant pair display)
  - id: immich_portrait_preload_left
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: END
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait preload left ready (slot %d)", id(portrait_preload_slot));
            id(espframe_core).slideshow().on_preload_left_finished(
              id(portrait_preload_slot), id(slot0), id(slot1), id(slot2),
              id(portrait_preload_left_ready), id(portrait_preload_right_ready),
              id(preload_noncritical_in_flight), id(noncritical_remote_updates_in_flight));
            id(espframe_slideshow_dispatch).execute();
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload left failed");
            id(espframe_core).slideshow().on_preload_left_error(
              id(immich_diag_reason), id(portrait_preload_left_ready),
              id(preload_noncritical_in_flight), id(noncritical_remote_updates_in_flight));
            id(espframe_slideshow_dispatch).execute();

  - id: immich_portrait_preload_right
    url: "https://via.placeholder.com/1x1.jpg"
    resize: ${portrait_half_width}x${display_height}
    fill: true
    horizontal_align: START
    type: RGB565
    byte_order: little_endian
    formats: [JPEG, WEBP]
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGD("immich", "Portrait preload right ready (slot %d)", id(portrait_preload_slot));
            id(espframe_core).slideshow().on_preload_right_finished(
              id(portrait_preload_right_ready), id(preload_noncritical_in_flight),
              id(noncritical_remote_updates_in_flight));
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload right failed");
            id(espframe_core).slideshow().on_preload_right_error(
              id(immich_diag_reason), id(portrait_preload_right_ready),
              id(preload_noncritical_in_flight), id(noncritical_remote_updates_in_flight));
            id(espframe_slideshow_dispatch).execute();

# -----------------------------------------------------------------------------
# Scripts: download error handler, display, advance, previous, prefetch
# -----------------------------------------------------------------------------
script:
  - id: espframe_slideshow_dispatch
    mode: queued
    then:
      - lambda: |-
          SlideshowCommand cmd;
          while (id(espframe_core).slideshow().pop_command(cmd)) {
            switch (cmd.kind) {
              case SLIDESHOW_COMMAND_DISPLAY_CURRENT:
                id(immich_display_current).execute();
                break;
              case SLIDESHOW_COMMAND_START_ACTIVE_PAIR:
                id(immich_start_portrait_active).execute();
                break;
              case SLIDESHOW_COMMAND_FETCH_COMPANION:
                id(immich_fetch_portrait_companion).execute();
                break;
              case SLIDESHOW_COMMAND_PREFETCH_AFTER_DELAY:
                id(delayed_prefetch_chain).execute();
                break;
              case SLIDESHOW_COMMAND_LOG_DIAG:
                id(log_immich_diag).execute();
                break;
              case SLIDESHOW_COMMAND_HANDLE_SLOT_DOWNLOAD_ERROR:
                id(handle_slot_download_error).execute();
                break;
              case SLIDESHOW_COMMAND_FETCH_INTO_SLOT:
                id(target_slot) = cmd.slot;
                id(immich_fetch_into_slot).execute();
                break;
              case SLIDESHOW_COMMAND_UPDATE_SLOT_IMAGE:
                if (cmd.slot == 0) {
                  id(immich_img_0).set_fill_mode((id(photo_display_mode).current_option() == "Fill") && !id(slot0).is_portrait);
                  id(immich_img_0).update();
                } else if (cmd.slot == 1) {
                  id(immich_img_1).set_fill_mode((id(photo_display_mode).current_option() == "Fill") && !id(slot1).is_portrait);
                  id(immich_img_1).update();
                } else if (cmd.slot == 2) {
                  id(immich_img_2).set_fill_mode((id(photo_display_mode).current_option() == "Fill") && !id(slot2).is_portrait);
                  id(immich_img_2).update();
                }
                break;
              case SLIDESHOW_COMMAND_UPDATE_PORTRAIT_LEFT:
                id(immich_portrait_left).set_fill_mode(true);
                id(immich_portrait_left).update();
                break;
              case SLIDESHOW_COMMAND_UPDATE_PORTRAIT_RIGHT:
                id(immich_portrait_right).set_fill_mode(true);
                id(immich_portrait_right).update();
                break;
              case SLIDESHOW_COMMAND_UPDATE_PRELOAD_LEFT:
                id(immich_portrait_preload_left).set_fill_mode(true);
                id(immich_portrait_preload_left).update();
                break;
              case SLIDESHOW_COMMAND_UPDATE_PRELOAD_RIGHT:
                id(immich_portrait_preload_right).set_fill_mode(true);
                id(immich_portrait_preload_right).update();
                break;
              case SLIDESHOW_COMMAND_START_PORTRAIT_LEFT: {
                int s = cmd.slot >= 0 ? cmd.slot : id(active_slot);
                auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                id(immich_portrait_left).set_url(meta.image_url);
                id(deferred_portrait_left_update).execute();
                break;
              }
              case SLIDESHOW_COMMAND_START_PORTRAIT_RIGHT:
                id(immich_portrait_right).set_url(id(portrait_companion_url));
                id(deferred_portrait_right_update).execute();
                break;
              case SLIDESHOW_COMMAND_DISPLAY_PORTRAIT_PAIR:
                id(immich_display_portrait_pair).execute();
                break;
              case SLIDESHOW_COMMAND_START_PRELOAD_LEFT: {
                int s = cmd.slot >= 0 ? cmd.slot : id(companion_target_slot);
                auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                id(immich_portrait_preload_left).set_url(meta.image_url);
                id(deferred_preload_left_update).execute();
                break;
              }
              case SLIDESHOW_COMMAND_START_PRELOAD_RIGHT: {
                int s = cmd.slot >= 0 ? cmd.slot : id(portrait_preload_slot);
                auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                id(immich_portrait_preload_right).set_url(meta.companion_url);
                id(deferred_preload_right_update).execute();
                break;
              }
              case SLIDESHOW_COMMAND_DEFER_COMPANION_SEARCH:
                id(deferred_companion_search).execute();
                break;
              case SLIDESHOW_COMMAND_ABORT_SLOT_DOWNLOAD:
                if (cmd.slot == 0) id(immich_img_0).abort_download();
                else if (cmd.slot == 1) id(immich_img_1).abort_download();
                else if (cmd.slot == 2) id(immich_img_2).abort_download();
                break;
              case SLIDESHOW_COMMAND_DEFER_FETCH_INTO_SLOT:
                id(target_slot) = cmd.slot;
                id(deferred_fetch_into_slot).execute();
                break;
              case SLIDESHOW_COMMAND_LOAD_PREVIOUS_SLOT: {
                int s = cmd.slot;
                auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
                bool fill = (id(photo_display_mode).current_option() == "Fill");
                if (s == 0) { id(immich_img_0).set_fill_mode(fill); id(immich_img_0).set_url(meta.image_url); id(immich_img_0).update(); }
                else if (s == 1) { id(immich_img_1).set_fill_mode(fill); id(immich_img_1).set_url(meta.image_url); id(immich_img_1).update(); }
                else if (s == 2) { id(immich_img_2).set_fill_mode(fill); id(immich_img_2).set_url(meta.image_url); id(immich_img_2).update(); }
                break;
              }
              case SLIDESHOW_COMMAND_LOG_NO_PREVIOUS:
                ESP_LOGI("immich", "No previous image available");
                break;
              case SLIDESHOW_COMMAND_DISPLAY_PRELOADED_PAIR:
                lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
                lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
                lv_img_set_src(id(portrait_left_img), get_lv_image_descriptor_(id(immich_portrait_preload_left), 0));
                lv_img_set_src(id(portrait_right_img), get_lv_image_descriptor_(id(immich_portrait_preload_right), 0));
                id(extract_accent_color).execute();
                id(apply_warm_tones).execute();
                break;
              case SLIDESHOW_COMMAND_NONE:
              default:
                break;
            }
          }

  - id: log_immich_diag
    mode: restart
    then:
      - lambda: |-
          log_immich_pipeline_diag(id(immich_diag_reason).c_str(), millis(), id(last_immich_diag_ms),
            id(active_slot), id(target_slot), id(active_slot_displayed), id(slot_flags), id(portrait),
            id(noncritical_remote_updates_in_flight), id(preload_noncritical_in_flight),
            id(portrait_preload_slot), id(portrait_preload_left_ready), id(portrait_preload_right_ready),
            id(companion_target_slot), id(immich_api_retries), id(immich_download_retries),
            id(immich_retry_cooldown_until_ms));

  # Shared handler for any slot's on_error (retry up to MAX_ERROR_RETRIES)
  - id: handle_slot_download_error
    mode: restart
    then:
      - lambda: |-
          id(immich_download_retries)++;
          int s = id(last_downloaded_slot);
          ESP_LOGE("immich", "Slot %d decode failed (attempt %d)", s, id(immich_download_retries));
          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
          meta.ready = false;
          meta.asset_id = "";
          meta.pending_asset_id = "";
          meta.image_url = "";
      - if:
          condition:
            lambda: 'return id(immich_download_retries) < MAX_ERROR_RETRIES;'
          then:
            - delay: 2s
            - script.execute: immich_prefetch_chain
          else:
            - lambda: 'id(immich_download_retries) = 0;'
            - lambda: |-
                id(immich_retry_cooldown_until_ms) = millis() + 30000;
                ESP_LOGW("immich", "Download retries exhausted; pausing Immich fetches for 30s");

  # Start portrait pair download for the active slot (left then right or companion search)
  - id: immich_start_portrait_active
    mode: restart
    then:
      - lambda: |-
          id(espframe_core).slideshow().start_active_portrait(
            id(active_slot), id(slot0), id(slot1), id(slot2), id(portrait),
            id(active_slot_displayed), id(portrait_primary_asset_id),
            id(portrait_companion_url), id(portrait_search_datetime),
            id(companion_target_slot));
          id(espframe_slideshow_dispatch).execute();

  # Display whichever slot is active (single image or portrait pair; accent + warm tones)
  - id: immich_display_current
    mode: single
    then:
      - script.execute: hide_connection_failed
      - lambda: |-
          lv_obj_clear_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);

          int s = id(active_slot);
          esphome::image::Image *imgs[] = { id(immich_img_0), id(immich_img_1), id(immich_img_2) };
          lv_img_set_src(id(slideshow_img), get_lv_image_descriptor_(imgs[s], 0));

          auto &meta = get_slot(s, id(slot0), id(slot1), id(slot2));
          lv_img_set_zoom(id(slideshow_img), meta.zoom);
          ESP_LOGI("immich", "SHOW slot %d: %s | %s | %s | portrait=%d", s, meta.asset_id.c_str(), meta.date.c_str(), meta.person.c_str(), meta.is_portrait);
          id(espframe_core).slideshow().begin_display_current(
            s, id(slot0), id(slot1), id(slot2), id(portrait),
            id(portrait_pairing_enabled).state, id(active_slot_displayed));
      - script.execute: extract_accent_color
      - script.execute: apply_warm_tones
      - lambda: |-
          id(espframe_core).slideshow().after_display_current(
            id(active_slot), id(slot0), id(slot1), id(slot2), id(portrait),
            id(portrait_pairing_enabled).state, id(active_slot_displayed),
            id(portrait_preload_slot), id(portrait_preload_left_ready),
            id(portrait_preload_right_ready));
          id(espframe_slideshow_dispatch).execute();
      - script.execute: update_clock_display
      - script.execute: update_photo_metadata_display

  # Advance forward: move ring index, display if ready, else fetch into slot
  - id: immich_advance_forward
    mode: single
    then:
      - lambda: |-
          id(espframe_core).slideshow().advance_forward(
            millis(),
            id(immich_retry_cooldown_until_ms) != 0 && millis() < id(immich_retry_cooldown_until_ms),
            id(active_slot), id(target_slot), id(active_slot_displayed),
            id(immich_last_advance_ms), id(slot0), id(slot1), id(slot2),
            id(current_display), id(prev_display), id(portrait), id(slot_flags),
            id(noncritical_remote_updates_in_flight), id(portrait_pairing_enabled).state,
            id(portrait_preload_slot), id(portrait_preload_left_ready),
            id(portrait_preload_right_ready), id(immich_diag_reason));
          id(espframe_slideshow_dispatch).execute();

  # Show previous image (swipe back); re-downloads into slot from stored URL
  - id: immich_show_previous
    mode: single
    then:
      - lambda: |-
          id(espframe_core).slideshow().show_previous(
            millis(), id(active_slot), id(active_slot_displayed),
            id(slot0), id(slot1), id(slot2), id(current_display),
            id(prev_display), id(portrait), id(slot_flags));
          id(espframe_slideshow_dispatch).execute();

  # Display portrait pair when both left and right images are ready
  - id: immich_display_portrait_pair
    mode: single
    then:
      - script.execute: hide_connection_failed
      - lambda: |-
          id(portrait).is_pair = true;
          id(active_slot_displayed) = true;
          id(portrait).workflow_busy = false;
          lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          ESP_LOGI("immich", "PAIR displayed for slot %d", id(active_slot));
      - lvgl.image.update:
          id: portrait_left_img
          src: immich_portrait_left
      - lvgl.image.update:
          id: portrait_right_img
          src: immich_portrait_right
      - script.execute: extract_accent_color
      - script.execute: apply_warm_tones
      - script.execute: update_clock_display
      - script.execute: update_photo_metadata_display
      - script.execute: delayed_prefetch_chain

  # Refresh the photo date/location metadata overlay.
  - id: update_photo_metadata_display
    mode: single
    then:
      - lambda: |-
          std::string location_text;
          std::string date_text;
          if (id(active_slot_displayed)) {
            if (id(photo_metadata_location_enabled).state && !id(current_display).location.empty()) {
              location_text = id(current_display).location;
            }
            if (id(photo_metadata_date_enabled).state) {
              if (id(photo_metadata_date_format).current_option() == "Date Taken") {
                date_text = id(current_display).date;
              } else {
                auto now = id(sntp_time).now();
                if (now.is_valid()) {
                  date_text = format_photo_age(id(current_display).year, id(current_display).month, id(current_display).day,
                                               now.year, now.month, now.day_of_month);
                }
              }
            }
          }

          const bool has_location = !location_text.empty();
          const bool has_date = !date_text.empty();
          lv_label_set_text(id(photo_metadata_location_label), location_text.c_str());
          lv_label_set_text(id(photo_metadata_location_label_shadow), location_text.c_str());
          lv_label_set_text(id(photo_metadata_date_label), date_text.c_str());
          lv_label_set_text(id(photo_metadata_date_label_shadow), date_text.c_str());

          if (has_location) {
            lv_obj_clear_flag(id(photo_metadata_location_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(photo_metadata_location_label_shadow), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(photo_metadata_location_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(photo_metadata_location_label_shadow), LV_OBJ_FLAG_HIDDEN);
          }
          if (has_date) {
            lv_obj_clear_flag(id(photo_metadata_date_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(photo_metadata_date_label_shadow), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(photo_metadata_date_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(photo_metadata_date_label_shadow), LV_OBJ_FLAG_HIDDEN);
          }

          const int32_t metadata_width = ${metadata_overlay_width};
          const int32_t metadata_height = (has_location && has_date) ? 104 : 52;
          lv_obj_set_width(id(photo_metadata_overlay), metadata_width);
          lv_obj_set_width(id(photo_metadata_shadow_row), metadata_width);
          lv_obj_set_width(id(photo_metadata_row), metadata_width);
          lv_obj_set_height(id(photo_metadata_overlay), metadata_height);
          lv_obj_set_height(id(photo_metadata_shadow_row), metadata_height);
          lv_obj_set_height(id(photo_metadata_row), metadata_height);

          lv_obj_set_width(id(photo_metadata_location_label), LV_SIZE_CONTENT);
          lv_obj_set_width(id(photo_metadata_location_label_shadow), LV_SIZE_CONTENT);
          lv_obj_set_width(id(photo_metadata_date_label), LV_SIZE_CONTENT);
          lv_obj_set_width(id(photo_metadata_date_label_shadow), LV_SIZE_CONTENT);
          lv_obj_update_layout(id(photo_metadata_row));
          const int32_t row_width = lv_obj_get_width(id(photo_metadata_row));
          const int32_t max_metadata_width = row_width > 0 ? row_width : metadata_width;
          if (has_location && max_metadata_width > 0) {
            const int32_t natural_location_width = lv_obj_get_width(id(photo_metadata_location_label));
            const int32_t location_width = natural_location_width < max_metadata_width ? natural_location_width : max_metadata_width;
            lv_obj_set_width(id(photo_metadata_location_label), location_width);
            lv_obj_set_width(id(photo_metadata_location_label_shadow), location_width);
          }
          if (has_date && max_metadata_width > 0) {
            const int32_t natural_date_width = lv_obj_get_width(id(photo_metadata_date_label));
            const int32_t date_width = natural_date_width < max_metadata_width ? natural_date_width : max_metadata_width;
            lv_obj_set_width(id(photo_metadata_date_label), date_width);
            lv_obj_set_width(id(photo_metadata_date_label_shadow), date_width);
          }

          if (!has_location && !has_date) {
            lv_obj_add_flag(id(photo_metadata_overlay), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(photo_metadata_overlay), LV_OBJ_FLAG_HIDDEN);
          }

  # Prefetch chain: fill the next empty slot(s) ahead of active_slot (skipped when backlight paused)
  - id: immich_prefetch_chain
    mode: single
    then:
      - lambda: |-
          id(espframe_core).slideshow().request_prefetch(
            id(backlight_paused),
            id(immich_retry_cooldown_until_ms) != 0 && millis() < id(immich_retry_cooldown_until_ms),
            millis(), id(last_prefetch_start_ms), id(active_slot), id(target_slot),
            id(slot0), id(slot1), id(slot2), id(slot_flags), id(fetch_queue), id(portrait),
            id(active_slot_displayed), id(noncritical_remote_updates_in_flight), id(portrait_preload_slot),
            id(portrait_preload_left_ready), id(portrait_preload_right_ready));
          id(espframe_slideshow_dispatch).execute();

  # Run prefetch after short delay to avoid socket exhaustion when many callbacks fire at once
  - id: delayed_prefetch_chain
    mode: restart
    then:
      - delay: 500ms
      - script.execute: immich_prefetch_chain

  # Defer companion search when started from advance so interval callback returns quickly
  - id: deferred_companion_search
    mode: restart
    then:
      - delay: 200ms
      - script.execute: immich_fetch_portrait_companion

  # When advance finds slot not ready, defer fetch so interval callback returns quickly
  - id: deferred_fetch_into_slot
    mode: single
    then:
      - lambda: 'id(deferred_fetch_target) = id(target_slot);'
      - delay: 200ms
      - lambda: 'id(target_slot) = id(deferred_fetch_target);'
      - script.execute: immich_fetch_into_slot

  # Per-slot deferred update scripts — split from a single shared script to avoid
  # collisions when two API responses arrive within 150ms of each other.
  # Per-slot deferred update scripts — split to avoid collisions when two API
  # responses arrive within 150ms of each other.
  - id: deferred_slot0_image_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_deferred_slot_update(
            0, id(active_slot), id(slot_flags), id(portrait).workflow_busy,
            id(noncritical_remote_updates_in_flight));
          id(espframe_slideshow_dispatch).execute();

  - id: deferred_slot1_image_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_deferred_slot_update(
            1, id(active_slot), id(slot_flags), id(portrait).workflow_busy,
            id(noncritical_remote_updates_in_flight));
          id(espframe_slideshow_dispatch).execute();

  - id: deferred_slot2_image_update
    mode: single
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_deferred_slot_update(
            2, id(active_slot), id(slot_flags), id(portrait).workflow_busy,
            id(noncritical_remote_updates_in_flight));
          id(espframe_slideshow_dispatch).execute();

  - id: deferred_portrait_left_update
    mode: restart
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_portrait_left_update(id(portrait));
          id(espframe_slideshow_dispatch).execute();

  - id: deferred_portrait_right_update
    mode: restart
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_portrait_right_update(id(portrait));
          id(espframe_slideshow_dispatch).execute();

  - id: deferred_preload_left_update
    mode: restart
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_preload_left_update(
            id(portrait).workflow_busy, id(preload_noncritical_in_flight),
            id(noncritical_remote_updates_in_flight));
          id(espframe_slideshow_dispatch).execute();

  - id: deferred_preload_right_update
    mode: restart
    then:
      - delay: 150ms
      - lambda: |-
          id(espframe_core).slideshow().request_preload_right_update(
            id(portrait).workflow_busy, id(preload_noncritical_in_flight),
            id(noncritical_remote_updates_in_flight));
          id(espframe_slideshow_dispatch).execute();
