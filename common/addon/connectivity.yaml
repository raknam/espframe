# =============================================================================
# CONNECTIVITY - WiFi, captive portal, HTTP client
# =============================================================================
# Handles network connectivity and navigates between screens based on
# connection state using lvgl.page.show.
# =============================================================================

# -----------------------------------------------------------------------------
# SSL verification and HTTP client
# -----------------------------------------------------------------------------
substitutions:
  # Set to "true" to enable SSL certificate verification.
  # Default "false" allows self-signed certs common in home lab setups.
  immich_verify_ssl: "false"

http_request:
  id: http_req
  timeout: 20s
  verify_ssl: ${immich_verify_ssl}
  buffer_size_rx: 4096
  buffer_size_tx: 1024

# -----------------------------------------------------------------------------
# Captive portal and WiFi (connect / disconnect → page navigation)
# -----------------------------------------------------------------------------
captive_portal:

wifi:
  reboot_timeout: 0s
  ap:
    ssid: "${name}"
  on_connect:
    - script.stop: setup_screen_dim
    - script.stop: connection_failed_dim
    - script.stop: connection_failed_shift
    - lambda: |-
        lv_bar_set_value(id(loading_progress_bar), 100, LV_ANIM_OFF);
        lv_label_set_text(id(loading_status_label), "Connected");
        lv_obj_align(id(connection_failed_content), LV_ALIGN_CENTER, 0, 0);
        lv_obj_add_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN);
    - delay: 800ms
    - if:
        condition:
          lambda: 'return !id(immich_url).state.empty() && !id(immich_api_key_text).state.empty();'
        then:
          - lvgl.page.show: slideshow_page
          - delay: 2s
          - if:
              condition:
                lambda: 'return !id(immich_fetch_started);'
              then:
                - lambda: 'id(target_slot) = 0;'
                - script.execute: immich_fetch_into_slot
        else:
          - lambda: |-
              auto ips = wifi::global_wifi_component->get_ip_addresses();
              if (!ips.empty()) {
                char ip_buf[esphome::network::IP_ADDRESS_BUFFER_SIZE];
                ips[0].str_to(ip_buf);
                std::string url = "http://" + std::string(ip_buf);
                lv_label_set_text(id(setup_ip_label), url.c_str());
              }
          - lvgl.page.show: immich_setup_page
          - script.execute: setup_screen_dim
  on_disconnect:
    - if:
        condition:
          lambda: 'return !id(boot_grace_period) && !id(immich_url).state.empty() && !id(immich_api_key_text).state.empty();'
        then:
          - lvgl.page.show: slideshow_page
          - script.stop: setup_screen_dim
          - lambda: |-
              if (id(last_photo_displayed_ms) == 0) {
                id(last_photo_displayed_ms) = millis();
              }
              lv_label_set_text(id(connection_failed_title), "WiFi disconnected");
              lv_label_set_text(id(connection_failed_subtitle), "Trying to reconnect in the background.\nYour slideshow will resume automatically.");
              lv_obj_clear_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN);
              id(immich_last_http_status) = 0;
              id(immich_retry_cooldown_until_ms) = millis() + 10000;
              clear_slot_fetch_in_flight(0, id(slot_flags));
              clear_slot_fetch_in_flight(1, id(slot_flags));
              clear_slot_fetch_in_flight(2, id(slot_flags));
          - script.execute: connection_failed_dim
          - script.execute: connection_failed_shift
        else:
          - if:
              condition:
                lambda: 'return !id(boot_grace_period);'
              then:
                - lvgl.page.show: wifi_setup_page
                - script.execute: setup_screen_dim
