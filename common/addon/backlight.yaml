# =============================================================================
# BACKLIGHT - Display brightness control
# =============================================================================
# Single monochromatic light entity driving the panel backlight output.
# Used by the backlight schedule and manual brightness controls; restore_mode
# ALWAYS_ON keeps the last brightness across reboots.
# =============================================================================

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    name: "Screen: Backlight"
    default_transition_length: 500ms
    restore_mode: ALWAYS_ON
    web_server:
      sorting_group_id: sg_screen
