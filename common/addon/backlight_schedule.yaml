# =============================================================================
# BACKLIGHT SCHEDULE & DAY/NIGHT BRIGHTNESS
# =============================================================================
# Scheduled on/off with download pausing, automatic day/night brightness
# based on sunrise/sunset calculation, and touch-to-sleep/wake gesture.
# =============================================================================

globals:
  - id: backlight_paused
    type: bool
    initial_value: 'false'
  - id: backlight_manual_off
    type: bool
    initial_value: 'false'
  - id: touch_started_while_off
    type: bool
    initial_value: 'false'
  - id: sunrise_hour
    type: int
    initial_value: '6'
  - id: sunrise_minute
    type: int
    initial_value: '0'
  - id: sunset_hour
    type: int
    initial_value: '18'
  - id: sunset_minute
    type: int
    initial_value: '0'
  - id: sunrise_sunset_valid
    type: bool
    initial_value: 'false'
  - id: last_schedule_state
    type: bool
    initial_value: 'true'
  - id: last_is_daytime
    type: bool
    initial_value: 'true'
  - id: manual_wake_ms
    type: uint32_t
    initial_value: '0'

# =============================================================================
# USER-CONFIGURABLE ENTITIES
# =============================================================================

switch:
  - platform: template
    name: "Screen: Schedule"
    id: schedule_enabled
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:clock-time-four-outline"
    web_server:
      sorting_group_id: sg_screen
    on_turn_on:
      then:
        - script.execute: backlight_check_schedule
    on_turn_off:
      then:
        - lambda: |-
            if (id(backlight_paused) && !id(backlight_manual_off)) {
              id(backlight_paused) = false;
              id(last_schedule_state) = true;
              id(backlight_apply_brightness).execute();
              id(immich_prefetch_chain).execute();
            }

number:
  - platform: template
    name: "Screen: Schedule On"
    id: schedule_on_hour
    internal: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6
    optimistic: true
    restore_value: true
    unit_of_measurement: "h"
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: backlight_check_schedule

  - platform: template
    name: "Screen: Schedule Off"
    id: schedule_off_hour
    internal: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 23
    optimistic: true
    restore_value: true
    unit_of_measurement: "h"
    icon: "mdi:weather-sunset-down"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: backlight_check_schedule

  - platform: template
    name: "Screen: Daytime Brightness"
    id: brightness_day
    internal: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: template
    name: "Screen: Nighttime Brightness"
    id: brightness_night
    internal: true
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: backlight_apply_brightness

# Sunrise/sunset times for dashboard display only; internal = not exposed to Home Assistant
text_sensor:
  - platform: template
    name: "Screen: Sunrise"
    id: sunrise_time_sensor
    internal: true
    entity_category: diagnostic
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_screen

  - platform: template
    name: "Screen: Sunset"
    id: sunset_time_sensor
    internal: true
    entity_category: diagnostic
    icon: "mdi:weather-sunset-down"
    web_server:
      sorting_group_id: sg_screen

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # ---------------------------------------------------------------------------
  # Determine correct brightness and apply it
  # ---------------------------------------------------------------------------
  - id: backlight_apply_brightness
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(backlight_paused);'
          then:
            - light.turn_off:
                id: backlight
                transition_length: 500ms
            - delay: 600ms
            - lvgl.pause:
                show_snow: true
          else:
            - lvgl.resume:
            - lambda: |-
                float pct;
                if (id(sunrise_sunset_valid)) {
                  auto now = id(sntp_time).now();
                  if (now.is_valid()) {
                    bool is_day = is_daytime(now.hour, now.minute,
                                             id(sunrise_hour), id(sunrise_minute),
                                             id(sunset_hour), id(sunset_minute));
                    id(last_is_daytime) = is_day;
                    pct = is_day ? id(brightness_day).state : id(brightness_night).state;
                  } else {
                    pct = id(brightness_day).state;
                  }
                } else {
                  pct = id(brightness_day).state;
                }
                float brightness = pct / 100.0f;
                auto call = id(backlight).turn_on();
                call.set_brightness(brightness);
                call.set_transition_length(500);
                call.perform();

  # ---------------------------------------------------------------------------
  # Check schedule and act (called by interval and on setting change)
  # ---------------------------------------------------------------------------
  - id: backlight_check_schedule
    mode: single
    then:
      - lambda: |-
          if (!id(schedule_enabled).state) return;
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          int current_hour = now.hour;
          int on_hour = (int)id(schedule_on_hour).state;
          int off_hour = (int)id(schedule_off_hour).state;

          bool in_window;
          if (on_hour < off_hour) {
            in_window = (current_hour >= on_hour && current_hour < off_hour);
          } else if (on_hour > off_hour) {
            in_window = (current_hour >= on_hour || current_hour < off_hour);
          } else {
            in_window = true;
          }

          if (in_window && id(backlight_paused) && !id(backlight_manual_off)) {
            ESP_LOGI("backlight", "Schedule: turning on (hour %d in window %d-%d)", current_hour, on_hour, off_hour);
            id(backlight_paused) = false;
            id(last_photo_displayed_ms) = millis();
            id(last_schedule_state) = true;
            id(backlight_apply_brightness).execute();
            id(immich_prefetch_chain).execute();
          } else if (!in_window && !id(backlight_paused)) {
            if (id(manual_wake_ms) != 0 && (millis() - id(manual_wake_ms)) < 120000) {
              return;
            }
            id(manual_wake_ms) = 0;
            ESP_LOGI("backlight", "Schedule: turning off (hour %d outside window %d-%d)", current_hour, on_hour, off_hour);
            id(backlight_paused) = true;
            id(backlight_manual_off) = false;
            id(last_schedule_state) = false;
            id(backlight_apply_brightness).execute();
          }

  # ---------------------------------------------------------------------------
  # Recalculate sunrise/sunset from timezone coordinates and current date
  # ---------------------------------------------------------------------------
  - id: backlight_recalc_sunrise_sunset
    mode: single
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          std::string tz_full = id(timezone_select).current_option();
          std::string tz_id = tz_full.substr(0, tz_full.find(" ("));
          float tz_offset = parse_tz_offset(tz_full);

          float lat, lon;
          if (!lookup_tz_coords(tz_id, lat, lon)) {
            ESP_LOGW("backlight", "No coordinates for timezone %s", tz_id.c_str());
            id(sunrise_sunset_valid) = false;
            return;
          }

          int rh, rm, sh, sm;
          calc_sunrise_sunset(now.year, now.month, now.day_of_month,
                              lat, lon, tz_offset, rh, rm, sh, sm);

          id(sunrise_hour) = rh;
          id(sunrise_minute) = rm;
          id(sunset_hour) = sh;
          id(sunset_minute) = sm;
          id(sunrise_sunset_valid) = true;

          id(sunrise_time_sensor).publish_state(format_time_12h(rh, rm));
          id(sunset_time_sensor).publish_state(format_time_12h(sh, sm));

          // Integer-only log: avoids newlib float formatting (_dtoa_r) during heap work under load.
          float alat = lat >= 0 ? lat : -lat;
          float alon = lon >= 0 ? lon : -lon;
          float atz = tz_offset >= 0 ? tz_offset : -tz_offset;
          int lat_c = (int)(alat * 100.0f + 0.5f);
          int lon_c = (int)(alon * 100.0f + 0.5f);
          int tz_c = (int)(atz * 10.0f + 0.5f);
          ESP_LOGI("backlight", "Sunrise %02d:%02d, Sunset %02d:%02d (lat=%s%d.%02d lon=%s%d.%02d tz=%s%d.%d)",
                   rh, rm, sh, sm,
                   lat < 0 ? "-" : "", lat_c / 100, lat_c % 100,
                   lon < 0 ? "-" : "", lon_c / 100, lon_c % 100,
                   tz_offset < 0 ? "-" : "", tz_c / 10, tz_c % 10);

          id(backlight_apply_brightness).execute();

  # ---------------------------------------------------------------------------
  # 3-second hold timer: turns off backlight if user holds for 3 seconds
  # Stopped on touch release. If it completes, backlight goes off.
  # ---------------------------------------------------------------------------
  - id: backlight_hold_timer
    mode: restart
    then:
      - delay: 3s
      - lambda: |-
          ESP_LOGI("backlight", "Manual off via 3s hold");
          id(backlight_manual_off) = true;
          id(backlight_paused) = true;
      - script.execute: backlight_apply_brightness

  # ---------------------------------------------------------------------------
  # Wake from manual off: restore brightness
  # ---------------------------------------------------------------------------
  - id: backlight_wake
    mode: single
    then:
      - lambda: |-
          id(backlight_manual_off) = false;
          id(backlight_paused) = false;
          id(manual_wake_ms) = millis();
          id(last_photo_displayed_ms) = millis();
          ESP_LOGI("backlight", "Wake: restoring brightness");
      - script.execute: backlight_apply_brightness
      - script.execute: immich_prefetch_chain

  # ---------------------------------------------------------------------------
  # Periodic brightness check (called from the unified 60s interval)
  # ---------------------------------------------------------------------------
  - id: backlight_periodic_check
    mode: single
    then:
      - script.execute: backlight_check_schedule
      - if:
          condition:
            lambda: |-
              if (!id(sunrise_sunset_valid) || id(backlight_paused)) return false;
              auto now = id(sntp_time).now();
              if (!now.is_valid()) return false;
              bool is_day = is_daytime(now.hour, now.minute,
                                       id(sunrise_hour), id(sunrise_minute),
                                       id(sunset_hour), id(sunset_minute));
              if (is_day != id(last_is_daytime)) {
                id(last_is_daytime) = is_day;
                return true;
              }
              return false;
          then:
            - script.execute: backlight_apply_brightness
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();
              return now.is_valid() && now.hour == 0 && now.minute == 0;
          then:
            - script.execute: backlight_recalc_sunrise_sunset

