# =============================================================================
# FACTORY FIRMWARE - Web Installer Build
# =============================================================================
# Secrets-free config for the ESPHome web installer. Boots into AP mode
# for WiFi setup via captive portal.
# =============================================================================

substitutions:
  name: "immich-frame-10inch"
  friendly_name: "Immich Frame 10inch"
  firmware_version: "0.0.0"

esphome:
  project:
    name: jtenniswood.immich-frame
    version: "${firmware_version}"

packages:
  espframe: !include packages.yaml

web_server:
  port: 80
  version: 3
  css_url: ""
  js_url: ""
  css_include: "../docs/public/webserver/style.css"
  js_include: "../docs/public/webserver/app.js"

globals:
  - id: update_check_counter
    type: int
    initial_value: '0'

ota:
  - platform: http_request

update:
  - platform: http_request
    id: firmware_update
    name: Firmware Update
    source: https://jtenniswood.github.io/espframe/firmware/manifest.json
    update_interval: never
    on_update_available:
      then:
        - if:
            condition:
              lambda: 'return id(auto_update_switch).state;'
            then:
              - update.perform: firmware_update

  - platform: http_request
    id: firmware_update_beta
    name: Firmware Update Beta
    source: https://jtenniswood.github.io/espframe/firmware/beta/manifest.json
    update_interval: never
    internal: true

switch:
  - platform: template
    name: "Auto Update"
    id: auto_update_switch
    icon: "mdi:update"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

select:
  - platform: template
    name: "Update Frequency"
    id: update_frequency_select
    icon: "mdi:timer-outline"
    options:
      - "Hourly"
      - "Daily"
      - "Weekly"
    initial_option: "Daily"
    optimistic: true
    restore_value: true

interval:
  - interval: 1h
    then:
      - lambda: |-
          if (!id(auto_update_switch).state) return;
          int counter = id(update_check_counter);
          std::string freq = id(update_frequency_select).state;
          int threshold = 24;
          if (freq == "Hourly") threshold = 1;
          else if (freq == "Weekly") threshold = 168;
          if (counter % threshold == 0) {
            id(firmware_update).update();
          }
          id(update_check_counter) = counter + 1;

text_sensor:
  - platform: template
    name: Firmware Version
    icon: "mdi:tag"
    lambda: 'return {"${firmware_version}"};'

button:
  - platform: template
    name: Check for Update
    icon: "mdi:update"
    on_press:
      - component.update: firmware_update
      - component.update: firmware_update_beta
