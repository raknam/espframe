# =============================================================================
# PACKAGES - ESPHome include manifest
# =============================================================================
# Pulls in device config, assets (fonts/icons), LVGL base, addons (connectivity,
# Immich, backlight, time, display effects, firmware update, network), and
# screen definitions (loading, WiFi setup, Immich setup, slideshow). Load order
# follows dependencies: device and assets first, then addons and screens.
# =============================================================================

packages:
  # ---------------------------------------------------------------------------
  # Device, assets, and LVGL base
  # ---------------------------------------------------------------------------
  device:          !include device/device.yaml
  fonts:           !include assets/fonts.yaml
  icons:           !include assets/icons.yaml
  lvgl_base:       !include device/lvgl_base.yaml
  # ---------------------------------------------------------------------------
  # Addons: connectivity and Immich config/filter
  # ---------------------------------------------------------------------------
  connectivity:    !include addon/connectivity.yaml
  immich_config:   !include addon/immich_config.yaml
  immich_filter:   !include addon/immich_filter.yaml
  # ---------------------------------------------------------------------------
  # Addons: backlight, time, display effects
  # ---------------------------------------------------------------------------
  backlight:       !include addon/backlight.yaml
  backlight_sched: !include addon/backlight_schedule.yaml
  time_sync:       !include addon/time.yaml
  accent_color:    !include addon/accent_color.yaml
  warm_tones:      !include addon/warm_tones.yaml
  # ---------------------------------------------------------------------------
  # Screens (loading, WiFi setup, Immich setup, slideshow)
  # ---------------------------------------------------------------------------
  screen_loading:  !include device/screen_loading.yaml
  screen_wifi:     !include device/screen_wifi_setup.yaml
  screen_setup:    !include device/screen_immich_setup.yaml
  immich_api:      !include addon/immich_api.yaml
  immich_slide:    !include addon/immich_slideshow.yaml
  screen_slide:    !include device/screen_slideshow.yaml
  # ---------------------------------------------------------------------------
  # Addons: firmware update and network diagnostics
  # ---------------------------------------------------------------------------
  fw_update:       !include addon/firmware_update.yaml
  network:         !include addon/network.yaml
