# =============================================================================
# HARDWARE CONFIGURATION - Guition ESP32-P4-JC8012P4A1
# =============================================================================
# Base device config: ESP32-P4 host, ESP32-C6 coprocessor (WiFi/BT over SDIO),
# PSRAM, display (MIPI DSI JC8012P4A1), touch (GSL3680), backlight, I2C. Also
# API, logger, web server, OTA, and espframe external components. Display is
# 800×1280 logical (rotation 90); OTA dims backlight before apply.
# =============================================================================

# -----------------------------------------------------------------------------
# Build and log
# -----------------------------------------------------------------------------
substitutions:
  package_ref: "main"
  log_level: "INFO"

esp32:
  variant: ESP32P4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_HTTPD_MAX_URI_LEN: "128"
    advanced:
      enable_idf_experimental_features: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"

# -----------------------------------------------------------------------------
# ESP32-C6 coprocessor (WiFi and Bluetooth via SDIO)
# -----------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# -----------------------------------------------------------------------------
# PSRAM (hex mode, 200 MHz)
# -----------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# -----------------------------------------------------------------------------
# API, logger, JSON, web server, OTA, debug (reset reason for crash diagnosis)
# -----------------------------------------------------------------------------
api:
  reboot_timeout: 0s

logger:
  level: ${log_level}
  logs:
    component: WARN
    remote_image: WARN
    immich: INFO
    warm: WARN
    accent: WARN

debug:
  update_interval: 60s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"

json:

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: "https://jtenniswood.github.io/espframe/webserver/app.js"
  sorting_groups:
    - id: sg_connection
      name: "Connection"
      sorting_weight: 10
    - id: sg_photos
      name: "Photos"
      sorting_weight: 20
    - id: sg_screen
      name: "Screen"
      sorting_weight: 30
    - id: sg_clock
      name: "Clock"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40

ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off:
            id: backlight
            transition_length: 300ms
        - delay: 350ms

# -----------------------------------------------------------------------------
# External components (espframe: gsl3680, remote_image, espframe)
# -----------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espframe
      ref: ${package_ref}
      path: components
    components: [gsl3680, remote_image, espframe]
    refresh: 0s

espframe:

# -----------------------------------------------------------------------------
# DSI PHY power rail, backlight output, I2C
# -----------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

# -----------------------------------------------------------------------------
# MIPI DSI display (JC8012P4A1, 800×1280, rotation 90)
# -----------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    model: JC8012P4A1
    id: tft_display
    reset_pin: GPIO27
    auto_clear_enabled: false
    update_interval: never
    color_order: RGB
    dimensions:
      width: 800
      height: 1280

# -----------------------------------------------------------------------------
# Touch (GSL3680, transform for orientation)
# -----------------------------------------------------------------------------
touchscreen:
  - platform: gsl3680
    id: tft_touch
    display: tft_display
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false
