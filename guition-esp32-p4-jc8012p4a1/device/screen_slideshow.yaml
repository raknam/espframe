# =============================================================================
# SCREEN: IMMICH SLIDESHOW
# =============================================================================
# LVGL page layout, user settings, slideshow timer, and touch gesture handling.
# Image ring buffer and display scripts are in immich_slideshow.yaml.
# API fetch scripts are in immich_api.yaml.
# =============================================================================

substitutions:
  immich_slide_interval: "2 minutes"
  slideshow_check_interval: "5s"

# =============================================================================
# LVGL UI
# =============================================================================

lvgl:
  pages:
    - id: slideshow_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_img_0
            scrollable: false
            clickable: true
            on_press:
              then:
                - lambda: |-
                    id(touch_started_while_off) = !id(backlight).current_values.is_on();
                    if (id(touch_started_while_off)) {
                      id(backlight_wake).execute();
                    } else {
                      id(backlight_hold_timer).execute();
                    }
            on_short_click:
              then:
                - if:
                    condition:
                      lambda: 'return !id(touch_started_while_off);'
                    then:
                      - lambda: |-
                          uint32_t now = millis();
                          if (id(last_short_tap_ms) != 0 && (now - id(last_short_tap_ms)) < 400) {
                            id(last_short_tap_ms) = 0;
                            id(immich_advance_forward).execute();
                          } else {
                            id(last_short_tap_ms) = now;
                          }
            on_release:
              then:
                - script.stop: backlight_hold_timer
        - obj:
            id: portrait_pair_container
            align: CENTER
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            pad_all: 0
            scrollable: false
            hidden: true
            clickable: true
            layout:
              type: flex
              flex_flow: ROW
            on_press:
              then:
                - lambda: |-
                    id(touch_started_while_off) = !id(backlight).current_values.is_on();
                    if (id(touch_started_while_off)) {
                      id(backlight_wake).execute();
                    } else {
                      id(backlight_hold_timer).execute();
                    }
            on_short_click:
              then:
                - if:
                    condition:
                      lambda: 'return !id(touch_started_while_off);'
                    then:
                      - lambda: |-
                          uint32_t now = millis();
                          if (id(last_short_tap_ms) != 0 && (now - id(last_short_tap_ms)) < 400) {
                            id(last_short_tap_ms) = 0;
                            id(immich_advance_forward).execute();
                          } else {
                            id(last_short_tap_ms) = now;
                          }
            on_release:
              then:
                - script.stop: backlight_hold_timer
            widgets:
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_left_img
                        src: immich_portrait_left
                        align: CENTER
                        scrollable: false
                        clickable: false
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_right_img
                        src: immich_portrait_right
                        align: CENTER
                        scrollable: false
                        clickable: false
        - obj:
            id: info_overlay
            align: BOTTOM_LEFT
            x: 45
            y: -10
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_cross: START
              pad_column: 40
            widgets:
              - obj:
                  id: clock_container
                  hidden: true
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: time_label_shadow
                        x: 2
                        y: 2
                        text: ""
                        text_color: 0x000000
                        text_opa: 50%
                        text_font: roboto_light150_font
                    - label:
                        id: time_label
                        x: 0
                        y: 0
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: roboto_light150_font
        - obj:
            id: connection_failed_overlay
            align: CENTER
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: true
            hidden: true
            on_press:
              then:
                - script.stop: connection_failed_dim
                - script.execute: backlight_apply_brightness
                - script.execute: connection_failed_dim
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: 20
            widgets:
              - label:
                  text_font: icon_font_setup
                  text: $icon_cloud_off
                  text_color: 0xFFFFFF
              - label:
                  text: "Unable to connect to Immich"
                  text_font: roboto_light46_font
                  text_color: 0xFFFFFF
                  text_align: center
              - label:
                  text: "Unable to load photos, check your\nconnection and the health of your Immich server."
                  width: 700
                  text_font: roboto30_font
                  text_color: 0x888888
                  text_align: center

# =============================================================================
# CONNECTION FAILED DIM TIMER
# =============================================================================
# Dims the backlight after 120s of showing the connection failed overlay to
# prevent burn-in from the static message. Touch restores brightness.
# =============================================================================

script:
  - id: connection_failed_dim
    mode: restart
    then:
      - delay: 120s
      - light.turn_on:
          id: backlight
          brightness: 50%
          transition_length: 2s

# =============================================================================
# USER-CONFIGURABLE SETTINGS
# =============================================================================

select:
  - platform: template
    name: "Photos: Slideshow Interval"
    id: slideshow_interval
    options:
      - "30 seconds"
      - "45 seconds"
      - "1 minute"
      - "2 minutes"
      - "3 minutes"
      - "5 minutes"
      - "10 minutes"
    initial_option: ${immich_slide_interval}
    optimistic: true
    restore_value: true
    icon: "mdi:timer-outline"


# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: ${slideshow_check_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (!id(immich_fetch_started)) return false;
              if (id(backlight_paused)) return false;
              std::string opt = id(slideshow_interval).current_option();
              int num = atoi(opt.c_str());
              uint32_t seconds = (opt.find("minute") != std::string::npos) ? num * 60 : num;
              return (millis() - id(immich_last_advance_ms)) >= (seconds * 1000);
          then:
            - script.execute: immich_advance_forward
      - if:
          condition:
            lambda: |-
              if (id(last_photo_displayed_ms) == 0) return false;
              if (id(backlight_paused)) return false;
              std::string opt = id(slideshow_interval).current_option();
              int num = atoi(opt.c_str());
              uint32_t seconds = (opt.find("minute") != std::string::npos) ? num * 60 : num;
              return (millis() - id(last_photo_displayed_ms)) >= (seconds * 3 * 1000);
          then:
            - lambda: |-
                if (lv_obj_has_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN)) {
                  ESP_LOGE("immich", "No photo displayed for 3x interval, showing connection failed screen");
                }
                lv_obj_clear_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN);
                id(immich_download_retries) = 0;
            - script.execute: connection_failed_dim
            - lambda: |-
                int s = id(active_slot);
                bool in_flight = (s == 0) ? id(slot0_fetch_in_flight) : (s == 1) ? id(slot1_fetch_in_flight) : id(slot2_fetch_in_flight);
                if (!in_flight) {
                  id(target_slot) = s;
                  id(immich_fetch_into_slot).execute();
                }


