# =============================================================================
# SCREEN: IMMICH SLIDESHOW
# =============================================================================
# LVGL page layout, user settings, slideshow timer, and touch gesture handling.
# Image ring buffer and display scripts are in immich_slideshow.yaml.
# API fetch scripts are in immich_api.yaml.
# =============================================================================

substitutions:
  immich_slide_interval: "15 seconds"
  slideshow_check_interval: "5s"

# =============================================================================
# LVGL UI
# =============================================================================

lvgl:
  pages:
    - id: slideshow_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_img_0
            scrollable: false
            clickable: true
            on_press:
              then:
                - lambda: |-
                    id(touch_started_while_off) = !id(backlight).current_values.is_on();
                    if (id(touch_started_while_off)) {
                      id(backlight_wake).execute();
                    } else {
                      id(backlight_hold_timer).execute();
                    }
            on_short_click:
              then:
                - if:
                    condition:
                      lambda: 'return !id(touch_started_while_off);'
                    then:
                      - lambda: |-
                          uint32_t now = millis();
                          if (id(last_short_tap_ms) != 0 && (now - id(last_short_tap_ms)) < 400) {
                            id(last_short_tap_ms) = 0;
                            id(immich_advance_forward).execute();
                          } else {
                            id(last_short_tap_ms) = now;
                          }
            on_release:
              then:
                - script.stop: backlight_hold_timer
        - obj:
            id: portrait_pair_container
            align: CENTER
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            pad_all: 0
            scrollable: false
            hidden: true
            clickable: true
            layout:
              type: flex
              flex_flow: ROW
            on_press:
              then:
                - lambda: |-
                    id(touch_started_while_off) = !id(backlight).current_values.is_on();
                    if (id(touch_started_while_off)) {
                      id(backlight_wake).execute();
                    } else {
                      id(backlight_hold_timer).execute();
                    }
            on_short_click:
              then:
                - if:
                    condition:
                      lambda: 'return !id(touch_started_while_off);'
                    then:
                      - lambda: |-
                          uint32_t now = millis();
                          if (id(last_short_tap_ms) != 0 && (now - id(last_short_tap_ms)) < 400) {
                            id(last_short_tap_ms) = 0;
                            id(immich_advance_forward).execute();
                          } else {
                            id(last_short_tap_ms) = now;
                          }
            on_release:
              then:
                - script.stop: backlight_hold_timer
            widgets:
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_left_img
                        src: immich_portrait_left
                        align: CENTER
                        scrollable: false
                        clickable: false
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_right_img
                        src: immich_portrait_right
                        align: CENTER
                        scrollable: false
                        clickable: false
        - obj:
            id: info_overlay
            align: BOTTOM_LEFT
            x: 45
            y: -10
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_cross: START
              pad_column: 40
            widgets:
              - obj:
                  id: clock_container
                  hidden: true
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: time_label_shadow
                        x: 2
                        y: 2
                        text: ""
                        text_color: 0x000000
                        text_opa: 50%
                        text_font: roboto_light150_font
                    - label:
                        id: time_label
                        x: 0
                        y: 0
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: roboto_light150_font

# =============================================================================
# USER-CONFIGURABLE SETTINGS
# =============================================================================

select:
  - platform: template
    name: "Photos: Slideshow Interval"
    id: slideshow_interval
    options:
      - "10 seconds"
      - "15 seconds"
      - "20 seconds"
      - "30 seconds"
      - "45 seconds"
      - "1 minute"
      - "2 minutes"
      - "3 minutes"
      - "5 minutes"
      - "10 minutes"
    initial_option: ${immich_slide_interval}
    optimistic: true
    restore_value: true
    icon: "mdi:timer-outline"


# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: ${slideshow_check_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (!id(immich_fetch_started)) return false;
              if (id(backlight_paused)) return false;
              std::string opt = id(slideshow_interval).current_option();
              int num = atoi(opt.c_str());
              uint32_t seconds = (opt.find("minute") != std::string::npos) ? num * 60 : num;
              return (millis() - id(immich_last_advance_ms)) >= (seconds * 1000);
          then:
            - script.execute: immich_advance_forward


