# =============================================================================
# SCREEN: IMMICH SLIDESHOW
# =============================================================================
# LVGL page layout, user settings, slideshow timer, and touch gesture handling.
# Image ring buffer and display scripts are in immich_slideshow.yaml.
# API fetch scripts are in immich_api.yaml.
# =============================================================================

substitutions:
  immich_slide_interval_seconds: "15"
  info_overlay_timeout_seconds: "0"
  slideshow_check_interval: "5s"

# =============================================================================
# LVGL UI
# =============================================================================

lvgl:
  pages:
    - id: slideshow_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_img_0
            scrollable: false
            clickable: true
            on_press:
              then:
                - script.execute: handle_touch_press
            on_release:
              then:
                - script.execute: handle_touch_release
            on_long_press:
              then:
                - script.execute: immich_advance_forward
        - obj:
            id: portrait_pair_container
            align: CENTER
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            pad_all: 0
            scrollable: false
            hidden: true
            clickable: true
            layout:
              type: flex
              flex_flow: ROW
            on_press:
              then:
                - script.execute: handle_touch_press
            on_release:
              then:
                - script.execute: handle_touch_release
            on_long_press:
              then:
                - script.execute: immich_advance_forward
            widgets:
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_left_img
                        src: immich_portrait_left
                        align: CENTER
                        scrollable: false
                        clickable: false
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_right_img
                        src: immich_portrait_right
                        align: CENTER
                        scrollable: false
                        clickable: false
        - obj:
            id: info_overlay
            align: BOTTOM_LEFT
            x: 45
            y: -10
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_cross: START
              pad_column: 40
            widgets:
              - obj:
                  id: clock_container
                  hidden: true
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: time_label_shadow
                        x: 2
                        y: 2
                        text: ""
                        text_color: 0x000000
                        text_opa: 50%
                        text_font: roboto_light150_font
                    - label:
                        id: time_label
                        x: 0
                        y: 0
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: roboto_light150_font
              - obj:
                  id: metadata_container
                  hidden: true
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  pad_top: 25
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    pad_row: 8
                  widgets:
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: 0%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: time_ago_label_shadow
                              x: 2
                              y: 2
                              text: ""
                              text_color: 0x000000
                              text_opa: 50%
                              text_font: roboto_light46_font
                          - label:
                              id: time_ago_label
                              x: 0
                              y: 0
                              text: ""
                              text_color: 0xFFFFFF
                              text_font: roboto_light46_font
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: 0%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: location_label_shadow
                              x: 2
                              y: 2
                              text: ""
                              text_color: 0x000000
                              text_opa: 50%
                              text_font: roboto_light32_font
                          - label:
                              id: location_label
                              x: 0
                              y: 0
                              text: ""
                              text_color: 0xFFFFFF
                              text_font: roboto_light32_font

# =============================================================================
# USER-CONFIGURABLE SETTINGS
# =============================================================================

number:
  - platform: template
    name: "Slideshow Interval"
    id: slideshow_interval
    min_value: 5
    max_value: 300
    step: 5
    initial_value: ${immich_slide_interval_seconds}
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"

  - platform: template
    name: "Info Overlay Timeout"
    id: info_overlay_timeout
    min_value: 0
    max_value: 30
    step: 1
    initial_value: ${info_overlay_timeout_seconds}
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:eye-timer-outline"

switch:
  - platform: template
    name: "Show Photo Metadata"
    id: show_photo_metadata
    optimistic: true
    restore_value: true
    icon: "mdi:image-text"

# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: ${slideshow_check_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (!id(immich_fetch_started)) return false;
              uint32_t interval_ms = (uint32_t)(id(slideshow_interval).state * 1000);
              return (millis() - id(immich_last_advance_ms)) >= interval_ms;
          then:
            - script.execute: immich_advance_forward

# =============================================================================
# TOUCH / GESTURE SCRIPTS
# =============================================================================

script:
  - id: handle_touch_press
    mode: single
    then:
      - lambda: |-
          lv_point_t point;
          lv_indev_get_point(lv_indev_get_act(), &point);
          id(touch_start_x) = point.x;

  - id: handle_touch_release
    mode: single
    then:
      - lambda: |-
          lv_point_t point;
          lv_indev_get_point(lv_indev_get_act(), &point);
          int dx = point.x - id(touch_start_x);
          if (dx < -SWIPE_THRESHOLD_PX) {
            id(immich_advance_forward).execute();
          } else if (dx > SWIPE_THRESHOLD_PX) {
            id(immich_show_previous).execute();
          } else if (id(show_photo_metadata).state) {
            if (lv_obj_has_flag(id(metadata_container), LV_OBJ_FLAG_HIDDEN)) {
              lv_obj_clear_flag(id(metadata_container), LV_OBJ_FLAG_HIDDEN);
              id(hide_info_overlay).execute();
            } else {
              lv_obj_add_flag(id(metadata_container), LV_OBJ_FLAG_HIDDEN);
              id(hide_info_overlay).stop();
            }
          }
  - id: hide_info_overlay
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(info_overlay_timeout).state > 0;'
          then:
            - delay: !lambda 'return (uint32_t)(id(info_overlay_timeout).state * 1000);'
            - lambda: 'lv_obj_add_flag(id(metadata_container), LV_OBJ_FLAG_HIDDEN);'

