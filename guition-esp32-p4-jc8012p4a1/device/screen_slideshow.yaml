# =============================================================================
# SCREEN: IMMICH SLIDESHOW
# =============================================================================
# LVGL page layout, user settings, slideshow timer, and touch gesture handling.
# Image ring buffer and display scripts are in immich_slideshow.yaml.
# API fetch scripts are in immich_api.yaml.
# =============================================================================

substitutions:
  immich_slide_interval_seconds: "15"
  slideshow_check_interval: "5s"

# =============================================================================
# LVGL UI
# =============================================================================

lvgl:
  pages:
    - id: slideshow_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_img_0
            scrollable: false
            clickable: true
            on_press:
              then:
                - lambda: |-
                    id(touch_started_while_off) = !id(backlight).current_values.is_on();
                    if (id(touch_started_while_off)) {
                      id(backlight_wake).execute();
                    } else {
                      id(backlight_hold_timer).execute();
                    }
            on_long_press:
              then:
                - if:
                    condition:
                      lambda: 'return !id(touch_started_while_off);'
                    then:
                      - script.execute: immich_advance_forward
            on_release:
              then:
                - script.stop: backlight_hold_timer
        - obj:
            id: portrait_pair_container
            align: CENTER
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            pad_all: 0
            scrollable: false
            hidden: true
            clickable: true
            layout:
              type: flex
              flex_flow: ROW
            on_press:
              then:
                - lambda: |-
                    id(touch_started_while_off) = !id(backlight).current_values.is_on();
                    if (id(touch_started_while_off)) {
                      id(backlight_wake).execute();
                    } else {
                      id(backlight_hold_timer).execute();
                    }
            on_long_press:
              then:
                - if:
                    condition:
                      lambda: 'return !id(touch_started_while_off);'
                    then:
                      - script.execute: immich_advance_forward
            on_release:
              then:
                - script.stop: backlight_hold_timer
            widgets:
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_left_img
                        src: immich_portrait_left
                        align: CENTER
                        scrollable: false
                        clickable: false
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_right_img
                        src: immich_portrait_right
                        align: CENTER
                        scrollable: false
                        clickable: false
        - obj:
            id: info_overlay
            align: BOTTOM_LEFT
            x: 45
            y: -10
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_cross: START
              pad_column: 40
            widgets:
              - obj:
                  id: clock_container
                  hidden: true
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: time_label_shadow
                        x: 2
                        y: 2
                        text: ""
                        text_color: 0x000000
                        text_opa: 50%
                        text_font: roboto_light150_font
                    - label:
                        id: time_label
                        x: 0
                        y: 0
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: roboto_light150_font

# =============================================================================
# USER-CONFIGURABLE SETTINGS
# =============================================================================

number:
  - platform: template
    name: "Photos: Slideshow Interval"
    id: slideshow_interval
    object_id: slideshow_interval
    min_value: 5
    max_value: 300
    step: 5
    initial_value: ${immich_slide_interval_seconds}
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"


# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: ${slideshow_check_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (!id(immich_fetch_started)) return false;
              if (id(backlight_paused)) return false;
              uint32_t interval_ms = (uint32_t)(id(slideshow_interval).state * 1000);
              return (millis() - id(immich_last_advance_ms)) >= interval_ms;
          then:
            - script.execute: immich_advance_forward


