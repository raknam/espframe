# =============================================================================
# IMMICH SLIDESHOW - STANDALONE
# =============================================================================
# Self-contained digital photo frame powered by Immich.
# Fetches random images via the Immich API and displays them fullscreen
# on an LVGL-driven display with a metadata overlay.
# No Home Assistant or external dashboard dependency required.
# =============================================================================

substitutions:
  immich_slide_interval: "15s"
  immich_verify_ssl: "false"
  immich_error_backoff_cycles: "2"

http_request:
  id: http_req
  timeout: 10s
  verify_ssl: ${immich_verify_ssl}

globals:
  - id: immich_request_inflight
    type: bool
    initial_value: 'false'
  - id: immich_backoff_cycles
    type: int
    initial_value: '0'
  - id: immich_last_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_last_image_url
    type: std::string
    initial_value: '""'
  - id: immich_photo_date
    type: std::string
    initial_value: '""'
  - id: immich_photo_location
    type: std::string
    initial_value: '""'

# --- Backlight ---

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    name: "Backlight"
    default_transition_length: 500ms
    restore_mode: ALWAYS_ON

# --- Image fetcher ---

online_image:
  - id: immich_image
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x800
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: ${immich_api_key}
    on_download_finished:
      then:
        - lvgl.image.update:
            id: slideshow_img
            src: immich_image
        - lvgl.label.update:
            id: info_label
            text: !lambda |-
              std::string info = id(immich_photo_date);
              if (!id(immich_photo_location).empty()) {
                if (!info.empty()) info += "  \u2022  ";
                info += id(immich_photo_location);
              }
              return info.empty() ? std::string("Unknown") : info;
        - lvgl.label.update:
            id: status_label
            text: !lambda 'return id(immich_last_asset_id);'
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Image download/decode failed for URL: %s", id(immich_last_image_url).c_str());
        - lvgl.label.update:
            id: info_label
            text: ""
        - lvgl.label.update:
            id: status_label
            text: !lambda |-
              return std::string("Img fail: ") + id(immich_last_asset_id);

# --- LVGL UI ---

lvgl:
  buffer_size: 12%
  byte_order: little_endian
  displays:
    - tft_display
  pages:
    - id: main_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_image
            scrollable: false
        - obj:
            id: info_overlay
            align: BOTTOM_MID
            width: 100%
            height: 52
            bg_color: 0x000000
            bg_opa: 50%
            pad_left: 16
            pad_right: 16
            pad_top: 6
            pad_bottom: 6
            border_width: 0
            clickable: false
            widgets:
              - label:
                  id: info_label
                  x: 0
                  y: 0
                  text_color: 0xFFFFFF
                  text: ""
                  text_font: montserrat_18
              - label:
                  id: status_label
                  x: 0
                  y: 22
                  text_color: 0x888888
                  text: "Starting..."
                  text_font: montserrat_12

# --- Boot & slideshow timer ---

esphome:
  on_boot:
    - priority: -50
      then:
        - light.turn_on:
            id: backlight
            brightness: 100%
        - lvgl.label.update:
            id: status_label
            text: "Waiting for WiFi..."
        - wait_until:
            wifi.connected:
        - delay: 2s
        - lvgl.label.update:
            id: status_label
            text: !lambda |-
              auto ips = network::get_ip_addresses();
              if (!ips.empty()) return std::string("WiFi OK: ") + ips[0].str();
              return std::string("WiFi OK (no IP)");
        - delay: 3s
        - script.execute: immich_request_next_image

interval:
  - interval: ${immich_slide_interval}
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: immich_request_next_image

# --- Immich API logic ---

script:
  - id: immich_request_next_image
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_backoff_cycles) > 0;'
          then:
            - lambda: |-
                id(immich_backoff_cycles)--;
                ESP_LOGW("immich", "Backoff active, skipping (remaining=%d)", id(immich_backoff_cycles));
          else:
            - if:
                condition:
                  lambda: 'return id(immich_request_inflight);'
                then:
                  - logger.log:
                      level: WARN
                      tag: immich
                      format: "Previous request still in flight, skipping"
                else:
                  - lambda: 'id(immich_request_inflight) = true;'
                  - lvgl.label.update:
                      id: status_label
                      text: "Fetching..."
                  - http_request.post:
                      id: http_req
                      url: ${immich_base_url}/api/search/random
                      capture_response: true
                      max_response_buffer_size: 12kB
                      request_headers:
                        Content-Type: application/json
                        Accept: application/json
                        x-api-key: ${immich_api_key}
                      body: '{"size":1,"type":"IMAGE"}'
                      on_response:
                        then:
                          - lambda: |-
                              if (response->status_code != 200) {
                                auto msg = str_sprintf("HTTP %d from Immich", response->status_code);
                                ESP_LOGW("immich", "%s", msg.c_str());
                                id(immich_request_inflight) = false;
                                id(immich_backoff_cycles) = ${immich_error_backoff_cycles};
                                lv_label_set_text(id(status_label), msg.c_str());
                                return;
                              }

                              std::string asset_id;
                              std::string photo_date;
                              std::string photo_location;

                              auto doc = json::parse_json(body);
                              JsonObject asset;

                              if (!doc.isNull()) {
                                if (doc.is<JsonArray>()) {
                                  JsonArray arr = doc.as<JsonArray>();
                                  if (arr.size() > 0) asset = arr[0].as<JsonObject>();
                                } else if (doc.is<JsonObject>()) {
                                  asset = doc.as<JsonObject>();
                                }
                              }

                              if (asset.isNull()) {
                                ESP_LOGW("immich", "No asset in response body");
                                id(immich_request_inflight) = false;
                                id(immich_backoff_cycles) = ${immich_error_backoff_cycles};
                                return;
                              }

                              if (asset["id"].is<const char *>()) {
                                asset_id = asset["id"].as<std::string>();
                              }

                              if (asset_id.empty()) {
                                ESP_LOGW("immich", "No asset id in response");
                                id(immich_request_inflight) = false;
                                id(immich_backoff_cycles) = ${immich_error_backoff_cycles};
                                return;
                              }

                              // Parse date from localDateTime (already in local tz)
                              if (asset["localDateTime"].is<const char *>()) {
                                std::string raw = asset["localDateTime"].as<std::string>();
                                // Format "2024-01-15T14:30:00.000Z" -> "15 Jan 2024"
                                if (raw.size() >= 10) {
                                  int year = atoi(raw.substr(0, 4).c_str());
                                  int month = atoi(raw.substr(5, 2).c_str());
                                  int day = atoi(raw.substr(8, 2).c_str());
                                  const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                          "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                                  if (month >= 1 && month <= 12) {
                                    photo_date = str_sprintf("%d %s %d", day, months[month], year);
                                  }
                                }
                              }

                              // Parse location from exifInfo
                              JsonObject exif = asset["exifInfo"].as<JsonObject>();
                              if (!exif.isNull()) {
                                std::string city, country;
                                if (exif["city"].is<const char *>())
                                  city = exif["city"].as<std::string>();
                                if (exif["country"].is<const char *>())
                                  country = exif["country"].as<std::string>();

                                if (!city.empty() && !country.empty()) {
                                  photo_location = city + ", " + country;
                                } else if (!city.empty()) {
                                  photo_location = city;
                                } else if (!country.empty()) {
                                  photo_location = country;
                                }

                                // Fall back to exif date if localDateTime was missing
                                if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                                  std::string raw = exif["dateTimeOriginal"].as<std::string>();
                                  if (raw.size() >= 10) {
                                    int year = atoi(raw.substr(0, 4).c_str());
                                    int month = atoi(raw.substr(5, 2).c_str());
                                    int day = atoi(raw.substr(8, 2).c_str());
                                    const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                            "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                                    if (month >= 1 && month <= 12) {
                                      photo_date = str_sprintf("%d %s %d", day, months[month], year);
                                    }
                                  }
                                }
                              }

                              id(immich_last_asset_id) = asset_id;
                              id(immich_photo_date) = photo_date;
                              id(immich_photo_location) = photo_location;
                              id(immich_last_image_url) = std::string("${immich_base_url}") +
                                                          "/api/assets/" + asset_id +
                                                          "/thumbnail?size=preview";

                              ESP_LOGI("immich", "Asset: %s | Date: %s | Location: %s",
                                       asset_id.c_str(), photo_date.c_str(), photo_location.c_str());
                              ESP_LOGI("immich", "Image URL: %s", id(immich_last_image_url).c_str());
                          - lvgl.label.update:
                              id: status_label
                              text: !lambda |-
                                return std::string("Downloading: ") + id(immich_last_asset_id);
                          - online_image.set_url:
                              id: immich_image
                              url: !lambda 'return id(immich_last_image_url);'
                          - lambda: 'id(immich_request_inflight) = false;'
                      on_error:
                        then:
                          - lambda: |-
                              ESP_LOGW("immich", "Request error calling /api/search/random");
                              id(immich_request_inflight) = false;
                              id(immich_backoff_cycles) = ${immich_error_backoff_cycles};
                          - lvgl.label.update:
                              id: status_label
                              text: !lambda |-
                                return std::string("Conn error -> ${immich_base_url}");
