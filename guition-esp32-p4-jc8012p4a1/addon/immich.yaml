# =============================================================================
# IMMICH SLIDESHOW - STANDALONE
# =============================================================================
# Self-contained digital photo frame powered by Immich.
# Uses a 3-slot ring buffer of online_image components for instant forward
# swiping. Two images are prefetched ahead. Backward navigation re-downloads
# from a stored URL.
# =============================================================================

substitutions:
  immich_slide_interval: "15s"
  immich_verify_ssl: "false"

http_request:
  id: http_req
  timeout: 10s
  verify_ssl: ${immich_verify_ssl}

captive_portal:

wifi:
  ap: {}
  on_connect:
    - lambda: |-
        lv_bar_set_value(id(loading_progress_bar), 100, LV_ANIM_OFF);
    - delay: 800ms
    - lvgl.widget.hide: loading_screen
    - lvgl.widget.hide: wifi_setup_prompt
    - delay: 2s
    - lambda: 'id(target_slot) = 0;'
    - script.execute: immich_fetch_into_slot
  on_disconnect:
    - if:
        condition:
          lambda: 'return !id(boot_grace_period);'
        then:
          - lvgl.widget.show: wifi_setup_prompt

# =============================================================================
# GLOBALS
# =============================================================================

globals:
  # --- System ---
  - id: boot_grace_period
    type: bool
    initial_value: 'true'
  - id: immich_last_advance_ms
    type: uint32_t
    initial_value: '0'
  - id: immich_error_retries
    type: int
    initial_value: '0'
  - id: touch_start_x
    type: int
    initial_value: '0'

  # --- Ring buffer state ---
  - id: active_slot
    type: int
    initial_value: '0'
  - id: target_slot
    type: int
    initial_value: '0'
  - id: active_slot_displayed
    type: bool
    initial_value: 'false'
  - id: slot0_ready
    type: bool
    initial_value: 'false'
  - id: slot1_ready
    type: bool
    initial_value: 'false'
  - id: slot2_ready
    type: bool
    initial_value: 'false'

  # --- Current display metadata ---
  - id: immich_last_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_last_image_url
    type: std::string
    initial_value: '""'
  - id: immich_photo_date
    type: std::string
    initial_value: '""'
  - id: immich_photo_location
    type: std::string
    initial_value: '""'
  - id: immich_photo_year
    type: int
    initial_value: '0'
  - id: immich_photo_month
    type: int
    initial_value: '0'
  - id: immich_photo_person
    type: std::string
    initial_value: '""'

  # --- Previous image (for backward navigation) ---
  - id: immich_prev_valid
    type: bool
    initial_value: 'false'
  - id: immich_prev_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_prev_image_url
    type: std::string
    initial_value: '""'
  - id: immich_prev_date
    type: std::string
    initial_value: '""'
  - id: immich_prev_location
    type: std::string
    initial_value: '""'
  - id: immich_prev_year
    type: int
    initial_value: '0'
  - id: immich_prev_month
    type: int
    initial_value: '0'
  - id: immich_prev_person
    type: std::string
    initial_value: '""'

  # --- Slot 0 metadata ---
  - id: slot0_asset_id
    type: std::string
    initial_value: '""'
  - id: slot0_image_url
    type: std::string
    initial_value: '""'
  - id: slot0_date
    type: std::string
    initial_value: '""'
  - id: slot0_location
    type: std::string
    initial_value: '""'
  - id: slot0_year
    type: int
    initial_value: '0'
  - id: slot0_month
    type: int
    initial_value: '0'
  - id: slot0_person
    type: std::string
    initial_value: '""'

  # --- Slot 1 metadata ---
  - id: slot1_asset_id
    type: std::string
    initial_value: '""'
  - id: slot1_image_url
    type: std::string
    initial_value: '""'
  - id: slot1_date
    type: std::string
    initial_value: '""'
  - id: slot1_location
    type: std::string
    initial_value: '""'
  - id: slot1_year
    type: int
    initial_value: '0'
  - id: slot1_month
    type: int
    initial_value: '0'
  - id: slot1_person
    type: std::string
    initial_value: '""'

  # --- Slot 2 metadata ---
  - id: slot2_asset_id
    type: std::string
    initial_value: '""'
  - id: slot2_image_url
    type: std::string
    initial_value: '""'
  - id: slot2_date
    type: std::string
    initial_value: '""'
  - id: slot2_location
    type: std::string
    initial_value: '""'
  - id: slot2_year
    type: int
    initial_value: '0'
  - id: slot2_month
    type: int
    initial_value: '0'
  - id: slot2_person
    type: std::string
    initial_value: '""'

# =============================================================================
# BACKLIGHT
# =============================================================================

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    name: "Backlight"
    default_transition_length: 500ms
    restore_mode: ALWAYS_ON

# =============================================================================
# 3-SLOT IMAGE RING BUFFER
# =============================================================================

online_image:
  - id: immich_img_0
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: ${immich_api_key}
    on_download_finished:
      then:
        - lambda: |-
            id(slot0_ready) = true;
            id(immich_error_retries) = 0;
            ESP_LOGI("immich", "Slot 0 ready: %s", id(slot0_asset_id).c_str());
            if (id(active_slot) == 0) {
              id(immich_photo_date) = id(slot0_date);
              id(immich_photo_location) = id(slot0_location);
              id(immich_photo_year) = id(slot0_year);
              id(immich_photo_month) = id(slot0_month);
              id(immich_photo_person) = id(slot0_person);
              id(immich_last_asset_id) = id(slot0_asset_id);
              id(immich_last_image_url) = id(slot0_image_url);
              id(active_slot_displayed) = true;
            }
        - if:
            condition:
              lambda: 'return id(active_slot) == 0;'
            then:
              - script.execute: immich_display_current
        - script.execute: immich_prefetch_chain
    on_error:
      then:
        - lambda: |-
            id(immich_error_retries)++;
            ESP_LOGE("immich", "Slot 0 decode failed (attempt %d)", id(immich_error_retries));
        - if:
            condition:
              lambda: 'return id(immich_error_retries) < 3;'
            then:
              - delay: 2s
              - script.execute: immich_prefetch_chain
            else:
              - lambda: 'id(immich_error_retries) = 0;'

  - id: immich_img_1
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: ${immich_api_key}
    on_download_finished:
      then:
        - lambda: |-
            id(slot1_ready) = true;
            id(immich_error_retries) = 0;
            ESP_LOGI("immich", "Slot 1 ready: %s", id(slot1_asset_id).c_str());
            if (id(active_slot) == 1) {
              id(immich_photo_date) = id(slot1_date);
              id(immich_photo_location) = id(slot1_location);
              id(immich_photo_year) = id(slot1_year);
              id(immich_photo_month) = id(slot1_month);
              id(immich_photo_person) = id(slot1_person);
              id(immich_last_asset_id) = id(slot1_asset_id);
              id(immich_last_image_url) = id(slot1_image_url);
              id(active_slot_displayed) = true;
            }
        - if:
            condition:
              lambda: 'return id(active_slot) == 1;'
            then:
              - script.execute: immich_display_current
        - script.execute: immich_prefetch_chain
    on_error:
      then:
        - lambda: |-
            id(immich_error_retries)++;
            ESP_LOGE("immich", "Slot 1 decode failed (attempt %d)", id(immich_error_retries));
        - if:
            condition:
              lambda: 'return id(immich_error_retries) < 3;'
            then:
              - delay: 2s
              - script.execute: immich_prefetch_chain
            else:
              - lambda: 'id(immich_error_retries) = 0;'

  - id: immich_img_2
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: ${immich_api_key}
    on_download_finished:
      then:
        - lambda: |-
            id(slot2_ready) = true;
            id(immich_error_retries) = 0;
            ESP_LOGI("immich", "Slot 2 ready: %s", id(slot2_asset_id).c_str());
            if (id(active_slot) == 2) {
              id(immich_photo_date) = id(slot2_date);
              id(immich_photo_location) = id(slot2_location);
              id(immich_photo_year) = id(slot2_year);
              id(immich_photo_month) = id(slot2_month);
              id(immich_photo_person) = id(slot2_person);
              id(immich_last_asset_id) = id(slot2_asset_id);
              id(immich_last_image_url) = id(slot2_image_url);
              id(active_slot_displayed) = true;
            }
        - if:
            condition:
              lambda: 'return id(active_slot) == 2;'
            then:
              - script.execute: immich_display_current
        - script.execute: immich_prefetch_chain
    on_error:
      then:
        - lambda: |-
            id(immich_error_retries)++;
            ESP_LOGE("immich", "Slot 2 decode failed (attempt %d)", id(immich_error_retries));
        - if:
            condition:
              lambda: 'return id(immich_error_retries) < 3;'
            then:
              - delay: 2s
              - script.execute: immich_prefetch_chain
            else:
              - lambda: 'id(immich_error_retries) = 0;'

# =============================================================================
# LVGL UI
# =============================================================================

lvgl:
  buffer_size: 6%
  byte_order: little_endian
  displays:
    - tft_display
  pages:
    - id: main_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_img_0
            scrollable: false
            clickable: true
            on_press:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    id(touch_start_x) = point.x;
            on_release:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    int dx = point.x - id(touch_start_x);
                    if (dx < -80) {
                      id(immich_advance_forward).execute();
                    } else if (dx > 80) {
                      id(immich_show_previous).execute();
                    } else {
                      if (lv_obj_has_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN))
                        lv_obj_clear_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                      else
                        lv_obj_add_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                    }
            on_long_press:
              then:
                - script.execute: immich_advance_forward
        - obj:
            id: info_overlay
            align: BOTTOM_LEFT
            x: 45
            y: -10
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_cross: START
              pad_column: 20
            widgets:
              - obj:
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: time_label_shadow
                        x: 1
                        y: 1
                        text: ""
                        text_color: 0x000000
                        text_opa: 50%
                        text_font: roboto_light150_font
                    - label:
                        id: time_label
                        x: 0
                        y: 0
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: roboto_light150_font
              - obj:
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    pad_row: 8
                  widgets:
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: 0%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: time_ago_label_shadow
                              x: 1
                              y: 1
                              text: ""
                              text_color: 0x000000
                              text_opa: 50%
                              text_font: roboto_light46_font
                          - label:
                              id: time_ago_label
                              x: 0
                              y: 0
                              text: ""
                              text_color: 0xFFFFFF
                              text_font: roboto_light46_font
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: 0%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: location_label_shadow
                              x: 1
                              y: 1
                              text: ""
                              text_color: 0x000000
                              text_opa: 50%
                              text_font: roboto_light32_font
                          - label:
                              id: location_label
                              x: 0
                              y: 0
                              text: ""
                              text_color: 0xFFFFFF
                              text_font: roboto_light32_font
        - obj:
            id: loading_screen
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: false
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 40
                  widgets:
                    - label:
                        text: "Starting up"
                        text_font: roboto_light46_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - bar:
                        id: loading_progress_bar
                        width: 75
                        height: 4
                        bg_color: 0x333333
                        bg_opa: 100%
                        radius: 3
                        min_value: 0
                        max_value: 100
                        value: 0
                        indicator:
                          bg_color: 0xFFFFFF
                          radius: 3
        - obj:
            id: wifi_setup_prompt
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_wifi
                        text_color: 0xFFFFFF
                    - label:
                        text: "WiFi Setup"
                        text_font: roboto_light46_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - label:
                        id: wifi_setup_instructions
                        text: "Connect to the WiFi hotspot\nto configure your network"
                        text_font: roboto30_font
                        text_color: 0x888888
                        width: 700
                        text_align: center

# =============================================================================
# BOOT SEQUENCE
# =============================================================================

esphome:
  on_boot:
    - priority: -200
      then:
        - lambda: |-
            lv_bar_set_value(id(loading_progress_bar), 25, LV_ANIM_OFF);
        - delay: 100ms
        - light.turn_on:
            id: backlight
            brightness: 100%
            transition_length: 500ms
    - priority: -100
      then:
        - lambda: |-
            lv_bar_set_value(id(loading_progress_bar), 50, LV_ANIM_OFF);
        - lambda: |-
            std::string name = App.get_name();
            std::string wifi_text = "Connect to the WiFi hotspot\n'" + name + "'\nto configure your network";
            lv_label_set_text(id(wifi_setup_instructions), wifi_text.c_str());
        - delay: 10s
        - lambda: 'id(boot_grace_period) = false;'
        - lvgl.widget.hide: loading_screen
        - if:
            condition:
              not:
                wifi.connected:
            then:
              - lvgl.widget.show: wifi_setup_prompt

# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: ${immich_slide_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (!wifi::global_wifi_component->is_connected()) return false;
              uint32_t elapsed = millis() - id(immich_last_advance_ms);
              if (elapsed < 10000) {
                ESP_LOGD("immich", "Timer skipped, last advance %ums ago", elapsed);
                return false;
              }
              return true;
          then:
            - script.execute: immich_advance_forward

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # ---------------------------------------------------------------------------
  # Display whichever slot is active
  # ---------------------------------------------------------------------------
  - id: immich_display_current
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(active_slot) == 0;'
          then:
            - lvgl.image.update:
                id: slideshow_img
                src: immich_img_0
      - if:
          condition:
            lambda: 'return id(active_slot) == 1;'
          then:
            - lvgl.image.update:
                id: slideshow_img
                src: immich_img_1
      - if:
          condition:
            lambda: 'return id(active_slot) == 2;'
          then:
            - lvgl.image.update:
                id: slideshow_img
                src: immich_img_2
      - lambda: |-
          std::string loc = id(immich_photo_location);
          lv_label_set_text(id(location_label), loc.c_str());
          lv_label_set_text(id(location_label_shadow), loc.c_str());

          std::string ago;
          if (id(immich_photo_year) > 0) {
            auto now = id(sntp_time).now();
            if (now.is_valid()) {
              int months_ago = (now.year - id(immich_photo_year)) * 12 + (now.month - id(immich_photo_month));
              if (months_ago >= 12) {
                int years = months_ago / 12;
                if (years == 1) ago = "1 year ago";
                else ago = str_sprintf("%d years ago", years);
              } else if (months_ago == 1) {
                ago = "1 month ago";
              } else if (months_ago > 1) {
                ago = str_sprintf("%d months ago", months_ago);
              }
            }
          }
          lv_label_set_text(id(time_ago_label), ago.c_str());
          lv_label_set_text(id(time_ago_label_shadow), ago.c_str());
      - script.execute: extract_accent_color

  # ---------------------------------------------------------------------------
  # Advance forward: move ring index, display if ready, else fetch fresh
  # ---------------------------------------------------------------------------
  - id: immich_advance_forward
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(active_slot_displayed);'
          then:
            - logger.log:
                level: WARN
                tag: immich
                format: "Active slot not displayed yet, skipping advance"
          else:
            - lambda: |-
                if (!id(immich_last_asset_id).empty()) {
                  id(immich_prev_asset_id) = id(immich_last_asset_id);
                  id(immich_prev_image_url) = id(immich_last_image_url);
                  id(immich_prev_date) = id(immich_photo_date);
                  id(immich_prev_location) = id(immich_photo_location);
                  id(immich_prev_year) = id(immich_photo_year);
                  id(immich_prev_month) = id(immich_photo_month);
                  id(immich_prev_person) = id(immich_photo_person);
                  id(immich_prev_valid) = true;
                }
                int old_slot = id(active_slot);
                id(active_slot) = (old_slot + 1) % 3;
                id(active_slot_displayed) = false;
                if (old_slot == 0) id(slot0_ready) = false;
                else if (old_slot == 1) id(slot1_ready) = false;
                else id(slot2_ready) = false;
                id(immich_last_advance_ms) = millis();
                ESP_LOGI("immich", "Advancing: slot %d -> %d", old_slot, id(active_slot));
            - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          return (s == 0 && id(slot0_ready)) || (s == 1 && id(slot1_ready)) || (s == 2 && id(slot2_ready));
                      then:
                        - lambda: |-
                            int s = id(active_slot);
                            if (s == 0) {
                              id(immich_photo_date) = id(slot0_date); id(immich_photo_location) = id(slot0_location);
                              id(immich_photo_year) = id(slot0_year); id(immich_photo_month) = id(slot0_month);
                              id(immich_photo_person) = id(slot0_person); id(immich_last_asset_id) = id(slot0_asset_id);
                              id(immich_last_image_url) = id(slot0_image_url);
                            } else if (s == 1) {
                              id(immich_photo_date) = id(slot1_date); id(immich_photo_location) = id(slot1_location);
                              id(immich_photo_year) = id(slot1_year); id(immich_photo_month) = id(slot1_month);
                              id(immich_photo_person) = id(slot1_person); id(immich_last_asset_id) = id(slot1_asset_id);
                              id(immich_last_image_url) = id(slot1_image_url);
                            } else {
                              id(immich_photo_date) = id(slot2_date); id(immich_photo_location) = id(slot2_location);
                              id(immich_photo_year) = id(slot2_year); id(immich_photo_month) = id(slot2_month);
                              id(immich_photo_person) = id(slot2_person); id(immich_last_asset_id) = id(slot2_asset_id);
                              id(immich_last_image_url) = id(slot2_image_url);
                            }
                            id(active_slot_displayed) = true;
                            ESP_LOGI("immich", "Instant display slot %d: %s", s, id(immich_last_asset_id).c_str());
                        - script.execute: immich_display_current
                        - script.execute: immich_prefetch_chain
                      else:
                        - lambda: |-
                            id(target_slot) = id(active_slot);
                            ESP_LOGI("immich", "Slot %d not ready, fetching fresh", id(active_slot));
                        - script.execute: immich_fetch_into_slot

  # ---------------------------------------------------------------------------
  # Show previous image (swipe right)
  # ---------------------------------------------------------------------------
  - id: immich_show_previous
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(immich_prev_valid);'
          then:
            - logger.log:
                level: INFO
                tag: immich
                format: "No previous image available"
          else:
            - lambda: |-
                std::string tmp_id = id(immich_last_asset_id);
                std::string tmp_url = id(immich_last_image_url);
                std::string tmp_date = id(immich_photo_date);
                std::string tmp_loc = id(immich_photo_location);
                int tmp_year = id(immich_photo_year);
                int tmp_month = id(immich_photo_month);
                std::string tmp_per = id(immich_photo_person);

                id(immich_last_asset_id) = id(immich_prev_asset_id);
                id(immich_last_image_url) = id(immich_prev_image_url);
                id(immich_photo_date) = id(immich_prev_date);
                id(immich_photo_location) = id(immich_prev_location);
                id(immich_photo_year) = id(immich_prev_year);
                id(immich_photo_month) = id(immich_prev_month);
                id(immich_photo_person) = id(immich_prev_person);

                id(immich_prev_asset_id) = tmp_id;
                id(immich_prev_image_url) = tmp_url;
                id(immich_prev_date) = tmp_date;
                id(immich_prev_location) = tmp_loc;
                id(immich_prev_year) = tmp_year;
                id(immich_prev_month) = tmp_month;
                id(immich_prev_person) = tmp_per;

                int prev_slot = (id(active_slot) + 2) % 3;
                id(active_slot) = prev_slot;
                id(active_slot_displayed) = false;

                if (prev_slot == 0) {
                  id(slot0_ready) = false;
                  id(slot0_asset_id) = id(immich_last_asset_id);
                  id(slot0_image_url) = id(immich_last_image_url);
                  id(slot0_date) = id(immich_photo_date);
                  id(slot0_location) = id(immich_photo_location);
                  id(slot0_year) = id(immich_photo_year);
                  id(slot0_month) = id(immich_photo_month);
                  id(slot0_person) = id(immich_photo_person);
                } else if (prev_slot == 1) {
                  id(slot1_ready) = false;
                  id(slot1_asset_id) = id(immich_last_asset_id);
                  id(slot1_image_url) = id(immich_last_image_url);
                  id(slot1_date) = id(immich_photo_date);
                  id(slot1_location) = id(immich_photo_location);
                  id(slot1_year) = id(immich_photo_year);
                  id(slot1_month) = id(immich_photo_month);
                  id(slot1_person) = id(immich_photo_person);
                } else {
                  id(slot2_ready) = false;
                  id(slot2_asset_id) = id(immich_last_asset_id);
                  id(slot2_image_url) = id(immich_last_image_url);
                  id(slot2_date) = id(immich_photo_date);
                  id(slot2_location) = id(immich_photo_location);
                  id(slot2_year) = id(immich_photo_year);
                  id(slot2_month) = id(immich_photo_month);
                  id(slot2_person) = id(immich_photo_person);
                }
                ESP_LOGI("immich", "Showing previous in slot %d: %s", prev_slot, id(immich_last_asset_id).c_str());
            - if:
                condition:
                  lambda: 'return id(active_slot) == 0;'
                then:
                  - online_image.set_url:
                      id: immich_img_0
                      url: !lambda 'return id(slot0_image_url);'
            - if:
                condition:
                  lambda: 'return id(active_slot) == 1;'
                then:
                  - online_image.set_url:
                      id: immich_img_1
                      url: !lambda 'return id(slot1_image_url);'
            - if:
                condition:
                  lambda: 'return id(active_slot) == 2;'
                then:
                  - online_image.set_url:
                      id: immich_img_2
                      url: !lambda 'return id(slot2_image_url);'

  # ---------------------------------------------------------------------------
  # Fetch API metadata and start image download into target_slot
  # ---------------------------------------------------------------------------
  - id: immich_fetch_into_slot
    mode: single
    then:
      - http_request.post:
          id: http_req
          url: ${immich_base_url}/api/search/random
          capture_response: true
          max_response_buffer_size: 24kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: ${immich_api_key}
          body: '{"size":1,"type":"IMAGE","withExif":true,"withPeople":true}'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "HTTP %d from Immich", response->status_code);
                    return;
                  }
                  std::string asset_id, photo_date, photo_location, photo_person;
                  int photo_year = 0, photo_month = 0;
                  auto doc = json::parse_json(body);
                  JsonObject asset;
                  if (!doc.isNull()) {
                    if (doc.is<JsonArray>()) {
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.size() > 0) asset = arr[0].as<JsonObject>();
                    } else if (doc.is<JsonObject>()) {
                      asset = doc.as<JsonObject>();
                    }
                  }
                  if (asset.isNull() || !asset["id"].is<const char *>()) {
                    ESP_LOGW("immich", "No valid asset in response");
                    return;
                  }
                  asset_id = asset["id"].as<std::string>();

                  if (asset["localDateTime"].is<const char *>()) {
                    std::string raw = asset["localDateTime"].as<std::string>();
                    if (raw.size() >= 10) {
                      photo_year = atoi(raw.substr(0, 4).c_str());
                      photo_month = atoi(raw.substr(5, 2).c_str());
                      const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                              "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                      if (photo_month >= 1 && photo_month <= 12)
                        photo_date = str_sprintf("%s %d", months[photo_month], photo_year);
                    }
                  }

                  JsonObject exif = asset["exifInfo"].as<JsonObject>();
                  if (!exif.isNull()) {
                    std::string city, country;
                    if (exif["city"].is<const char *>()) city = exif["city"].as<std::string>();
                    if (exif["country"].is<const char *>()) country = exif["country"].as<std::string>();
                    if (!city.empty() && !country.empty()) photo_location = city + ", " + country;
                    else if (!city.empty()) photo_location = city;
                    else if (!country.empty()) photo_location = country;

                    if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                      std::string raw = exif["dateTimeOriginal"].as<std::string>();
                      if (raw.size() >= 10) {
                        photo_year = atoi(raw.substr(0, 4).c_str());
                        photo_month = atoi(raw.substr(5, 2).c_str());
                        const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                        if (photo_month >= 1 && photo_month <= 12)
                          photo_date = str_sprintf("%s %d", months[photo_month], photo_year);
                      }
                    }
                  }

                  if (asset["people"].is<JsonArray>()) {
                    JsonArray people = asset["people"].as<JsonArray>();
                    if (people.size() > 0) {
                      JsonObject person = people[0].as<JsonObject>();
                      if (person["name"].is<const char *>())
                        photo_person = person["name"].as<std::string>();
                    }
                  }

                  std::string img_url = std::string("${immich_base_url}") +
                                        "/api/assets/" + asset_id + "/thumbnail?size=preview";
                  int slot = id(target_slot);
                  ESP_LOGI("immich", "Slot %d fetched: %s | %s | %s | %s",
                           slot, asset_id.c_str(), photo_date.c_str(),
                           photo_person.c_str(), photo_location.c_str());

                  if (slot == 0) {
                    id(slot0_asset_id) = asset_id; id(slot0_image_url) = img_url;
                    id(slot0_date) = photo_date; id(slot0_location) = photo_location;
                    id(slot0_year) = photo_year; id(slot0_month) = photo_month;
                    id(slot0_person) = photo_person;
                  } else if (slot == 1) {
                    id(slot1_asset_id) = asset_id; id(slot1_image_url) = img_url;
                    id(slot1_date) = photo_date; id(slot1_location) = photo_location;
                    id(slot1_year) = photo_year; id(slot1_month) = photo_month;
                    id(slot1_person) = photo_person;
                  } else {
                    id(slot2_asset_id) = asset_id; id(slot2_image_url) = img_url;
                    id(slot2_date) = photo_date; id(slot2_location) = photo_location;
                    id(slot2_year) = photo_year; id(slot2_month) = photo_month;
                    id(slot2_person) = photo_person;
                  }
              - if:
                  condition:
                    lambda: 'return id(target_slot) == 0;'
                  then:
                    - online_image.set_url:
                        id: immich_img_0
                        url: !lambda 'return id(slot0_image_url);'
              - if:
                  condition:
                    lambda: 'return id(target_slot) == 1;'
                  then:
                    - online_image.set_url:
                        id: immich_img_1
                        url: !lambda 'return id(slot1_image_url);'
              - if:
                  condition:
                    lambda: 'return id(target_slot) == 2;'
                  then:
                    - online_image.set_url:
                        id: immich_img_2
                        url: !lambda 'return id(slot2_image_url);'
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("immich", "API request error for slot %d", id(target_slot));

  # ---------------------------------------------------------------------------
  # Prefetch chain: fill the next empty slot(s) ahead of active_slot
  # ---------------------------------------------------------------------------
  - id: immich_prefetch_chain
    mode: single
    then:
      - lambda: |-
          int next1 = (id(active_slot) + 1) % 3;
          int next2 = (id(active_slot) + 2) % 3;
          bool n1_ready = (next1 == 0) ? id(slot0_ready) : (next1 == 1) ? id(slot1_ready) : id(slot2_ready);
          bool n2_ready = (next2 == 0) ? id(slot0_ready) : (next2 == 1) ? id(slot1_ready) : id(slot2_ready);
          if (!n1_ready) {
            id(target_slot) = next1;
            ESP_LOGI("immich", "Prefetch chain: filling slot %d (next)", next1);
          } else if (!n2_ready) {
            id(target_slot) = next2;
            ESP_LOGI("immich", "Prefetch chain: filling slot %d (next-next)", next2);
          } else {
            ESP_LOGI("immich", "Prefetch chain: all slots filled");
            return;
          }
      - if:
          condition:
            lambda: |-
              int next1 = (id(active_slot) + 1) % 3;
              int next2 = (id(active_slot) + 2) % 3;
              bool n1_ready = (next1 == 0) ? id(slot0_ready) : (next1 == 1) ? id(slot1_ready) : id(slot2_ready);
              bool n2_ready = (next2 == 0) ? id(slot0_ready) : (next2 == 1) ? id(slot1_ready) : id(slot2_ready);
              return !n1_ready || !n2_ready;
          then:
            - script.execute: immich_fetch_into_slot
