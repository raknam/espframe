# =============================================================================
# IMMICH SLIDESHOW - STANDALONE
# =============================================================================
# Self-contained digital photo frame powered by Immich.
# Fetches random images via the Immich API and displays them fullscreen
# on an LVGL-driven display with a metadata overlay.
# No Home Assistant or external dashboard dependency required.
# =============================================================================

substitutions:
  immich_slide_interval: "15s"
  immich_verify_ssl: "false"
  immich_error_backoff_cycles: "2"

http_request:
  id: http_req
  timeout: 10s
  verify_ssl: ${immich_verify_ssl}

captive_portal:

wifi:
  ap: {}
  on_connect:
    - lambda: |-
        lv_bar_set_value(id(loading_progress_bar), 100, LV_ANIM_OFF);
    - delay: 800ms
    - lvgl.widget.hide: loading_screen
    - lvgl.widget.hide: wifi_setup_prompt
    - delay: 2s
    - script.execute: immich_request_next_image
  on_disconnect:
    - if:
        condition:
          lambda: 'return !id(boot_grace_period);'
        then:
          - lvgl.widget.show: wifi_setup_prompt

globals:
  - id: boot_grace_period
    type: bool
    initial_value: 'true'
  - id: immich_request_inflight
    type: bool
    initial_value: 'false'
  - id: immich_backoff_cycles
    type: int
    initial_value: '0'
  - id: immich_last_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_last_image_url
    type: std::string
    initial_value: '""'
  - id: immich_photo_date
    type: std::string
    initial_value: '""'
  - id: immich_photo_location
    type: std::string
    initial_value: '""'
  - id: immich_photo_year
    type: int
    initial_value: '0'
  - id: immich_photo_camera
    type: std::string
    initial_value: '""'
  - id: immich_photo_person
    type: std::string
    initial_value: '""'
  - id: immich_error_retries
    type: int
    initial_value: '0'
  - id: immich_prefetch_ready
    type: bool
    initial_value: 'false'
  - id: immich_prefetch_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_prefetch_image_url
    type: std::string
    initial_value: '""'
  - id: immich_prefetch_date
    type: std::string
    initial_value: '""'
  - id: immich_prefetch_location
    type: std::string
    initial_value: '""'
  - id: immich_prefetch_year
    type: int
    initial_value: '0'
  - id: immich_prefetch_camera
    type: std::string
    initial_value: '""'
  - id: immich_prefetch_person
    type: std::string
    initial_value: '""'
  - id: touch_start_x
    type: int
    initial_value: '0'
  - id: immich_prev_valid
    type: bool
    initial_value: 'false'
  - id: immich_prev_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_prev_image_url
    type: std::string
    initial_value: '""'
  - id: immich_prev_date
    type: std::string
    initial_value: '""'
  - id: immich_prev_location
    type: std::string
    initial_value: '""'
  - id: immich_prev_year
    type: int
    initial_value: '0'
  - id: immich_prev_camera
    type: std::string
    initial_value: '""'
  - id: immich_prev_person
    type: std::string
    initial_value: '""'

# --- Backlight ---

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    name: "Backlight"
    default_transition_length: 500ms
    restore_mode: ALWAYS_ON

# --- Image fetcher ---

online_image:
  - id: immich_image
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: ${immich_api_key}
    on_download_finished:
      then:
        - lambda: |-
            id(immich_request_inflight) = false;
            id(immich_error_retries) = 0;
        - lvgl.image.update:
            id: slideshow_img
            src: immich_image
        - lvgl.label.update:
            id: meta_label
            text: !lambda |-
              std::string meta = id(immich_photo_date);
              if (id(immich_photo_year) > 0) {
                auto now = id(sntp_time).now();
                if (now.is_valid()) {
                  int ago = now.year - id(immich_photo_year);
                  if (ago == 1) meta += " (1 year ago)";
                  else if (ago > 1) meta += str_sprintf(" (%d years ago)", ago);
                }
              }
              if (!id(immich_photo_camera).empty()) {
                if (!meta.empty()) meta += "  \u2022  ";
                meta += id(immich_photo_camera);
              }
              if (!id(immich_photo_person).empty()) {
                if (!meta.empty()) meta += "  \u2022  ";
                meta += id(immich_photo_person);
              }
              if (!id(immich_photo_location).empty()) {
                if (!meta.empty()) meta += "  \u2022  ";
                meta += id(immich_photo_location);
              }
              return meta;
        - script.execute: immich_prefetch_next
    on_error:
      then:
        - lambda: |-
            id(immich_request_inflight) = false;
            id(immich_error_retries)++;
            ESP_LOGE("immich", "Image decode failed (attempt %d): %s",
                     id(immich_error_retries), id(immich_last_image_url).c_str());
        - if:
            condition:
              lambda: 'return id(immich_error_retries) < 3;'
            then:
              - delay: 1s
              - script.execute: immich_request_next_image
            else:
              - lambda: 'id(immich_error_retries) = 0;'

# --- LVGL UI ---

lvgl:
  buffer_size: 6%
  byte_order: little_endian
  displays:
    - tft_display
  pages:
    - id: main_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        # --- Slideshow image ---
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_image
            scrollable: false
            clickable: true
            on_press:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    id(touch_start_x) = point.x;
            on_release:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    int dx = point.x - id(touch_start_x);
                    if (dx < -80) {
                      id(immich_backoff_cycles) = 1;
                      id(immich_request_next_image).execute();
                    } else if (dx > 80) {
                      id(immich_backoff_cycles) = 1;
                      id(immich_show_previous).execute();
                    } else {
                      if (lv_obj_has_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN))
                        lv_obj_clear_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                      else
                        lv_obj_add_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                    }
            on_long_press:
              then:
                - script.execute: immich_request_next_image
        # --- Metadata overlay (bottom bar) ---
        - obj:
            id: info_overlay
            align: BOTTOM_MID
            width: 100%
            height: 56
            bg_color: 0x000000
            bg_opa: 50%
            pad_left: 20
            pad_right: 20
            pad_top: 0
            pad_bottom: 0
            border_width: 0
            clickable: false
            widgets:
              - label:
                  id: time_label
                  align: LEFT_MID
                  text: ""
                  text_color: 0xFFFFFF
                  text_font: roboto_light40_font
              - label:
                  id: meta_label
                  align: RIGHT_MID
                  text: ""
                  text_color: 0xCCCCCC
                  text_font: roboto_light26_font
                  text_align: RIGHT
                  long_mode: DOT
                  width: 1000
        # --- Loading screen (shown at boot until WiFi connects) ---
        - obj:
            id: loading_screen
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: false
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 40
                  widgets:
                    - label:
                        text: "Starting up"
                        text_font: roboto_light40_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - bar:
                        id: loading_progress_bar
                        width: 75
                        height: 4
                        bg_color: 0x333333
                        bg_opa: 100%
                        radius: 3
                        min_value: 0
                        max_value: 100
                        value: 0
                        indicator:
                          bg_color: 0xFFFFFF
                          radius: 3
        # --- WiFi setup prompt ---
        - obj:
            id: wifi_setup_prompt
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            radius: 0
            border_width: 0
            pad_all: 0
            scrollable: false
            scrollbar_mode: "off"
            hidden: true
            widgets:
              - obj:
                  align: center
                  width: 700
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 20
                  widgets:
                    - label:
                        text_font: icon_font_setup
                        text: $icon_wifi
                        text_color: 0xFFFFFF
                    - label:
                        text: "WiFi Setup"
                        text_font: roboto_light40_font
                        text_color: 0xFFFFFF
                        width: 700
                        text_align: center
                    - label:
                        id: wifi_setup_instructions
                        text: "Connect to the WiFi hotspot\nto configure your network"
                        text_font: roboto30_font
                        text_color: 0x888888
                        width: 700
                        text_align: center

# --- Boot sequence ---

esphome:
  on_boot:
    - priority: -200
      then:
        - light.turn_on:
            id: backlight
            brightness: 100%
        - lambda: |-
            lv_bar_set_value(id(loading_progress_bar), 25, LV_ANIM_OFF);
    - priority: -100
      then:
        - lambda: |-
            lv_bar_set_value(id(loading_progress_bar), 50, LV_ANIM_OFF);
        - lambda: |-
            std::string name = App.get_name();
            std::string wifi_text = "Connect to the WiFi hotspot\n'" + name + "'\nto configure your network";
            lv_label_set_text(id(wifi_setup_instructions), wifi_text.c_str());
        - delay: 10s
        - lambda: 'id(boot_grace_period) = false;'
        - lvgl.widget.hide: loading_screen
        - if:
            condition:
              not:
                wifi.connected:
            then:
              - lvgl.widget.show: wifi_setup_prompt

# --- Slideshow timer ---

interval:
  - interval: ${immich_slide_interval}
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - script.execute: immich_request_next_image

# --- Immich API logic ---

script:
  - id: immich_request_next_image
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_backoff_cycles) > 0;'
          then:
            - lambda: |-
                id(immich_backoff_cycles)--;
                ESP_LOGW("immich", "Backoff active, skipping (remaining=%d)", id(immich_backoff_cycles));
          else:
            - if:
                condition:
                  lambda: 'return id(immich_request_inflight);'
                then:
                  - logger.log:
                      level: WARN
                      tag: immich
                      format: "Previous request still in flight, skipping"
                else:
                  - lambda: |-
                      id(immich_request_inflight) = true;
                      if (!id(immich_last_asset_id).empty()) {
                        id(immich_prev_asset_id) = id(immich_last_asset_id);
                        id(immich_prev_image_url) = id(immich_last_image_url);
                        id(immich_prev_date) = id(immich_photo_date);
                        id(immich_prev_location) = id(immich_photo_location);
                        id(immich_prev_year) = id(immich_photo_year);
                        id(immich_prev_camera) = id(immich_photo_camera);
                        id(immich_prev_person) = id(immich_photo_person);
                        id(immich_prev_valid) = true;
                      }
                  - if:
                      condition:
                        lambda: 'return id(immich_prefetch_ready);'
                      then:
                        - lambda: |-
                            id(immich_last_asset_id) = id(immich_prefetch_asset_id);
                            id(immich_last_image_url) = id(immich_prefetch_image_url);
                            id(immich_photo_date) = id(immich_prefetch_date);
                            id(immich_photo_location) = id(immich_prefetch_location);
                            id(immich_photo_year) = id(immich_prefetch_year);
                            id(immich_photo_camera) = id(immich_prefetch_camera);
                            id(immich_photo_person) = id(immich_prefetch_person);
                            id(immich_prefetch_ready) = false;
                            ESP_LOGI("immich", "Using prefetched asset: %s", id(immich_last_asset_id).c_str());
                        - online_image.set_url:
                            id: immich_image
                            url: !lambda 'return id(immich_last_image_url);'
                      else:
                        - script.execute: immich_fetch_and_show

  - id: immich_show_previous
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(immich_prev_valid);'
          then:
            - logger.log:
                level: INFO
                tag: immich
                format: "No previous image available"
          else:
            - if:
                condition:
                  lambda: 'return id(immich_request_inflight);'
                then:
                  - logger.log:
                      level: WARN
                      tag: immich
                      format: "Request in flight, cannot show previous"
                else:
                  - lambda: |-
                      id(immich_request_inflight) = true;
                      std::string tmp_id = id(immich_last_asset_id);
                      std::string tmp_url = id(immich_last_image_url);
                      std::string tmp_date = id(immich_photo_date);
                      std::string tmp_loc = id(immich_photo_location);
                      int tmp_year = id(immich_photo_year);
                      std::string tmp_cam = id(immich_photo_camera);
                      std::string tmp_per = id(immich_photo_person);

                      id(immich_last_asset_id) = id(immich_prev_asset_id);
                      id(immich_last_image_url) = id(immich_prev_image_url);
                      id(immich_photo_date) = id(immich_prev_date);
                      id(immich_photo_location) = id(immich_prev_location);
                      id(immich_photo_year) = id(immich_prev_year);
                      id(immich_photo_camera) = id(immich_prev_camera);
                      id(immich_photo_person) = id(immich_prev_person);

                      id(immich_prev_asset_id) = tmp_id;
                      id(immich_prev_image_url) = tmp_url;
                      id(immich_prev_date) = tmp_date;
                      id(immich_prev_location) = tmp_loc;
                      id(immich_prev_year) = tmp_year;
                      id(immich_prev_camera) = tmp_cam;
                      id(immich_prev_person) = tmp_per;

                      ESP_LOGI("immich", "Showing previous: %s", id(immich_last_asset_id).c_str());
                  - online_image.set_url:
                      id: immich_image
                      url: !lambda 'return id(immich_last_image_url);'

  - id: immich_fetch_and_show
    mode: single
    then:
      - http_request.post:
          id: http_req
          url: ${immich_base_url}/api/search/random
          capture_response: true
          max_response_buffer_size: 24kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: ${immich_api_key}
          body: '{"size":1,"type":"IMAGE","withExif":true,"withPeople":true}'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "HTTP %d from Immich", response->status_code);
                    id(immich_request_inflight) = false;
                    id(immich_backoff_cycles) = ${immich_error_backoff_cycles};
                    return;
                  }

                  std::string asset_id, photo_date, photo_location, photo_camera, photo_person;
                  int photo_year = 0;
                  auto doc = json::parse_json(body);
                  JsonObject asset;
                  if (!doc.isNull()) {
                    if (doc.is<JsonArray>()) {
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.size() > 0) asset = arr[0].as<JsonObject>();
                    } else if (doc.is<JsonObject>()) {
                      asset = doc.as<JsonObject>();
                    }
                  }
                  if (asset.isNull() || !asset["id"].is<const char *>()) {
                    ESP_LOGW("immich", "No valid asset in response");
                    id(immich_request_inflight) = false;
                    id(immich_backoff_cycles) = ${immich_error_backoff_cycles};
                    return;
                  }
                  asset_id = asset["id"].as<std::string>();

                  if (asset["localDateTime"].is<const char *>()) {
                    std::string raw = asset["localDateTime"].as<std::string>();
                    if (raw.size() >= 10) {
                      photo_year = atoi(raw.substr(0, 4).c_str());
                      int month = atoi(raw.substr(5, 2).c_str());
                      const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                              "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                      if (month >= 1 && month <= 12)
                        photo_date = str_sprintf("%s %d", months[month], photo_year);
                    }
                  }

                  JsonObject exif = asset["exifInfo"].as<JsonObject>();
                  if (!exif.isNull()) {
                    std::string city, country;
                    if (exif["city"].is<const char *>()) city = exif["city"].as<std::string>();
                    if (exif["country"].is<const char *>()) country = exif["country"].as<std::string>();
                    if (!city.empty() && !country.empty()) photo_location = city + ", " + country;
                    else if (!city.empty()) photo_location = city;
                    else if (!country.empty()) photo_location = country;

                    std::string make, model;
                    if (exif["make"].is<const char *>()) make = exif["make"].as<std::string>();
                    if (exif["model"].is<const char *>()) model = exif["model"].as<std::string>();
                    if (!model.empty() && !make.empty() && model.find(make) != std::string::npos)
                      photo_camera = model;
                    else if (!model.empty() && !make.empty())
                      photo_camera = make + " " + model;
                    else if (!model.empty())
                      photo_camera = model;
                    else
                      photo_camera = make;

                    if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                      std::string raw = exif["dateTimeOriginal"].as<std::string>();
                      if (raw.size() >= 10) {
                        photo_year = atoi(raw.substr(0, 4).c_str());
                        int month = atoi(raw.substr(5, 2).c_str());
                        const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                        if (month >= 1 && month <= 12)
                          photo_date = str_sprintf("%s %d", months[month], photo_year);
                      }
                    }
                  }

                  if (asset["people"].is<JsonArray>()) {
                    JsonArray people = asset["people"].as<JsonArray>();
                    if (people.size() > 0) {
                      JsonObject person = people[0].as<JsonObject>();
                      if (person["name"].is<const char *>())
                        photo_person = person["name"].as<std::string>();
                    }
                  }

                  id(immich_last_asset_id) = asset_id;
                  id(immich_photo_date) = photo_date;
                  id(immich_photo_location) = photo_location;
                  id(immich_photo_year) = photo_year;
                  id(immich_photo_camera) = photo_camera;
                  id(immich_photo_person) = photo_person;
                  id(immich_last_image_url) = std::string("${immich_base_url}") +
                                              "/api/assets/" + asset_id + "/thumbnail?size=preview";
                  ESP_LOGI("immich", "Asset: %s | Date: %s | Camera: %s | Person: %s | Location: %s",
                           asset_id.c_str(), photo_date.c_str(), photo_camera.c_str(),
                           photo_person.c_str(), photo_location.c_str());
              - online_image.set_url:
                  id: immich_image
                  url: !lambda 'return id(immich_last_image_url);'
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("immich", "Request error calling /api/search/random");
                  id(immich_request_inflight) = false;
                  id(immich_backoff_cycles) = ${immich_error_backoff_cycles};

  - id: immich_prefetch_next
    mode: single
    then:
      - http_request.post:
          id: http_req
          url: ${immich_base_url}/api/search/random
          capture_response: true
          max_response_buffer_size: 24kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: ${immich_api_key}
          body: '{"size":1,"type":"IMAGE","withExif":true,"withPeople":true}'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "Prefetch: HTTP %d", response->status_code);
                    return;
                  }
                  auto doc = json::parse_json(body);
                  JsonObject asset;
                  if (!doc.isNull()) {
                    if (doc.is<JsonArray>()) {
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.size() > 0) asset = arr[0].as<JsonObject>();
                    } else if (doc.is<JsonObject>()) {
                      asset = doc.as<JsonObject>();
                    }
                  }
                  if (asset.isNull() || !asset["id"].is<const char *>()) {
                    ESP_LOGW("immich", "Prefetch: no valid asset");
                    return;
                  }
                  std::string asset_id = asset["id"].as<std::string>();
                  std::string photo_date, photo_location, photo_camera, photo_person;
                  int photo_year = 0;

                  if (asset["localDateTime"].is<const char *>()) {
                    std::string raw = asset["localDateTime"].as<std::string>();
                    if (raw.size() >= 10) {
                      photo_year = atoi(raw.substr(0, 4).c_str());
                      int month = atoi(raw.substr(5, 2).c_str());
                      const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                              "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                      if (month >= 1 && month <= 12)
                        photo_date = str_sprintf("%s %d", months[month], photo_year);
                    }
                  }

                  JsonObject exif = asset["exifInfo"].as<JsonObject>();
                  if (!exif.isNull()) {
                    std::string city, country;
                    if (exif["city"].is<const char *>()) city = exif["city"].as<std::string>();
                    if (exif["country"].is<const char *>()) country = exif["country"].as<std::string>();
                    if (!city.empty() && !country.empty()) photo_location = city + ", " + country;
                    else if (!city.empty()) photo_location = city;
                    else if (!country.empty()) photo_location = country;

                    std::string make, model;
                    if (exif["make"].is<const char *>()) make = exif["make"].as<std::string>();
                    if (exif["model"].is<const char *>()) model = exif["model"].as<std::string>();
                    if (!model.empty() && !make.empty() && model.find(make) != std::string::npos)
                      photo_camera = model;
                    else if (!model.empty() && !make.empty())
                      photo_camera = make + " " + model;
                    else if (!model.empty())
                      photo_camera = model;
                    else
                      photo_camera = make;

                    if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                      std::string raw = exif["dateTimeOriginal"].as<std::string>();
                      if (raw.size() >= 10) {
                        photo_year = atoi(raw.substr(0, 4).c_str());
                        int month = atoi(raw.substr(5, 2).c_str());
                        const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                        if (month >= 1 && month <= 12)
                          photo_date = str_sprintf("%s %d", months[month], photo_year);
                      }
                    }
                  }

                  if (asset["people"].is<JsonArray>()) {
                    JsonArray people = asset["people"].as<JsonArray>();
                    if (people.size() > 0) {
                      JsonObject person = people[0].as<JsonObject>();
                      if (person["name"].is<const char *>())
                        photo_person = person["name"].as<std::string>();
                    }
                  }

                  id(immich_prefetch_asset_id) = asset_id;
                  id(immich_prefetch_image_url) = std::string("${immich_base_url}") +
                                                  "/api/assets/" + asset_id + "/thumbnail?size=preview";
                  id(immich_prefetch_date) = photo_date;
                  id(immich_prefetch_location) = photo_location;
                  id(immich_prefetch_year) = photo_year;
                  id(immich_prefetch_camera) = photo_camera;
                  id(immich_prefetch_person) = photo_person;
                  id(immich_prefetch_ready) = true;
                  ESP_LOGI("immich", "Prefetched: %s", asset_id.c_str());
          on_error:
            then:
              - lambda: 'ESP_LOGW("immich", "Prefetch request failed");'
