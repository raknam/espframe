# =============================================================================
# IMMICH FILTER - Photo source selection and filtering
# =============================================================================
# Controls which photos the frame displays: all photos, favorites only,
# specific albums, or specific people. Values persist across reboots via NVS.
# =============================================================================

select:
  - platform: template
    name: "Photos: Source"
    id: photo_source_select
    object_id: photo_source
    options:
      - "All Photos"
      - "Favorites"
      - "Album"
      - "Person"
    initial_option: "All Photos"
    optimistic: true
    restore_value: true
    icon: "mdi:image-filter-frames"
    on_value:
      then:
        - lambda: 'ESP_LOGI("immich", "Photo source: %s", x.c_str());'
        - script.execute: auto_apply_photo_source

text:
  - platform: template
    name: "Photos: Album IDs"
    id: immich_album_ids
    entity_category: config
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 255
    mode: text
    icon: "mdi:folder-image"
    set_action:
      - lambda: |-
          id(immich_album_ids).publish_state(x);
          ESP_LOGI("immich", "Album IDs configured (%d chars)", x.length());
      - script.execute: auto_apply_photo_source

  - platform: template
    name: "Photos: Person IDs"
    id: immich_person_ids
    entity_category: config
    optimistic: false
    restore_value: true
    min_length: 0
    max_length: 255
    mode: text
    icon: "mdi:account-group"
    set_action:
      - lambda: |-
          id(immich_person_ids).publish_state(x);
          ESP_LOGI("immich", "Person IDs configured (%d chars)", x.length());
      - script.execute: auto_apply_photo_source

button:
  - platform: template
    name: "Apply Photo Source"
    id: apply_photo_source
    internal: true
    icon: "mdi:check-circle"
    on_press:
      - script.stop: auto_apply_photo_source
      - lambda: |-
          id(slot0).ready = false;
          id(slot1).ready = false;
          id(slot2).ready = false;
          id(portrait_preload_slot) = -1;
          id(portrait_preload_left_ready) = false;
          id(portrait_preload_right_ready) = false;
          id(active_slot_displayed) = false;
          id(target_slot) = id(active_slot);
          ESP_LOGI("immich", "Photo source applied — flushing all slots");
      - script.execute: immich_fetch_into_slot

script:
  - id: auto_apply_photo_source
    mode: restart
    then:
      - delay: 1s
      - lambda: |-
          id(slot0).ready = false;
          id(slot1).ready = false;
          id(slot2).ready = false;
          id(portrait_preload_slot) = -1;
          id(portrait_preload_left_ready) = false;
          id(portrait_preload_right_ready) = false;
          id(active_slot_displayed) = false;
          id(target_slot) = id(active_slot);
          ESP_LOGI("immich", "Photo source auto-applied — flushing all slots");
      - script.execute: immich_fetch_into_slot
