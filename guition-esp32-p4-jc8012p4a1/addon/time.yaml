select:
  - platform: template
    name: "Clock Format"
    id: clock_format_select
    options:
      - "24 Hour"
      - "12 Hour"
    initial_option: "24 Hour"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - script.execute: update_clock_display

  - platform: template
    name: "Timezone"
    id: timezone_select
    options:
      - "Pacific/Midway"
      - "Pacific/Honolulu"
      - "America/Anchorage"
      - "America/Los_Angeles"
      - "America/Vancouver"
      - "America/Denver"
      - "America/Phoenix"
      - "America/Chicago"
      - "America/Mexico_City"
      - "America/New_York"
      - "America/Toronto"
      - "America/Halifax"
      - "America/Caracas"
      - "America/Sao_Paulo"
      - "America/Argentina/Buenos_Aires"
      - "Atlantic/Azores"
      - "UTC"
      - "Europe/London"
      - "Europe/Paris"
      - "Europe/Berlin"
      - "Europe/Rome"
      - "Europe/Madrid"
      - "Africa/Cairo"
      - "Europe/Athens"
      - "Europe/Istanbul"
      - "Europe/Moscow"
      - "Asia/Riyadh"
      - "Asia/Dubai"
      - "Asia/Kolkata"
      - "Asia/Kathmandu"
      - "Asia/Dhaka"
      - "Asia/Bangkok"
      - "Asia/Singapore"
      - "Asia/Shanghai"
      - "Asia/Hong_Kong"
      - "Asia/Tokyo"
      - "Asia/Seoul"
      - "Australia/Adelaide"
      - "Australia/Sydney"
      - "Pacific/Auckland"
      - "Pacific/Fiji"
    initial_option: "Europe/London"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: 'id(sntp_time).set_timezone(x);'
        - script.execute: update_clock_display

script:
  - id: update_clock_display
    mode: single
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;
          int hour = now.hour;
          char buf[6];
          if (id(clock_format_select).state == "12 Hour") {
            hour = hour % 12;
            if (hour == 0) hour = 12;
            snprintf(buf, sizeof(buf), "%d:%02d", hour, now.minute);
          } else {
            snprintf(buf, sizeof(buf), "%02d:%02d", hour, now.minute);
          }
          lv_label_set_text(id(time_label), buf);
          lv_label_set_text(id(time_label_shadow), buf);

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/London"
    on_time_sync:
      then:
        - script.execute: update_clock_display

interval:
  - interval: 60s
    then:
      - script.execute: update_clock_display
