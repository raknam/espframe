# =============================================================================
# FIRMWARE UPDATE - OTA and HTTP update from GitHub
# =============================================================================
# Provides OTA (over-the-air) and HTTP-based firmware updates. The device
# checks a manifest on GitHub (stable and optional beta) and can auto-update
# when new versions are available. Update checks run on an interval (hourly,
# daily, or weekly) when auto-update is enabled; a manual "Check for Update"
# button triggers an immediate check. Version is exposed as a text sensor for
# diagnostics.
#
# firmware_version: default for local builds; overridden by main config
# (e.g. factory.yaml) or by -s firmware_version when building releases.
# =============================================================================

substitutions:
  firmware_version: "dev"

esphome:
  project:
    name: jtenniswood.immich-frame
    version: "${firmware_version}"

# -----------------------------------------------------------------------------
# State for update check interval
# -----------------------------------------------------------------------------
globals:
  - id: update_check_counter
    type: int
    initial_value: '0'
  - id: manual_check_only
    type: bool
    initial_value: 'false'

# -----------------------------------------------------------------------------
# OTA and HTTP update sources (stable + beta manifest)
# -----------------------------------------------------------------------------
ota:
  - platform: http_request

update:
  - platform: http_request
    id: firmware_update
    name: "Firmware: Update"
    internal: true
    source: https://jtenniswood.github.io/espframe/firmware/manifest.json
    update_interval: never
    on_update_available:
      then:
        - if:
            condition:
              lambda: 'return id(auto_update_switch).state && !id(manual_check_only);'
            then:
              - update.perform: firmware_update

  - platform: http_request
    id: firmware_update_beta
    name: "Firmware: Update Beta"
    internal: true
    source: https://jtenniswood.github.io/espframe/firmware/beta/manifest.json
    update_interval: never

# -----------------------------------------------------------------------------
# User controls: auto-update and check frequency
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: "Firmware: Auto Update"
    id: auto_update_switch
    entity_category: config
    icon: "mdi:update"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

select:
  - platform: template
    name: "Firmware: Update Frequency"
    id: update_frequency_select
    entity_category: config
    icon: "mdi:timer-outline"
    options:
      - "Hourly"
      - "Daily"
      - "Weekly"
      - "Monthly"
    initial_option: "Daily"
    optimistic: true
    restore_value: true

# -----------------------------------------------------------------------------
# Periodic update check (hourly / daily / weekly when auto-update on)
# -----------------------------------------------------------------------------
interval:
  - interval: 1h
    then:
      - lambda: |-
          if (!id(auto_update_switch).state) return;
          int counter = id(update_check_counter);
          std::string freq = id(update_frequency_select).current_option();
          int threshold = 24;
          if (freq == "Hourly") threshold = 1;
          else if (freq == "Weekly") threshold = 168;
          else if (freq == "Monthly") threshold = 720;
          if (counter % threshold == 0) {
            id(firmware_update).update();
          }
          id(update_check_counter) = counter + 1;

# -----------------------------------------------------------------------------
# Exposed version and manual check button
# -----------------------------------------------------------------------------
text_sensor:
  - platform: template
    name: "Firmware: Version"
    id: firmware_version_sensor
    entity_category: diagnostic
    icon: "mdi:tag"
    update_interval: 5s
    lambda: 'return {"${firmware_version}"};'

button:
  - platform: template
    name: "Firmware: Check for Update"
    entity_category: config
    icon: "mdi:update"
    on_press:
      - lambda: 'id(manual_check_only) = true;'
      - component.update: firmware_update
      - component.update: firmware_update_beta
      - delay: 15s
      - lambda: 'id(manual_check_only) = false;'
