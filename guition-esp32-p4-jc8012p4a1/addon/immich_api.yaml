# =============================================================================
# IMMICH API - Fetch scripts for Immich server integration
# =============================================================================
# Handles HTTP requests to the Immich API for fetching random images and
# searching for portrait companions from the same day.
# =============================================================================

globals:
  - id: immich_api_retries
    type: int
    initial_value: '0'
  - id: immich_memory_fallback
    type: bool
    initial_value: 'false'
  - id: immich_memory_asset_id
    type: std::string
    initial_value: '""'

script:
  # ---------------------------------------------------------------------------
  # Display fallback when companion portrait search fails or finds nothing
  # ---------------------------------------------------------------------------
  - id: handle_companion_not_found
    mode: single
    then:
      - lambda: |-
          id(portrait_companion_found) = false;
          if (id(companion_target_slot) == id(active_slot) && !id(active_slot_displayed)) {
            id(active_slot_displayed) = true;
            id(immich_display_current).execute();
          }

  # ---------------------------------------------------------------------------
  # Fetch a memory ("on this day") — step 1: pick a random asset from memories
  # ---------------------------------------------------------------------------
  - id: immich_fetch_memory_into_slot
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_url).state.empty() || id(immich_api_key_text).state.empty();'
          then:
            - script.stop: immich_fetch_memory_into_slot
      - http_request.get:
          id: http_req
          url: !lambda |-
            auto now = id(sntp_time).now();
            char buf[32];
            snprintf(buf, sizeof(buf), "%04d-%02d-%02dT00:00:00.000Z", now.year, now.month, now.day_of_month);
            return id(immich_url).state + "/api/memories?type=on_this_day&for=" + std::string(buf);
          capture_response: true
          max_response_buffer_size: 64kB
          request_headers:
            Accept: application/json
            x-api-key: !lambda 'return id(immich_api_key_text).state.c_str();'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "Memories HTTP %d — falling back to random", response->status_code);
                    id(immich_memory_fallback) = true;
                    id(immich_fetch_into_slot).execute();
                    return;
                  }

                  auto doc = json::parse_json(body);
                  if (doc.isNull() || !doc.is<JsonArray>()) {
                    ESP_LOGI("immich", "No memories for today — falling back to random");
                    id(immich_memory_fallback) = true;
                    id(immich_fetch_into_slot).execute();
                    return;
                  }

                  JsonArray memories = doc.as<JsonArray>();
                  std::vector<std::string> image_ids;
                  for (size_t m = 0; m < memories.size(); m++) {
                    JsonObject mem = memories[m].as<JsonObject>();
                    if (mem.isNull() || !mem["assets"].is<JsonArray>()) continue;
                    JsonArray assets = mem["assets"].as<JsonArray>();
                    for (size_t a = 0; a < assets.size(); a++) {
                      JsonObject asset = assets[a].as<JsonObject>();
                      if (!asset["id"].is<const char *>()) continue;
                      if (asset["type"].is<const char *>()) {
                        std::string type = asset["type"].as<std::string>();
                        if (type != "IMAGE") continue;
                      }
                      image_ids.push_back(asset["id"].as<std::string>());
                    }
                  }

                  if (image_ids.empty()) {
                    ESP_LOGI("immich", "No memory images for today — falling back to random");
                    id(immich_memory_fallback) = true;
                    id(immich_fetch_into_slot).execute();
                    return;
                  }

                  int pick = rand() % image_ids.size();
                  id(immich_memory_asset_id) = image_ids[pick];
                  ESP_LOGI("immich", "Memory picked: %s (%d of %d)",
                           id(immich_memory_asset_id).c_str(), pick + 1, (int)image_ids.size());
                  id(immich_fetch_memory_asset).execute();
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("immich", "Memories request failed — falling back to random");
                  id(immich_memory_fallback) = true;
              - script.execute: immich_fetch_into_slot

  # ---------------------------------------------------------------------------
  # Fetch full asset details for a memory photo — step 2
  # ---------------------------------------------------------------------------
  - id: immich_fetch_memory_asset
    mode: single
    then:
      - http_request.get:
          id: http_req
          url: !lambda 'return id(immich_url).state + "/api/assets/" + id(immich_memory_asset_id);'
          capture_response: true
          max_response_buffer_size: 16kB
          request_headers:
            Accept: application/json
            x-api-key: !lambda 'return id(immich_api_key_text).state.c_str();'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "Memory asset HTTP %d — falling back to random", response->status_code);
                    id(immich_memory_fallback) = true;
                    id(immich_fetch_into_slot).execute();
                    return;
                  }

                  id(immich_fetch_started) = true;
                  id(immich_api_retries) = 0;

                  auto doc = json::parse_json(body);
                  JsonObject asset = doc.as<JsonObject>();
                  if (asset.isNull() || !asset["id"].is<const char *>()) {
                    ESP_LOGW("immich", "Memory asset parse failed — falling back to random");
                    id(immich_memory_fallback) = true;
                    id(immich_fetch_into_slot).execute();
                    return;
                  }

                  std::string asset_id = asset["id"].as<std::string>();
                  std::string photo_date, photo_location, photo_person, local_datetime;
                  int photo_year = 0, photo_month = 0;
                  bool is_portrait = false;
                  uint16_t slot_zoom = ZOOM_IDENTITY;

                  if (asset["localDateTime"].is<const char *>()) {
                    std::string raw = asset["localDateTime"].as<std::string>();
                    local_datetime = raw;
                    if (raw.size() >= 10) {
                      photo_year = atoi(raw.substr(0, 4).c_str());
                      photo_month = atoi(raw.substr(5, 2).c_str());
                      photo_date = format_photo_date(photo_year, photo_month);
                    }
                  }

                  JsonObject exif = asset["exifInfo"].as<JsonObject>();
                  if (!exif.isNull()) {
                    std::string city, country;
                    if (exif["city"].is<const char *>()) city = exif["city"].as<std::string>();
                    if (exif["country"].is<const char *>()) country = exif["country"].as<std::string>();
                    if (!city.empty() && !country.empty()) photo_location = city + ", " + country;
                    else if (!city.empty()) photo_location = city;
                    else if (!country.empty()) photo_location = country;

                    if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                      std::string raw = exif["dateTimeOriginal"].as<std::string>();
                      if (raw.size() >= 10) {
                        photo_year = atoi(raw.substr(0, 4).c_str());
                        photo_month = atoi(raw.substr(5, 2).c_str());
                        photo_date = format_photo_date(photo_year, photo_month);
                      }
                    }

                    int exif_w = 0, exif_h = 0;
                    if (exif["exifImageWidth"].is<int>()) exif_w = exif["exifImageWidth"].as<int>();
                    if (exif["exifImageHeight"].is<int>()) exif_h = exif["exifImageHeight"].as<int>();
                    std::string orientation;
                    if (exif["orientation"].is<const char *>()) orientation = exif["orientation"].as<std::string>();
                    if (orientation == "5" || orientation == "6" || orientation == "7" || orientation == "8")
                      std::swap(exif_w, exif_h);
                    if (exif_w > 0 && exif_h > 0) {
                      is_portrait = (exif_h > exif_w);
                      if (!is_portrait) {
                        float aspect = (float)exif_w / (float)exif_h;
                        if (aspect > PANORAMA_MIN_ASPECT && aspect <= PANORAMA_MAX_ASPECT) {
                          float decoded_h = 1280.0f / aspect;
                          slot_zoom = (uint16_t)((float)ZOOM_IDENTITY * 800.0f / decoded_h);
                        }
                      }
                    }
                  }

                  if (asset["people"].is<JsonArray>()) {
                    JsonArray people = asset["people"].as<JsonArray>();
                    if (people.size() > 0) {
                      JsonObject person = people[0].as<JsonObject>();
                      if (person["name"].is<const char *>())
                        photo_person = person["name"].as<std::string>();
                    }
                  }

                  std::string img_url = id(immich_url).state + "/api/assets/" + asset_id + "/thumbnail?size=preview";
                  int slot = id(target_slot);
                  ESP_LOGI("immich", "Memory slot %d fetched: %s | %s | %s | %s | portrait=%d zoom=%u",
                           slot, asset_id.c_str(), photo_date.c_str(),
                           photo_person.c_str(), photo_location.c_str(), is_portrait, slot_zoom);

                  if (id(portrait_preload_slot) == slot) {
                    id(portrait_preload_slot) = -1;
                    id(portrait_preload_left_ready) = false;
                    id(portrait_preload_right_ready) = false;
                  }

                  auto &meta = (slot == 0) ? id(slot0) : (slot == 1) ? id(slot1) : id(slot2);
                  meta.asset_id = asset_id;
                  meta.image_url = img_url;
                  meta.date = photo_date;
                  meta.location = photo_location;
                  meta.year = photo_year;
                  meta.month = photo_month;
                  meta.person = photo_person;
                  meta.is_portrait = is_portrait;
                  meta.datetime = local_datetime;
                  meta.companion_url = "";
                  meta.zoom = slot_zoom;
                  meta.pending_asset_id = asset_id;

                  if (slot == 0) { id(immich_img_0).set_url(img_url); id(immich_img_0).update(); }
                  else if (slot == 1) { id(immich_img_1).set_url(img_url); id(immich_img_1).update(); }
                  else { id(immich_img_2).set_url(img_url); id(immich_img_2).update(); }
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("immich", "Memory asset request failed — falling back to random");
                  id(immich_memory_fallback) = true;
              - script.execute: immich_fetch_into_slot

  # ---------------------------------------------------------------------------
  # Fetch API metadata and start image download into target_slot
  # ---------------------------------------------------------------------------
  - id: immich_fetch_into_slot
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_url).state.empty() || id(immich_api_key_text).state.empty();'
          then:
            - logger.log:
                level: WARN
                tag: immich
                format: "Immich URL or API key not configured"
            - script.stop: immich_fetch_into_slot
      - if:
          condition:
            lambda: 'return id(backlight_paused);'
          then:
            - logger.log:
                level: INFO
                tag: immich
                format: "Fetch paused (backlight off)"
            - script.stop: immich_fetch_into_slot
      - if:
          condition:
            lambda: 'return id(photo_source_select).current_option() == "Memories" && !id(immich_memory_fallback);'
          then:
            - script.execute: immich_fetch_memory_into_slot
            - script.stop: immich_fetch_into_slot
      - lambda: 'id(immich_memory_fallback) = false;'
      - http_request.post:
          id: http_req
          url: !lambda 'return id(immich_url).state + "/api/search/random";'
          capture_response: true
          max_response_buffer_size: 24kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: !lambda 'return id(immich_api_key_text).state.c_str();'
          body: !lambda |-
            return build_immich_search_body(1, true, id(photo_source_select).current_option(), id(immich_album_ids).state, id(immich_person_ids).state);
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "HTTP %d from Immich", response->status_code);
                    return;
                  }
                  id(immich_fetch_started) = true;
                  id(immich_api_retries) = 0;

                  std::string asset_id, photo_date, photo_location, photo_person, local_datetime;
                  int photo_year = 0, photo_month = 0;
                  bool is_portrait = false;
                  uint16_t slot_zoom = ZOOM_IDENTITY;

                  auto doc = json::parse_json(body);
                  JsonObject asset;
                  if (!doc.isNull()) {
                    if (doc.is<JsonArray>()) {
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.size() > 0) asset = arr[0].as<JsonObject>();
                    } else if (doc.is<JsonObject>()) {
                      asset = doc.as<JsonObject>();
                    }
                  }
                  if (asset.isNull() || !asset["id"].is<const char *>()) {
                    ESP_LOGW("immich", "No valid asset in response");
                    return;
                  }
                  asset_id = asset["id"].as<std::string>();

                  if (asset["localDateTime"].is<const char *>()) {
                    std::string raw = asset["localDateTime"].as<std::string>();
                    local_datetime = raw;
                    if (raw.size() >= 10) {
                      photo_year = atoi(raw.substr(0, 4).c_str());
                      photo_month = atoi(raw.substr(5, 2).c_str());
                      photo_date = format_photo_date(photo_year, photo_month);
                    }
                  }

                  JsonObject exif = asset["exifInfo"].as<JsonObject>();
                  if (!exif.isNull()) {
                    std::string city, country;
                    if (exif["city"].is<const char *>()) city = exif["city"].as<std::string>();
                    if (exif["country"].is<const char *>()) country = exif["country"].as<std::string>();
                    if (!city.empty() && !country.empty()) photo_location = city + ", " + country;
                    else if (!city.empty()) photo_location = city;
                    else if (!country.empty()) photo_location = country;

                    if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                      std::string raw = exif["dateTimeOriginal"].as<std::string>();
                      if (raw.size() >= 10) {
                        photo_year = atoi(raw.substr(0, 4).c_str());
                        photo_month = atoi(raw.substr(5, 2).c_str());
                        photo_date = format_photo_date(photo_year, photo_month);
                      }
                    }

                    int exif_w = 0, exif_h = 0;
                    if (exif["exifImageWidth"].is<int>()) exif_w = exif["exifImageWidth"].as<int>();
                    if (exif["exifImageHeight"].is<int>()) exif_h = exif["exifImageHeight"].as<int>();
                    std::string orientation;
                    if (exif["orientation"].is<const char *>()) orientation = exif["orientation"].as<std::string>();
                    if (orientation == "5" || orientation == "6" || orientation == "7" || orientation == "8")
                      std::swap(exif_w, exif_h);
                    if (exif_w > 0 && exif_h > 0) {
                      is_portrait = (exif_h > exif_w);
                      if (!is_portrait) {
                        float aspect = (float)exif_w / (float)exif_h;
                        if (aspect > PANORAMA_MIN_ASPECT && aspect <= PANORAMA_MAX_ASPECT) {
                          float decoded_h = 1280.0f / aspect;
                          slot_zoom = (uint16_t)((float)ZOOM_IDENTITY * 800.0f / decoded_h);
                        }
                      }
                    }
                  }

                  if (asset["people"].is<JsonArray>()) {
                    JsonArray people = asset["people"].as<JsonArray>();
                    if (people.size() > 0) {
                      JsonObject person = people[0].as<JsonObject>();
                      if (person["name"].is<const char *>())
                        photo_person = person["name"].as<std::string>();
                    }
                  }

                  std::string img_url = id(immich_url).state + "/api/assets/" + asset_id + "/thumbnail?size=preview";
                  int slot = id(target_slot);
                  ESP_LOGI("immich", "Slot %d fetched: %s | %s | %s | %s | portrait=%d zoom=%u",
                           slot, asset_id.c_str(), photo_date.c_str(),
                           photo_person.c_str(), photo_location.c_str(), is_portrait, slot_zoom);

                  if (id(portrait_preload_slot) == slot) {
                    id(portrait_preload_slot) = -1;
                    id(portrait_preload_left_ready) = false;
                    id(portrait_preload_right_ready) = false;
                  }

                  auto &meta = (slot == 0) ? id(slot0) : (slot == 1) ? id(slot1) : id(slot2);
                  meta.asset_id = asset_id;
                  meta.image_url = img_url;
                  meta.date = photo_date;
                  meta.location = photo_location;
                  meta.year = photo_year;
                  meta.month = photo_month;
                  meta.person = photo_person;
                  meta.is_portrait = is_portrait;
                  meta.datetime = local_datetime;
                  meta.companion_url = "";
                  meta.zoom = slot_zoom;
                  meta.pending_asset_id = asset_id;

                  if (slot == 0) { id(immich_img_0).set_url(img_url); id(immich_img_0).update(); }
                  else if (slot == 1) { id(immich_img_1).set_url(img_url); id(immich_img_1).update(); }
                  else { id(immich_img_2).set_url(img_url); id(immich_img_2).update(); }
          on_error:
            then:
              - lambda: |-
                  id(immich_api_retries)++;
                  ESP_LOGW("immich", "API request error for slot %d (attempt %d)", id(target_slot), id(immich_api_retries));
              - if:
                  condition:
                    lambda: 'return id(immich_api_retries) < MAX_ERROR_RETRIES;'
                  then:
                    - delay: 5s
                    - script.execute: immich_fetch_into_slot
                  else:
                    - lambda: 'id(immich_api_retries) = 0;'

  # ---------------------------------------------------------------------------
  # Fetch a companion portrait from a similar date/time
  # ---------------------------------------------------------------------------
  - id: immich_fetch_portrait_companion
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_url).state.empty() || id(immich_api_key_text).state.empty();'
          then:
            - script.stop: immich_fetch_portrait_companion
      - lambda: |-
          std::string dt = id(portrait_search_datetime);
          if (dt.size() < 10) {
            ESP_LOGW("immich", "No datetime for companion search");
            id(handle_companion_not_found).execute();
            return;
          }
          std::string day = dt.substr(0, 10);
          id(portrait_search_datetime) = day;
          ESP_LOGI("immich", "Searching companion portrait for slot %d, date %s",
                   id(companion_target_slot), day.c_str());
      - http_request.post:
          id: http_req
          url: !lambda 'return id(immich_url).state + "/api/search/random";'
          capture_response: true
          max_response_buffer_size: 32kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: !lambda 'return id(immich_api_key_text).state.c_str();'
          body: !lambda |-
            std::string day = id(portrait_search_datetime);
            std::string extra = "\"takenAfter\":\"" + day + "T00:00:00.000Z\",\"takenBefore\":\"" + day + "T23:59:59.999Z\"";
            return build_immich_search_body(5, false, id(photo_source_select).current_option(), id(immich_album_ids).state, id(immich_person_ids).state, extra);
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "Companion search HTTP %d", response->status_code);
                    id(handle_companion_not_found).execute();
                    return;
                  }
                  auto doc = json::parse_json(body);
                  if (doc.isNull() || !doc.is<JsonArray>()) {
                    ESP_LOGW("immich", "Companion search: no results");
                    id(handle_companion_not_found).execute();
                    return;
                  }
                  JsonArray arr = doc.as<JsonArray>();
                  std::string primary_id = id(portrait_primary_asset_id);
                  std::string base = id(immich_url).state;
                  std::string companion_url;

                  for (size_t i = 0; i < arr.size(); i++) {
                    JsonObject asset = arr[i].as<JsonObject>();
                    if (asset.isNull() || !asset["id"].is<const char *>()) continue;
                    std::string aid = asset["id"].as<std::string>();
                    if (aid == primary_id) continue;

                    JsonObject exif = asset["exifInfo"].as<JsonObject>();
                    if (exif.isNull()) continue;
                    int ew = 0, eh = 0;
                    if (exif["exifImageWidth"].is<int>()) ew = exif["exifImageWidth"].as<int>();
                    if (exif["exifImageHeight"].is<int>()) eh = exif["exifImageHeight"].as<int>();
                    std::string ori;
                    if (exif["orientation"].is<const char *>()) ori = exif["orientation"].as<std::string>();
                    if (ori == "5" || ori == "6" || ori == "7" || ori == "8") std::swap(ew, eh);
                    if (ew <= 0 || eh <= 0 || eh <= ew) continue;

                    companion_url = base + "/api/assets/" + aid + "/thumbnail?size=preview";
                    ESP_LOGI("immich", "Companion portrait found: %s for slot %d",
                             aid.c_str(), id(companion_target_slot));
                    break;
                  }

                  if (companion_url.empty()) {
                    ESP_LOGI("immich", "No companion portrait found for this day");
                    id(handle_companion_not_found).execute();
                    return;
                  }
                  id(portrait_companion_found) = true;
                  id(portrait_companion_url) = companion_url;
                  int ts = id(companion_target_slot);
                  auto &meta = (ts == 0) ? id(slot0) : (ts == 1) ? id(slot1) : id(slot2);
                  meta.companion_url = companion_url;
              - if:
                  condition:
                    lambda: 'return id(portrait_companion_found) && id(companion_target_slot) == id(active_slot);'
                  then:
                    - online_image.set_url:
                        id: immich_portrait_right
                        url: !lambda 'return id(portrait_companion_url);'
              - if:
                  condition:
                    lambda: 'return id(portrait_companion_found) && id(companion_target_slot) != id(active_slot);'
                  then:
                    - lambda: |-
                        int ts = id(companion_target_slot);
                        auto &meta = (ts == 0) ? id(slot0) : (ts == 1) ? id(slot1) : id(slot2);
                        id(portrait_preload_slot) = ts;
                        id(portrait_preload_left_ready) = false;
                        id(portrait_preload_right_ready) = false;
                        ESP_LOGI("immich", "Starting portrait preload for slot %d", ts);
                    - online_image.set_url:
                        id: immich_portrait_preload_left
                        url: !lambda |-
                          int ts = id(companion_target_slot);
                          auto &meta = (ts == 0) ? id(slot0) : (ts == 1) ? id(slot1) : id(slot2);
                          return meta.image_url;
                    - online_image.set_url:
                        id: immich_portrait_preload_right
                        url: !lambda 'return id(portrait_companion_url);'
          on_error:
            then:
              - lambda: 'ESP_LOGW("immich", "Companion search request failed");'
              - script.execute: handle_companion_not_found
      - script.execute: immich_prefetch_chain
