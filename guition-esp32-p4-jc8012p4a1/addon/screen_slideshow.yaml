    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload right failed");
            id(portrait_preload_right_ready) = false;

# =============================================================================
# LVGL UI
# =============================================================================

lvgl:
  pages:
    - id: slideshow_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            id: slideshow_img
            align: CENTER
            src: immich_img_0
            scrollable: false
            clickable: true
            on_press:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    id(touch_start_x) = point.x;
            on_release:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    int dx = point.x - id(touch_start_x);
                    if (dx < -80) {
                      id(immich_advance_forward).execute();
                    } else if (dx > 80) {
                      id(immich_show_previous).execute();
                    } else {
                      if (lv_obj_has_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN))
                        lv_obj_clear_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                      else
                        lv_obj_add_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                    }
            on_long_press:
              then:
                - script.execute: immich_advance_forward
        - obj:
            id: portrait_pair_container
            align: CENTER
            width: 1280
            height: 800
            bg_color: 0x000000
            bg_opa: 100%
            border_width: 0
            pad_all: 0
            scrollable: false
            hidden: true
            clickable: true
            layout:
              type: flex
              flex_flow: ROW
            on_press:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    id(touch_start_x) = point.x;
            on_release:
              then:
                - lambda: |-
                    lv_point_t point;
                    lv_indev_get_point(lv_indev_get_act(), &point);
                    int dx = point.x - id(touch_start_x);
                    if (dx < -80) {
                      id(immich_advance_forward).execute();
                    } else if (dx > 80) {
                      id(immich_show_previous).execute();
                    } else {
                      if (lv_obj_has_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN))
                        lv_obj_clear_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                      else
                        lv_obj_add_flag(id(info_overlay), LV_OBJ_FLAG_HIDDEN);
                    }
            on_long_press:
              then:
                - script.execute: immich_advance_forward
            widgets:
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_left_img
                        src: immich_portrait_left
                        align: CENTER
                        scrollable: false
                        clickable: false
              - obj:
                  width: 640
                  height: 800
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false
                  widgets:
                    - image:
                        id: portrait_right_img
                        src: immich_portrait_right
                        align: CENTER
                        scrollable: false
                        clickable: false
        - obj:
            id: info_overlay
            align: BOTTOM_LEFT
            x: 45
            y: -10
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            clickable: false
            layout:
              type: flex
              flex_flow: ROW
              flex_align_cross: START
              pad_column: 40
            widgets:
              - obj:
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  scrollable: false
                  widgets:
                    - label:
                        id: time_label_shadow
                        x: 2
                        y: 2
                        text: ""
                        text_color: 0x000000
                        text_opa: 50%
                        text_font: roboto_light150_font
                    - label:
                        id: time_label
                        x: 0
                        y: 0
                        text: ""
                        text_color: 0xFFFFFF
                        text_font: roboto_light150_font
              - obj:
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  bg_opa: 0%
                  border_width: 0
                  pad_all: 0
                  pad_top: 25
                  scrollable: false
                  layout:
                    type: flex
                    flex_flow: COLUMN
                    pad_row: 8
                  widgets:
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: 0%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: time_ago_label_shadow
                              x: 2
                              y: 2
                              text: ""
                              text_color: 0x000000
                              text_opa: 50%
                              text_font: roboto_light46_font
                          - label:
                              id: time_ago_label
                              x: 0
                              y: 0
                              text: ""
                              text_color: 0xFFFFFF
                              text_font: roboto_light46_font
                    - obj:
                        width: SIZE_CONTENT
                        height: SIZE_CONTENT
                        bg_opa: 0%
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - label:
                              id: location_label_shadow
                              x: 2
                              y: 2
                              text: ""
                              text_color: 0x000000
                              text_opa: 50%
                              text_font: roboto_light32_font
                          - label:
                              id: location_label
                              x: 0
                              y: 0
                              text: ""
                              text_color: 0xFFFFFF
                              text_font: roboto_light32_font

# =============================================================================
# USER-CONFIGURABLE SETTINGS
# =============================================================================

number:
  - platform: template
    name: "Slideshow Interval"
    id: slideshow_interval
    min_value: 5
    max_value: 300
    step: 5
    initial_value: ${immich_slide_interval_seconds}
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"

# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: 5s
    then:
      - if:
          condition:
            lambda: |-
              if (!wifi::global_wifi_component->is_connected()) return false;
              if (!id(immich_fetch_started)
                  && !id(immich_url).state.empty() && !id(immich_api_key_text).state.empty()) {
                ESP_LOGI("immich", "Config detected, starting initial fetch (URL: %s, key: %d chars)",
                         id(immich_url).state.c_str(), id(immich_api_key_text).state.length());
                id(immich_fetch_started) = true;
                id(target_slot) = 0;
                id(immich_fetch_into_slot).execute();
                return false;
              }
              if (!id(immich_fetch_started)) {
                ESP_LOGD("immich", "Waiting for config: URL='%s' (%d), key=%d chars",
                         id(immich_url).state.c_str(), id(immich_url).state.length(),
                         id(immich_api_key_text).state.length());
                return false;
              }
              ESP_LOGD("immich", "Timer tick: active=%d displayed=%s s0=%s s1=%s s2=%s",
                       id(active_slot), id(active_slot_displayed) ? "Y" : "N",
                       id(slot0_ready) ? "R" : "-", id(slot1_ready) ? "R" : "-", id(slot2_ready) ? "R" : "-");
              uint32_t interval_ms = (uint32_t)(id(slideshow_interval).state * 1000);
              uint32_t elapsed = millis() - id(immich_last_advance_ms);
              if (elapsed < interval_ms) return false;
              return true;
          then:
            - script.execute: immich_advance_forward

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # ---------------------------------------------------------------------------
  # Display whichever slot is active
  # ---------------------------------------------------------------------------
  - id: immich_display_current
    mode: single
    then:
      - lambda: |-
          lv_obj_clear_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          id(immich_is_portrait_pair) = false;
      - if:
          condition:
            lambda: 'return id(active_slot) == 0;'
          then:
            - lvgl.image.update:
                id: slideshow_img
                src: immich_img_0
      - if:
          condition:
            lambda: 'return id(active_slot) == 1;'
          then:
            - lvgl.image.update:
                id: slideshow_img
                src: immich_img_1
      - if:
          condition:
            lambda: 'return id(active_slot) == 2;'
          then:
            - lvgl.image.update:
                id: slideshow_img
                src: immich_img_2
      - lambda: |-
          int s = id(active_slot);
          uint16_t zoom = (s == 0) ? id(slot0_zoom) : (s == 1) ? id(slot1_zoom) : id(slot2_zoom);
          lv_img_set_zoom(id(slideshow_img), zoom);
      - lambda: |-
          std::string loc = id(immich_photo_location);
          lv_label_set_text(id(location_label), loc.c_str());
          lv_label_set_text(id(location_label_shadow), loc.c_str());

          std::string ago;
          if (id(immich_photo_year) > 0) {
            auto now = id(sntp_time).now();
            if (now.is_valid()) {
              int months_ago = (now.year - id(immich_photo_year)) * 12 + (now.month - id(immich_photo_month));
              if (months_ago >= 12) {
                int years = months_ago / 12;
                if (years == 1) ago = "1 year ago";
                else ago = str_sprintf("%d years ago", years);
              } else if (months_ago == 1) {
                ago = "1 month ago";
              } else if (months_ago > 1) {
                ago = str_sprintf("%d months ago", months_ago);
              }
            }
          }
          lv_label_set_text(id(time_ago_label), ago.c_str());
          lv_label_set_text(id(time_ago_label_shadow), ago.c_str());
      - script.execute: extract_accent_color
      - if:
          condition:
            lambda: |-
              int s = id(active_slot);
              bool is_p = (s == 0) ? id(slot0_is_portrait) : (s == 1) ? id(slot1_is_portrait) : id(slot2_is_portrait);
              return is_p && id(portrait_preload_slot) == s
                     && id(portrait_preload_left_ready) && id(portrait_preload_right_ready);
          then:
            - lambda: |-
                id(immich_is_portrait_pair) = true;
                id(portrait_using_preload) = true;
                id(portrait_preload_slot) = -1;
                id(active_slot_displayed) = true;
                lv_img_set_zoom(id(slideshow_img), 256);
                lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
                ESP_LOGI("immich", "Instant portrait pair from preload");
            - lvgl.image.update:
                id: portrait_left_img
                src: immich_portrait_preload_left
            - lvgl.image.update:
                id: portrait_right_img
                src: immich_portrait_preload_right
            - script.execute: extract_accent_color
      - if:
          condition:
            lambda: |-
              int s = id(active_slot);
              bool is_p = (s == 0) ? id(slot0_is_portrait) : (s == 1) ? id(slot1_is_portrait) : id(slot2_is_portrait);
              return is_p && !id(immich_is_portrait_pair);
          then:
            - lambda: |-
                int s = id(active_slot);
                std::string comp = (s == 0) ? id(slot0_companion_url) : (s == 1) ? id(slot1_companion_url) : id(slot2_companion_url);
                std::string aid = (s == 0) ? id(slot0_asset_id) : (s == 1) ? id(slot1_asset_id) : id(slot2_asset_id);
                id(portrait_left_ready) = false;
                id(portrait_right_ready) = false;
                id(portrait_using_preload) = false;
                id(portrait_primary_asset_id) = aid;
                if (!comp.empty()) {
                  id(portrait_companion_found) = true;
                  id(portrait_companion_url) = comp;
                  ESP_LOGI("immich", "Portrait %s: companion URL known, starting both downloads", aid.c_str());
                } else {
                  std::string dt = (s == 0) ? id(slot0_datetime) : (s == 1) ? id(slot1_datetime) : id(slot2_datetime);
                  id(portrait_companion_found) = false;
                  id(portrait_companion_url) = "";
                  id(portrait_search_datetime) = dt;
                  id(companion_target_slot) = s;
                  ESP_LOGI("immich", "Portrait %s: no companion, searching now", aid.c_str());
                }
            - online_image.set_url:
                id: immich_portrait_left
                url: !lambda |-
                  int s = id(active_slot);
                  return (s == 0) ? id(slot0_image_url) : (s == 1) ? id(slot1_image_url) : id(slot2_image_url);
            - if:
                condition:
                  lambda: 'return id(portrait_companion_found);'
                then:
                  - online_image.set_url:
                      id: immich_portrait_right
                      url: !lambda 'return id(portrait_companion_url);'
                else:
                  - script.execute: immich_fetch_portrait_companion

  # ---------------------------------------------------------------------------
  # Advance forward: move ring index, display if ready, else fetch fresh
  # ---------------------------------------------------------------------------
  - id: immich_advance_forward
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(active_slot_displayed);'
          then:
            - logger.log:
                level: WARN
                tag: immich
                format: "Active slot not displayed yet, skipping advance"
          else:
            - lambda: |-
                if (!id(immich_last_asset_id).empty()) {
                  id(immich_prev_asset_id) = id(immich_last_asset_id);
                  id(immich_prev_image_url) = id(immich_last_image_url);
                  id(immich_prev_date) = id(immich_photo_date);
                  id(immich_prev_location) = id(immich_photo_location);
                  id(immich_prev_year) = id(immich_photo_year);
                  id(immich_prev_month) = id(immich_photo_month);
                  id(immich_prev_person) = id(immich_photo_person);
                  int s_old = id(active_slot);
                  id(immich_prev_zoom) = (s_old == 0) ? id(slot0_zoom) : (s_old == 1) ? id(slot1_zoom) : id(slot2_zoom);
                  id(immich_prev_valid) = true;
                }
                id(portrait_left_ready) = false;
                id(portrait_right_ready) = false;
                id(portrait_companion_found) = false;
                id(immich_is_portrait_pair) = false;
                id(portrait_using_preload) = false;
                int old_slot = id(active_slot);
                id(active_slot) = (old_slot + 1) % 3;
                id(active_slot_displayed) = false;
                if (old_slot == 0) id(slot0_ready) = false;
                else if (old_slot == 1) id(slot1_ready) = false;
                else id(slot2_ready) = false;
                id(immich_last_advance_ms) = millis();
                ESP_LOGI("immich", "Advancing: slot %d -> %d", old_slot, id(active_slot));
            - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          return (s == 0 && id(slot0_ready)) || (s == 1 && id(slot1_ready)) || (s == 2 && id(slot2_ready));
                      then:
                        - lambda: |-
                            int s = id(active_slot);
                            if (s == 0) {
                              id(immich_photo_date) = id(slot0_date); id(immich_photo_location) = id(slot0_location);
                              id(immich_photo_year) = id(slot0_year); id(immich_photo_month) = id(slot0_month);
                              id(immich_photo_person) = id(slot0_person); id(immich_last_asset_id) = id(slot0_asset_id);
                              id(immich_last_image_url) = id(slot0_image_url);
                            } else if (s == 1) {
                              id(immich_photo_date) = id(slot1_date); id(immich_photo_location) = id(slot1_location);
                              id(immich_photo_year) = id(slot1_year); id(immich_photo_month) = id(slot1_month);
                              id(immich_photo_person) = id(slot1_person); id(immich_last_asset_id) = id(slot1_asset_id);
                              id(immich_last_image_url) = id(slot1_image_url);
                            } else {
                              id(immich_photo_date) = id(slot2_date); id(immich_photo_location) = id(slot2_location);
                              id(immich_photo_year) = id(slot2_year); id(immich_photo_month) = id(slot2_month);
                              id(immich_photo_person) = id(slot2_person); id(immich_last_asset_id) = id(slot2_asset_id);
                              id(immich_last_image_url) = id(slot2_image_url);
                            }
                            bool is_p = (s == 0) ? id(slot0_is_portrait) : (s == 1) ? id(slot1_is_portrait) : id(slot2_is_portrait);
                            if (!is_p) {
                              id(active_slot_displayed) = true;
                            }
                            ESP_LOGI("immich", "Instant display slot %d: %s (portrait=%d)", s, id(immich_last_asset_id).c_str(), is_p);
                        - if:
                            condition:
                              lambda: |-
                                int s = id(active_slot);
                                bool is_p = (s == 0) ? id(slot0_is_portrait) : (s == 1) ? id(slot1_is_portrait) : id(slot2_is_portrait);
                                return !is_p;
                            then:
                              - script.execute: immich_display_current
                              - script.execute: immich_prefetch_chain
                        - if:
                            condition:
                              lambda: |-
                                int s = id(active_slot);
                                bool is_p = (s == 0) ? id(slot0_is_portrait) : (s == 1) ? id(slot1_is_portrait) : id(slot2_is_portrait);
                                return is_p && id(portrait_preload_slot) == s
                                       && id(portrait_preload_left_ready) && id(portrait_preload_right_ready);
                            then:
                              - script.execute: immich_display_current
                              - script.execute: immich_prefetch_chain
                        - if:
                            condition:
                              lambda: |-
                                int s = id(active_slot);
                                bool is_p = (s == 0) ? id(slot0_is_portrait) : (s == 1) ? id(slot1_is_portrait) : id(slot2_is_portrait);
                                return is_p && !(id(portrait_preload_slot) == s
                                       && id(portrait_preload_left_ready) && id(portrait_preload_right_ready));
                            then:
                              - lambda: |-
                                  int s = id(active_slot);
                                  std::string comp = (s == 0) ? id(slot0_companion_url) : (s == 1) ? id(slot1_companion_url) : id(slot2_companion_url);
                                  std::string aid = (s == 0) ? id(slot0_asset_id) : (s == 1) ? id(slot1_asset_id) : id(slot2_asset_id);
                                  id(portrait_left_ready) = false;
                                  id(portrait_right_ready) = false;
                                  id(portrait_using_preload) = false;
                                  id(portrait_primary_asset_id) = aid;
                                  if (!comp.empty()) {
                                    id(portrait_companion_found) = true;
                                    id(portrait_companion_url) = comp;
                                    ESP_LOGI("immich", "Advance portrait %s: companion URL known, downloading pair", aid.c_str());
                                  } else {
                                    std::string dt = (s == 0) ? id(slot0_datetime) : (s == 1) ? id(slot1_datetime) : id(slot2_datetime);
                                    id(portrait_companion_found) = false;
                                    id(portrait_companion_url) = "";
                                    id(portrait_search_datetime) = dt;
                                    id(companion_target_slot) = s;
                                    ESP_LOGI("immich", "Advance portrait %s: no companion, searching", aid.c_str());
                                  }
                              - online_image.set_url:
                                  id: immich_portrait_left
                                  url: !lambda |-
                                    int s = id(active_slot);
                                    return (s == 0) ? id(slot0_image_url) : (s == 1) ? id(slot1_image_url) : id(slot2_image_url);
                              - if:
                                  condition:
                                    lambda: 'return id(portrait_companion_found);'
                                  then:
                                    - online_image.set_url:
                                        id: immich_portrait_right
                                        url: !lambda 'return id(portrait_companion_url);'
                                  else:
                                    - script.execute: immich_fetch_portrait_companion
                              - script.execute: immich_prefetch_chain
                      else:
                        - lambda: |-
                            id(target_slot) = id(active_slot);
                            ESP_LOGI("immich", "Slot %d not ready, fetching fresh", id(active_slot));
                        - script.execute: immich_fetch_into_slot

  # ---------------------------------------------------------------------------
  # Show previous image (swipe right)
  # ---------------------------------------------------------------------------
  - id: immich_show_previous
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(immich_prev_valid);'
          then:
            - logger.log:
                level: INFO
                tag: immich
                format: "No previous image available"
          else:
            - lambda: |-
                std::string tmp_id = id(immich_last_asset_id);
                std::string tmp_url = id(immich_last_image_url);
                std::string tmp_date = id(immich_photo_date);
                std::string tmp_loc = id(immich_photo_location);
                int tmp_year = id(immich_photo_year);
                int tmp_month = id(immich_photo_month);
                std::string tmp_per = id(immich_photo_person);
                int cur_s = id(active_slot);
                uint16_t tmp_zoom = (cur_s == 0) ? id(slot0_zoom) : (cur_s == 1) ? id(slot1_zoom) : id(slot2_zoom);

                id(immich_last_asset_id) = id(immich_prev_asset_id);
                id(immich_last_image_url) = id(immich_prev_image_url);
                id(immich_photo_date) = id(immich_prev_date);
                id(immich_photo_location) = id(immich_prev_location);
                id(immich_photo_year) = id(immich_prev_year);
                id(immich_photo_month) = id(immich_prev_month);
                id(immich_photo_person) = id(immich_prev_person);

                id(immich_prev_asset_id) = tmp_id;
                id(immich_prev_image_url) = tmp_url;
                id(immich_prev_date) = tmp_date;
                id(immich_prev_location) = tmp_loc;
                id(immich_prev_year) = tmp_year;
                id(immich_prev_month) = tmp_month;
                id(immich_prev_person) = tmp_per;
                id(immich_prev_zoom) = tmp_zoom;

                id(portrait_left_ready) = false;
                id(portrait_right_ready) = false;
                id(portrait_companion_found) = false;
                id(immich_is_portrait_pair) = false;
                id(portrait_using_preload) = false;

                int prev_slot = (id(active_slot) + 2) % 3;
                id(active_slot) = prev_slot;
                id(active_slot_displayed) = false;

                uint16_t prev_zoom = id(immich_prev_zoom);
                if (prev_slot == 0) {
                  id(slot0_ready) = false;
                  id(slot0_asset_id) = id(immich_last_asset_id);
                  id(slot0_image_url) = id(immich_last_image_url);
                  id(slot0_date) = id(immich_photo_date);
                  id(slot0_location) = id(immich_photo_location);
                  id(slot0_year) = id(immich_photo_year);
                  id(slot0_month) = id(immich_photo_month);
                  id(slot0_person) = id(immich_photo_person);
                  id(slot0_zoom) = prev_zoom;
                  id(slot0_pending_asset_id) = id(immich_last_asset_id);
                } else if (prev_slot == 1) {
                  id(slot1_ready) = false;
                  id(slot1_asset_id) = id(immich_last_asset_id);
                  id(slot1_image_url) = id(immich_last_image_url);
                  id(slot1_date) = id(immich_photo_date);
                  id(slot1_location) = id(immich_photo_location);
                  id(slot1_year) = id(immich_photo_year);
                  id(slot1_month) = id(immich_photo_month);
                  id(slot1_person) = id(immich_photo_person);
                  id(slot1_zoom) = prev_zoom;
                  id(slot1_pending_asset_id) = id(immich_last_asset_id);
                } else {
                  id(slot2_ready) = false;
                  id(slot2_asset_id) = id(immich_last_asset_id);
                  id(slot2_image_url) = id(immich_last_image_url);
                  id(slot2_date) = id(immich_photo_date);
                  id(slot2_location) = id(immich_photo_location);
                  id(slot2_year) = id(immich_photo_year);
                  id(slot2_month) = id(immich_photo_month);
                  id(slot2_person) = id(immich_photo_person);
                  id(slot2_zoom) = prev_zoom;
                  id(slot2_pending_asset_id) = id(immich_last_asset_id);
                }
                ESP_LOGI("immich", "Showing previous in slot %d: %s", prev_slot, id(immich_last_asset_id).c_str());
            - if:
                condition:
                  lambda: 'return id(active_slot) == 0;'
                then:
                  - online_image.set_url:
                      id: immich_img_0
                      url: !lambda 'return id(slot0_image_url);'
            - if:
                condition:
                  lambda: 'return id(active_slot) == 1;'
                then:
                  - online_image.set_url:
                      id: immich_img_1
                      url: !lambda 'return id(slot1_image_url);'
            - if:
                condition:
                  lambda: 'return id(active_slot) == 2;'
                then:
                  - online_image.set_url:
                      id: immich_img_2
                      url: !lambda 'return id(slot2_image_url);'

  # ---------------------------------------------------------------------------
  # Fetch API metadata and start image download into target_slot
  # ---------------------------------------------------------------------------
  - id: immich_fetch_into_slot
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_url).state.empty() || id(immich_api_key_text).state.empty();'
          then:
            - logger.log:
                level: WARN
                tag: immich
                format: "Immich URL or API key not configured. Set via web UI at http://<device-ip>/"
            - script.stop: immich_fetch_into_slot
      - lambda: |-
          id(immich_fetch_started) = true;
          ESP_LOGI("immich", "Fetching into slot %d (URL: %s, key: %d chars)",
                   id(target_slot), id(immich_url).state.c_str(),
                   id(immich_api_key_text).state.length());
      - http_request.post:
          id: http_req
          url: !lambda |-
            std::string u = id(immich_url).state;
            while (!u.empty() && u.back() == '/') u.pop_back();
            return u + "/api/search/random";
          capture_response: true
          max_response_buffer_size: 24kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: !lambda 'return id(immich_api_key_text).state.c_str();'
          body: '{"size":1,"type":"IMAGE","withExif":true,"withPeople":true}'
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "HTTP %d from Immich", response->status_code);
                    return;
                  }
                  std::string asset_id, photo_date, photo_location, photo_person, local_datetime;
                  int photo_year = 0, photo_month = 0;
                  bool is_portrait = false;
                  uint16_t slot_zoom = 256;
                  auto doc = json::parse_json(body);
                  JsonObject asset;
                  if (!doc.isNull()) {
                    if (doc.is<JsonArray>()) {
                      JsonArray arr = doc.as<JsonArray>();
                      if (arr.size() > 0) asset = arr[0].as<JsonObject>();
                    } else if (doc.is<JsonObject>()) {
                      asset = doc.as<JsonObject>();
                    }
                  }
                  if (asset.isNull() || !asset["id"].is<const char *>()) {
                    ESP_LOGW("immich", "No valid asset in response");
                    return;
                  }
                  asset_id = asset["id"].as<std::string>();

                  if (asset["localDateTime"].is<const char *>()) {
                    std::string raw = asset["localDateTime"].as<std::string>();
                    local_datetime = raw;
                    if (raw.size() >= 10) {
                      photo_year = atoi(raw.substr(0, 4).c_str());
                      photo_month = atoi(raw.substr(5, 2).c_str());
                      const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                              "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                      if (photo_month >= 1 && photo_month <= 12)
                        photo_date = str_sprintf("%s %d", months[photo_month], photo_year);
                    }
                  }

                  JsonObject exif = asset["exifInfo"].as<JsonObject>();
                  if (!exif.isNull()) {
                    std::string city, country;
                    if (exif["city"].is<const char *>()) city = exif["city"].as<std::string>();
                    if (exif["country"].is<const char *>()) country = exif["country"].as<std::string>();
                    if (!city.empty() && !country.empty()) photo_location = city + ", " + country;
                    else if (!city.empty()) photo_location = city;
                    else if (!country.empty()) photo_location = country;

                    if (photo_date.empty() && exif["dateTimeOriginal"].is<const char *>()) {
                      std::string raw = exif["dateTimeOriginal"].as<std::string>();
                      if (raw.size() >= 10) {
                        photo_year = atoi(raw.substr(0, 4).c_str());
                        photo_month = atoi(raw.substr(5, 2).c_str());
                        const char *months[] = {"", "Jan", "Feb", "Mar", "Apr", "May", "Jun",
                                                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"};
                        if (photo_month >= 1 && photo_month <= 12)
                          photo_date = str_sprintf("%s %d", months[photo_month], photo_year);
                      }
                    }

                    int exif_w = 0, exif_h = 0;
                    if (exif["exifImageWidth"].is<int>()) exif_w = exif["exifImageWidth"].as<int>();
                    if (exif["exifImageHeight"].is<int>()) exif_h = exif["exifImageHeight"].as<int>();
                    std::string orientation;
                    if (exif["orientation"].is<const char *>()) orientation = exif["orientation"].as<std::string>();
                    if (orientation == "5" || orientation == "6" || orientation == "7" || orientation == "8") {
                      std::swap(exif_w, exif_h);
                    }
                    if (exif_w > 0 && exif_h > 0) {
                      is_portrait = (exif_h > exif_w);
                      if (!is_portrait) {
                        float aspect = (float)exif_w / (float)exif_h;
                        const float max_panoramic_ratio = 2.0f;
                        if (aspect > 1.6f && aspect <= max_panoramic_ratio) {
                          float decoded_h = 1280.0f / aspect;
                          slot_zoom = (uint16_t)(256.0f * 800.0f / decoded_h);
                        }
                      }
                    }
                  }

                  if (asset["people"].is<JsonArray>()) {
                    JsonArray people = asset["people"].as<JsonArray>();
                    if (people.size() > 0) {
                      JsonObject person = people[0].as<JsonObject>();
                      if (person["name"].is<const char *>())
                        photo_person = person["name"].as<std::string>();
                    }
                  }

                  std::string base = id(immich_url).state;
                  while (!base.empty() && base.back() == '/') base.pop_back();
                  std::string img_url = base +
                                        "/api/assets/" + asset_id + "/thumbnail?size=preview";
                  int slot = id(target_slot);
                  ESP_LOGI("immich", "Slot %d fetched: %s | %s | %s | %s | portrait=%d zoom=%u",
                           slot, asset_id.c_str(), photo_date.c_str(),
                           photo_person.c_str(), photo_location.c_str(), is_portrait, slot_zoom);

                  if (id(portrait_preload_slot) == slot) {
                    id(portrait_preload_slot) = -1;
                    id(portrait_preload_left_ready) = false;
                    id(portrait_preload_right_ready) = false;
                  }

                  if (slot == 0) {
                    id(slot0_asset_id) = asset_id; id(slot0_image_url) = img_url;
                    id(slot0_date) = photo_date; id(slot0_location) = photo_location;
                    id(slot0_year) = photo_year; id(slot0_month) = photo_month;
                    id(slot0_person) = photo_person;
                    id(slot0_is_portrait) = is_portrait; id(slot0_datetime) = local_datetime;
                    id(slot0_companion_url) = ""; id(slot0_zoom) = slot_zoom;
                    id(slot0_pending_asset_id) = asset_id;
                    ESP_LOGI("immich", "Starting image download slot 0: %s (api key: %d chars)", img_url.c_str(), id(immich_api_key_text).state.length());
                    id(immich_img_0).set_url(img_url);
                    id(immich_img_0).update();
                  } else if (slot == 1) {
                    id(slot1_asset_id) = asset_id; id(slot1_image_url) = img_url;
                    id(slot1_date) = photo_date; id(slot1_location) = photo_location;
                    id(slot1_year) = photo_year; id(slot1_month) = photo_month;
                    id(slot1_person) = photo_person;
                    id(slot1_is_portrait) = is_portrait; id(slot1_datetime) = local_datetime;
                    id(slot1_companion_url) = ""; id(slot1_zoom) = slot_zoom;
                    id(slot1_pending_asset_id) = asset_id;
                    ESP_LOGI("immich", "Starting image download slot 1: %s (api key: %d chars)", img_url.c_str(), id(immich_api_key_text).state.length());
                    id(immich_img_1).set_url(img_url);
                    id(immich_img_1).update();
                  } else {
                    id(slot2_asset_id) = asset_id; id(slot2_image_url) = img_url;
                    id(slot2_date) = photo_date; id(slot2_location) = photo_location;
                    id(slot2_year) = photo_year; id(slot2_month) = photo_month;
                    id(slot2_person) = photo_person;
                    id(slot2_is_portrait) = is_portrait; id(slot2_datetime) = local_datetime;
                    id(slot2_companion_url) = ""; id(slot2_zoom) = slot_zoom;
                    id(slot2_pending_asset_id) = asset_id;
                    ESP_LOGI("immich", "Starting image download slot 2: %s (api key: %d chars)", img_url.c_str(), id(immich_api_key_text).state.length());
                    id(immich_img_2).set_url(img_url);
                    id(immich_img_2).update();
                  }
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("immich", "API request error for slot %d (URL: %s)", id(target_slot), id(immich_url).state.c_str());

  # ---------------------------------------------------------------------------
  # Fetch a companion portrait from a similar date/time
  # ---------------------------------------------------------------------------
  - id: immich_fetch_portrait_companion
    mode: single
    then:
      - if:
          condition:
            lambda: 'return id(immich_url).state.empty() || id(immich_api_key_text).state.empty();'
          then:
            - script.stop: immich_fetch_portrait_companion
      - lambda: |-
          std::string dt = id(portrait_search_datetime);
          if (dt.size() < 10) {
            ESP_LOGW("immich", "No datetime for companion search");
            id(portrait_companion_found) = false;
            if (id(companion_target_slot) == id(active_slot) && !id(active_slot_displayed)) {
              id(active_slot_displayed) = true;
              id(immich_display_current).execute();
            }
            return;
          }
          std::string day = dt.substr(0, 10);
          id(portrait_search_datetime) = day;
          ESP_LOGI("immich", "Searching companion portrait for slot %d, date %s",
                   id(companion_target_slot), day.c_str());
      - http_request.post:
          id: http_req
          url: !lambda |-
            std::string u = id(immich_url).state;
            while (!u.empty() && u.back() == '/') u.pop_back();
            return u + "/api/search/random";
          capture_response: true
          max_response_buffer_size: 48kB
          request_headers:
            Content-Type: application/json
            Accept: application/json
            x-api-key: !lambda 'return id(immich_api_key_text).state.c_str();'
          body: !lambda |-
            std::string day = id(portrait_search_datetime);
            std::string after = day + "T00:00:00.000Z";
            std::string before = day + "T23:59:59.999Z";
            return "{\"size\":10,\"type\":\"IMAGE\",\"withExif\":true,\"takenAfter\":\"" + after + "\",\"takenBefore\":\"" + before + "\"}";
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("immich", "Companion search HTTP %d", response->status_code);
                    id(portrait_companion_found) = false;
                    if (id(companion_target_slot) == id(active_slot) && !id(active_slot_displayed)) {
                      id(active_slot_displayed) = true;
                      id(immich_display_current).execute();
                    }
                    return;
                  }
                  auto doc = json::parse_json(body);
                  if (doc.isNull() || !doc.is<JsonArray>()) {
                    ESP_LOGW("immich", "Companion search: no results");
                    id(portrait_companion_found) = false;
                    if (id(companion_target_slot) == id(active_slot) && !id(active_slot_displayed)) {
                      id(active_slot_displayed) = true;
                      id(immich_display_current).execute();
                    }
                    return;
                  }
                  JsonArray arr = doc.as<JsonArray>();
                  std::string primary_id = id(portrait_primary_asset_id);
                  std::string companion_url;

                  for (size_t i = 0; i < arr.size(); i++) {
                    JsonObject asset = arr[i].as<JsonObject>();
                    if (asset.isNull() || !asset["id"].is<const char *>()) continue;
                    std::string aid = asset["id"].as<std::string>();
                    if (aid == primary_id) continue;

                    JsonObject exif = asset["exifInfo"].as<JsonObject>();
                    if (exif.isNull()) continue;
                    int ew = 0, eh = 0;
                    if (exif["exifImageWidth"].is<int>()) ew = exif["exifImageWidth"].as<int>();
                    if (exif["exifImageHeight"].is<int>()) eh = exif["exifImageHeight"].as<int>();
                    std::string ori;
                    if (exif["orientation"].is<const char *>()) ori = exif["orientation"].as<std::string>();
                    if (ori == "5" || ori == "6" || ori == "7" || ori == "8") std::swap(ew, eh);
                    if (ew <= 0 || eh <= 0 || eh <= ew) continue;

                    std::string cbase = id(immich_url).state;
                    while (!cbase.empty() && cbase.back() == '/') cbase.pop_back();
                    companion_url = cbase +
                                    "/api/assets/" + aid + "/thumbnail?size=preview";
                    ESP_LOGI("immich", "Companion portrait found: %s for slot %d",
                             aid.c_str(), id(companion_target_slot));
                    break;
                  }

                  if (companion_url.empty()) {
                    ESP_LOGI("immich", "No companion portrait found for this day");
                    id(portrait_companion_found) = false;
                    if (id(companion_target_slot) == id(active_slot) && !id(active_slot_displayed)) {
                      id(active_slot_displayed) = true;
                      id(immich_display_current).execute();
                    }
                    return;
                  }
                  id(portrait_companion_found) = true;
                  id(portrait_companion_url) = companion_url;
                  int ts = id(companion_target_slot);
                  if (ts == 0) id(slot0_companion_url) = companion_url;
                  else if (ts == 1) id(slot1_companion_url) = companion_url;
                  else id(slot2_companion_url) = companion_url;
              - if:
                  condition:
                    lambda: 'return id(portrait_companion_found) && id(companion_target_slot) == id(active_slot);'
                  then:
                    - online_image.set_url:
                        id: immich_portrait_right
                        url: !lambda 'return id(portrait_companion_url);'
              - if:
                  condition:
                    lambda: 'return id(portrait_companion_found) && id(companion_target_slot) != id(active_slot);'
                  then:
                    - lambda: |-
                        int ts = id(companion_target_slot);
                        std::string primary_url = (ts == 0) ? id(slot0_image_url) : (ts == 1) ? id(slot1_image_url) : id(slot2_image_url);
                        id(portrait_preload_slot) = ts;
                        id(portrait_preload_left_ready) = false;
                        id(portrait_preload_right_ready) = false;
                        ESP_LOGI("immich", "Starting portrait preload for slot %d", ts);
                    - online_image.set_url:
                        id: immich_portrait_preload_left
                        url: !lambda |-
                          int ts = id(companion_target_slot);
                          return (ts == 0) ? id(slot0_image_url) : (ts == 1) ? id(slot1_image_url) : id(slot2_image_url);
                    - online_image.set_url:
                        id: immich_portrait_preload_right
                        url: !lambda 'return id(portrait_companion_url);'
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("immich", "Companion search request failed");
                  id(portrait_companion_found) = false;
                  if (id(companion_target_slot) == id(active_slot) && !id(active_slot_displayed)) {
                    id(active_slot_displayed) = true;
                    id(immich_display_current).execute();
                  }
      - script.execute: immich_prefetch_chain

  # ---------------------------------------------------------------------------
  # Display portrait pair (called when both left and right are ready)
  # ---------------------------------------------------------------------------
  - id: immich_display_portrait_pair
    mode: single
    then:
      - lambda: |-
          id(immich_is_portrait_pair) = true;
          id(active_slot_displayed) = true;
          lv_img_set_zoom(id(slideshow_img), 256);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          ESP_LOGI("immich", "Displaying portrait pair");
      - lvgl.image.update:
          id: portrait_left_img
          src: immich_portrait_left
      - lvgl.image.update:
          id: portrait_right_img
          src: immich_portrait_right
      - lambda: |-
          std::string loc = id(immich_photo_location);
          lv_label_set_text(id(location_label), loc.c_str());
          lv_label_set_text(id(location_label_shadow), loc.c_str());

          std::string ago;
          if (id(immich_photo_year) > 0) {
            auto now = id(sntp_time).now();
            if (now.is_valid()) {
              int months_ago = (now.year - id(immich_photo_year)) * 12 + (now.month - id(immich_photo_month));
              if (months_ago >= 12) {
                int years = months_ago / 12;
                if (years == 1) ago = "1 year ago";
                else ago = str_sprintf("%d years ago", years);
              } else if (months_ago == 1) {
                ago = "1 month ago";
              } else if (months_ago > 1) {
                ago = str_sprintf("%d months ago", months_ago);
              }
            }
          }
          lv_label_set_text(id(time_ago_label), ago.c_str());
          lv_label_set_text(id(time_ago_label_shadow), ago.c_str());
      - script.execute: extract_accent_color
      - script.execute: immich_prefetch_chain

  # ---------------------------------------------------------------------------
  # Prefetch chain: fill the next empty slot(s) ahead of active_slot
  # ---------------------------------------------------------------------------
  - id: immich_prefetch_chain
    mode: single
    then:
      - lambda: |-
          int next1 = (id(active_slot) + 1) % 3;
          int next2 = (id(active_slot) + 2) % 3;
          bool n1_ready = (next1 == 0) ? id(slot0_ready) : (next1 == 1) ? id(slot1_ready) : id(slot2_ready);
          bool n2_ready = (next2 == 0) ? id(slot0_ready) : (next2 == 1) ? id(slot1_ready) : id(slot2_ready);
          if (!n1_ready) {
            id(target_slot) = next1;
            ESP_LOGI("immich", "Prefetch chain: filling slot %d (next)", next1);
          } else if (!n2_ready) {
            id(target_slot) = next2;
            ESP_LOGI("immich", "Prefetch chain: filling slot %d (next-next)", next2);
          } else {
            ESP_LOGI("immich", "Prefetch chain: all slots filled");
            return;
          }
      - if:
          condition:
            lambda: |-
              int next1 = (id(active_slot) + 1) % 3;
              int next2 = (id(active_slot) + 2) % 3;
              bool n1_ready = (next1 == 0) ? id(slot0_ready) : (next1 == 1) ? id(slot1_ready) : id(slot2_ready);
              bool n2_ready = (next2 == 0) ? id(slot0_ready) : (next2 == 1) ? id(slot1_ready) : id(slot2_ready);
              return !n1_ready || !n2_ready;
          then:
            - script.execute: immich_fetch_into_slot
