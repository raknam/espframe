# =============================================================================
# SCREEN: IMMICH SLIDESHOW
# =============================================================================
# Digital photo frame powered by Immich. Uses a 3-slot ring buffer of
# online_image components for instant forward swiping. Two images are
# prefetched ahead. Backward navigation re-downloads from a stored URL.
# =============================================================================

substitutions:
  immich_slide_interval_seconds: "15"

# =============================================================================
# GLOBALS
# =============================================================================

globals:
  # --- System ---
  - id: immich_last_advance_ms
    type: uint32_t
    initial_value: '0'
  - id: immich_error_retries
    type: int
    initial_value: '0'
  - id: touch_start_x
    type: int
    initial_value: '0'

  # --- Ring buffer state ---
  - id: active_slot
    type: int
    initial_value: '0'
  - id: target_slot
    type: int
    initial_value: '0'
  - id: active_slot_displayed
    type: bool
    initial_value: 'false'
  - id: slot0_ready
    type: bool
    initial_value: 'false'
  - id: slot1_ready
    type: bool
    initial_value: 'false'
  - id: slot2_ready
    type: bool
    initial_value: 'false'

  # --- Current display metadata ---
  - id: immich_last_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_last_image_url
    type: std::string
    initial_value: '""'
  - id: immich_photo_date
    type: std::string
    initial_value: '""'
  - id: immich_photo_location
    type: std::string
    initial_value: '""'
  - id: immich_photo_year
    type: int
    initial_value: '0'
  - id: immich_photo_month
    type: int
    initial_value: '0'
  - id: immich_photo_person
    type: std::string
    initial_value: '""'

  # --- Previous image (for backward navigation) ---
  - id: immich_prev_valid
    type: bool
    initial_value: 'false'
  - id: immich_prev_asset_id
    type: std::string
    initial_value: '""'
  - id: immich_prev_image_url
    type: std::string
    initial_value: '""'
  - id: immich_prev_date
    type: std::string
    initial_value: '""'
  - id: immich_prev_location
    type: std::string
    initial_value: '""'
  - id: immich_prev_year
    type: int
    initial_value: '0'
  - id: immich_prev_month
    type: int
    initial_value: '0'
  - id: immich_prev_person
    type: std::string
    initial_value: '""'

  # --- Slot 0 metadata ---
  - id: slot0_asset_id
    type: std::string
    initial_value: '""'
  - id: slot0_image_url
    type: std::string
    initial_value: '""'
  - id: slot0_date
    type: std::string
    initial_value: '""'
  - id: slot0_location
    type: std::string
    initial_value: '""'
  - id: slot0_year
    type: int
    initial_value: '0'
  - id: slot0_month
    type: int
    initial_value: '0'
  - id: slot0_person
    type: std::string
    initial_value: '""'

  # --- Slot 1 metadata ---
  - id: slot1_asset_id
    type: std::string
    initial_value: '""'
  - id: slot1_image_url
    type: std::string
    initial_value: '""'
  - id: slot1_date
    type: std::string
    initial_value: '""'
  - id: slot1_location
    type: std::string
    initial_value: '""'
  - id: slot1_year
    type: int
    initial_value: '0'
  - id: slot1_month
    type: int
    initial_value: '0'
  - id: slot1_person
    type: std::string
    initial_value: '""'

  # --- Slot 2 metadata ---
  - id: slot2_asset_id
    type: std::string
    initial_value: '""'
  - id: slot2_image_url
    type: std::string
    initial_value: '""'
  - id: slot2_date
    type: std::string
    initial_value: '""'
  - id: slot2_location
    type: std::string
    initial_value: '""'
  - id: slot2_year
    type: int
    initial_value: '0'
  - id: slot2_month
    type: int
    initial_value: '0'
  - id: slot2_person
    type: std::string
    initial_value: '""'

  # --- Per-slot pending download tracking (for race condition guard) ---
  - id: slot0_pending_asset_id
    type: std::string
    initial_value: '""'
  - id: slot1_pending_asset_id
    type: std::string
    initial_value: '""'
  - id: slot2_pending_asset_id
    type: std::string
    initial_value: '""'

  # --- Per-slot portrait detection ---
  - id: slot0_is_portrait
    type: bool
    initial_value: 'false'
  - id: slot1_is_portrait
    type: bool
    initial_value: 'false'
  - id: slot2_is_portrait
    type: bool
    initial_value: 'false'
  - id: slot0_datetime
    type: std::string
    initial_value: '""'
  - id: slot1_datetime
    type: std::string
    initial_value: '""'
  - id: slot2_datetime
    type: std::string
    initial_value: '""'
  - id: slot0_companion_url
    type: std::string
    initial_value: '""'
  - id: slot1_companion_url
    type: std::string
    initial_value: '""'
  - id: slot2_companion_url
    type: std::string
    initial_value: '""'

  # --- Per-slot landscape zoom (256 = no zoom) ---
  - id: slot0_zoom
    type: uint16_t
    initial_value: '256'
  - id: slot1_zoom
    type: uint16_t
    initial_value: '256'
  - id: slot2_zoom
    type: uint16_t
    initial_value: '256'
  - id: immich_prev_zoom
    type: uint16_t
    initial_value: '256'

  # --- Portrait pair state ---
  - id: portrait_left_ready
    type: bool
    initial_value: 'false'
  - id: portrait_right_ready
    type: bool
    initial_value: 'false'
  - id: portrait_companion_found
    type: bool
    initial_value: 'false'
  - id: portrait_search_datetime
    type: std::string
    initial_value: '""'
  - id: portrait_primary_asset_id
    type: std::string
    initial_value: '""'
  - id: companion_target_slot
    type: int
    initial_value: '0'
  - id: immich_is_portrait_pair
    type: bool
    initial_value: 'false'

  - id: portrait_companion_url
    type: std::string
    initial_value: '""'

  # --- Portrait preload state ---
  - id: portrait_preload_slot
    type: int
    initial_value: '-1'
  - id: portrait_preload_left_ready
    type: bool
    initial_value: 'false'
  - id: portrait_preload_right_ready
    type: bool
    initial_value: 'false'
  - id: portrait_using_preload
    type: bool
    initial_value: 'false'

  # --- Previous image portrait state ---
  - id: immich_prev_is_portrait
    type: bool
    initial_value: 'false'
  - id: immich_prev_datetime
    type: std::string
    initial_value: '""'

# =============================================================================
# 3-SLOT IMAGE RING BUFFER
# =============================================================================

online_image:
  - id: immich_img_0
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            ESP_LOGI("immich", "Slot 0 download finished (asset: %s, pending: %s, match: %s)",
                     id(slot0_asset_id).c_str(), id(slot0_pending_asset_id).c_str(),
                     (id(slot0_asset_id) == id(slot0_pending_asset_id)) ? "yes" : "no");
        - if:
            condition:
              lambda: 'return id(slot0_asset_id) == id(slot0_pending_asset_id);'
            then:
              - lambda: |-
                  id(slot0_ready) = true;
                  id(immich_error_retries) = 0;
                  ESP_LOGI("immich", "Slot 0 ready: %s", id(slot0_asset_id).c_str());
                  if (id(active_slot) == 0) {
                    id(immich_photo_date) = id(slot0_date);
                    id(immich_photo_location) = id(slot0_location);
                    id(immich_photo_year) = id(slot0_year);
                    id(immich_photo_month) = id(slot0_month);
                    id(immich_photo_person) = id(slot0_person);
                    id(immich_last_asset_id) = id(slot0_asset_id);
                    id(immich_last_image_url) = id(slot0_image_url);
                    if (!id(slot0_is_portrait)) {
                      id(active_slot_displayed) = true;
                    }
                  }
              - if:
                  condition:
                    lambda: 'return id(active_slot) == 0 && !id(slot0_is_portrait);'
                  then:
                    - script.execute: immich_display_current
              - if:
                  condition:
                    lambda: 'return id(active_slot) == 0 && id(slot0_is_portrait);'
                  then:
                    - lambda: |-
                        std::string comp = id(slot0_companion_url);
                        id(portrait_left_ready) = false;
                        id(portrait_right_ready) = false;
                        id(portrait_using_preload) = false;
                        id(portrait_primary_asset_id) = id(slot0_asset_id);
                        if (!comp.empty()) {
                          id(portrait_companion_found) = true;
                          id(portrait_companion_url) = comp;
                          ESP_LOGI("immich", "Portrait slot 0 active: companion URL known, starting both downloads");
                        } else {
                          id(portrait_companion_found) = false;
                          id(portrait_companion_url) = "";
                          id(portrait_search_datetime) = id(slot0_datetime);
                          id(companion_target_slot) = 0;
                          ESP_LOGI("immich", "Portrait slot 0 active: no companion, searching now");
                        }
                    - online_image.set_url:
                        id: immich_portrait_left
                        url: !lambda 'return id(slot0_image_url);'
                    - if:
                        condition:
                          lambda: 'return id(portrait_companion_found);'
                        then:
                          - online_image.set_url:
                              id: immich_portrait_right
                              url: !lambda 'return id(portrait_companion_url);'
                        else:
                          - script.execute: immich_fetch_portrait_companion
              - if:
                  condition:
                    lambda: 'return id(slot0_is_portrait) && id(active_slot) != 0;'
                  then:
                    - lambda: |-
                        id(companion_target_slot) = 0;
                        id(portrait_search_datetime) = id(slot0_datetime);
                        id(portrait_primary_asset_id) = id(slot0_asset_id);
                    - script.execute: immich_fetch_portrait_companion
                  else:
                    - if:
                        condition:
                          lambda: 'return id(active_slot) != 0;'
                        then:
                          - script.execute: immich_prefetch_chain
            else:
              - lambda: |-
                  ESP_LOGW("immich", "Slot 0 download stale (pending %s, current %s), ignoring",
                           id(slot0_pending_asset_id).c_str(), id(slot0_asset_id).c_str());
    on_error:
      then:
        - lambda: |-
            id(immich_error_retries)++;
            ESP_LOGE("immich", "Slot 0 download/decode FAILED (attempt %d, url: %s)", id(immich_error_retries), id(slot0_image_url).c_str());
        - if:
            condition:
              lambda: 'return id(immich_error_retries) < 3;'
            then:
              - delay: 2s
              - script.execute: immich_prefetch_chain
            else:
              - lambda: 'id(immich_error_retries) = 0;'

  - id: immich_img_1
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
