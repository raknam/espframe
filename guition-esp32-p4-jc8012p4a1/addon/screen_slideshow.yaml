                  ESP_LOGI("immich", "Slot 1 ready: %s", id(slot1_asset_id).c_str());
                  if (id(active_slot) == 1) {
                    id(immich_photo_date) = id(slot1_date);
                    id(immich_photo_location) = id(slot1_location);
                    id(immich_photo_year) = id(slot1_year);
                    id(immich_photo_month) = id(slot1_month);
                    id(immich_photo_person) = id(slot1_person);
                    id(immich_last_asset_id) = id(slot1_asset_id);
                    id(immich_last_image_url) = id(slot1_image_url);
                    if (!id(slot1_is_portrait)) {
                      id(active_slot_displayed) = true;
                    }
                  }
              - if:
                  condition:
                    lambda: 'return id(active_slot) == 1 && !id(slot1_is_portrait);'
                  then:
                    - script.execute: immich_display_current
              - if:
                  condition:
                    lambda: 'return id(active_slot) == 1 && id(slot1_is_portrait);'
                  then:
                    - lambda: |-
                        std::string comp = id(slot1_companion_url);
                        id(portrait_left_ready) = false;
                        id(portrait_right_ready) = false;
                        id(portrait_using_preload) = false;
                        id(portrait_primary_asset_id) = id(slot1_asset_id);
                        if (!comp.empty()) {
                          id(portrait_companion_found) = true;
                          id(portrait_companion_url) = comp;
                          ESP_LOGI("immich", "Portrait slot 1 active: companion URL known, starting both downloads");
                        } else {
                          id(portrait_companion_found) = false;
                          id(portrait_companion_url) = "";
                          id(portrait_search_datetime) = id(slot1_datetime);
                          id(companion_target_slot) = 1;
                          ESP_LOGI("immich", "Portrait slot 1 active: no companion, searching now");
                        }
                    - online_image.set_url:
                        id: immich_portrait_left
                        url: !lambda 'return id(slot1_image_url);'
                    - if:
                        condition:
                          lambda: 'return id(portrait_companion_found);'
                        then:
                          - online_image.set_url:
                              id: immich_portrait_right
                              url: !lambda 'return id(portrait_companion_url);'
                        else:
                          - script.execute: immich_fetch_portrait_companion
              - if:
                  condition:
                    lambda: 'return id(slot1_is_portrait) && id(active_slot) != 1;'
                  then:
                    - lambda: |-
                        id(companion_target_slot) = 1;
                        id(portrait_search_datetime) = id(slot1_datetime);
                        id(portrait_primary_asset_id) = id(slot1_asset_id);
                    - script.execute: immich_fetch_portrait_companion
                  else:
                    - if:
                        condition:
                          lambda: 'return id(active_slot) != 1;'
                        then:
                          - script.execute: immich_prefetch_chain
            else:
              - lambda: |-
                  ESP_LOGW("immich", "Slot 1 download stale (pending %s, current %s), ignoring",
                           id(slot1_pending_asset_id).c_str(), id(slot1_asset_id).c_str());
    on_error:
      then:
        - lambda: |-
            id(immich_error_retries)++;
            ESP_LOGE("immich", "Slot 1 decode failed (attempt %d)", id(immich_error_retries));
        - if:
            condition:
              lambda: 'return id(immich_error_retries) < 3;'
            then:
              - delay: 2s
              - script.execute: immich_prefetch_chain
            else:
              - lambda: 'id(immich_error_retries) = 0;'

