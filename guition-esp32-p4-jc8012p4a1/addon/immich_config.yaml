# =============================================================================
# IMMICH CONFIGURATION - Runtime-configurable Immich server settings
# =============================================================================
# Exposes Immich URL and API key as text entities in the web server UI.
# Values persist across reboots via NVS flash. Configure via http://<device-ip>/
# =============================================================================

text:
  - platform: template
    name: "Immich URL"
    id: immich_url
    optimistic: true
    restore_value: true
    min_length: 0
    max_length: 255
    mode: text
    icon: "mdi:web"

  - platform: template
    name: "Immich API Key"
    id: immich_api_key_text
    optimistic: true
    restore_value: true
    min_length: 0
    max_length: 255
    mode: password
    icon: "mdi:key"
