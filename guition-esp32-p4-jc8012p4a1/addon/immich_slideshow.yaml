# =============================================================================
# IMMICH SLIDESHOW - Ring buffer, display, and navigation
# =============================================================================
# 3-slot ring buffer of online_image components for instant swiping.
# Two images are prefetched ahead. Portrait pairs are detected and displayed
# side-by-side. Backward navigation re-downloads from a stored URL.
# =============================================================================

# =============================================================================
# GLOBALS
# =============================================================================

globals:
  # --- Per-slot metadata (struct replaces 60+ individual globals) ---
  - id: slot0
    type: SlotMeta
  - id: slot1
    type: SlotMeta
  - id: slot2
    type: SlotMeta

  # --- Current and previous display metadata ---
  - id: current_display
    type: DisplayMeta
  - id: prev_display
    type: DisplayMeta

  # --- Ring buffer state ---
  - id: active_slot
    type: int
    initial_value: '0'
  - id: target_slot
    type: int
    initial_value: '0'
  - id: active_slot_displayed
    type: bool
    initial_value: 'false'
  - id: immich_last_advance_ms
    type: uint32_t
    initial_value: '0'
  - id: last_downloaded_slot
    type: int
    initial_value: '-1'
  - id: immich_download_retries
    type: int
    initial_value: '0'
  - id: touch_start_x
    type: int
    initial_value: '0'

  # --- Portrait pair state ---
  - id: portrait_left_ready
    type: bool
    initial_value: 'false'
  - id: portrait_right_ready
    type: bool
    initial_value: 'false'
  - id: portrait_companion_found
    type: bool
    initial_value: 'false'
  - id: portrait_search_datetime
    type: std::string
    initial_value: '""'
  - id: portrait_primary_asset_id
    type: std::string
    initial_value: '""'
  - id: companion_target_slot
    type: int
    initial_value: '0'
  - id: immich_is_portrait_pair
    type: bool
    initial_value: 'false'
  - id: portrait_companion_url
    type: std::string
    initial_value: '""'

  # --- Portrait preload state ---
  - id: portrait_preload_slot
    type: int
    initial_value: '-1'
  - id: portrait_preload_left_ready
    type: bool
    initial_value: 'false'
  - id: portrait_preload_right_ready
    type: bool
    initial_value: 'false'
  - id: portrait_using_preload
    type: bool
    initial_value: 'false'

# =============================================================================
# 3-SLOT IMAGE RING BUFFER
# =============================================================================

online_image:
  - id: immich_img_0
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 0;
            auto &meta = id(slot0);
            if (meta.asset_id != meta.pending_asset_id) {
              ESP_LOGW("immich", "Slot %d download stale, ignoring", slot);
              return;
            }
            meta.ready = true;
            id(immich_download_retries) = 0;
            ESP_LOGI("immich", "Slot %d ready: %s", slot, meta.asset_id.c_str());
            bool is_active = (id(active_slot) == slot);
            if (is_active) {
              copy_slot_to_display(meta, id(current_display));
              if (!meta.is_portrait) id(active_slot_displayed) = true;
            }
            if (is_active && !meta.is_portrait) {
              id(immich_display_current).execute();
            } else if (is_active && meta.is_portrait) {
              id(immich_start_portrait_active).execute();
            } else if (!is_active && meta.is_portrait) {
              id(companion_target_slot) = slot;
              id(portrait_search_datetime) = meta.datetime;
              id(portrait_primary_asset_id) = meta.asset_id;
              id(immich_fetch_portrait_companion).execute();
            } else if (!is_active) {
              id(immich_prefetch_chain).execute();
            }
    on_error:
      then:
        - lambda: 'id(last_downloaded_slot) = 0;'
        - script.execute: handle_slot_download_error

  - id: immich_img_1
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 1;
            auto &meta = id(slot1);
            if (meta.asset_id != meta.pending_asset_id) {
              ESP_LOGW("immich", "Slot %d download stale, ignoring", slot);
              return;
            }
            meta.ready = true;
            id(immich_download_retries) = 0;
            ESP_LOGI("immich", "Slot %d ready: %s", slot, meta.asset_id.c_str());
            bool is_active = (id(active_slot) == slot);
            if (is_active) {
              copy_slot_to_display(meta, id(current_display));
              if (!meta.is_portrait) id(active_slot_displayed) = true;
            }
            if (is_active && !meta.is_portrait) {
              id(immich_display_current).execute();
            } else if (is_active && meta.is_portrait) {
              id(immich_start_portrait_active).execute();
            } else if (!is_active && meta.is_portrait) {
              id(companion_target_slot) = slot;
              id(portrait_search_datetime) = meta.datetime;
              id(portrait_primary_asset_id) = meta.asset_id;
              id(immich_fetch_portrait_companion).execute();
            } else if (!is_active) {
              id(immich_prefetch_chain).execute();
            }
    on_error:
      then:
        - lambda: 'id(last_downloaded_slot) = 1;'
        - script.execute: handle_slot_download_error

  - id: immich_img_2
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 1280x960
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            const int slot = 2;
            auto &meta = id(slot2);
            if (meta.asset_id != meta.pending_asset_id) {
              ESP_LOGW("immich", "Slot %d download stale, ignoring", slot);
              return;
            }
            meta.ready = true;
            id(immich_download_retries) = 0;
            ESP_LOGI("immich", "Slot %d ready: %s", slot, meta.asset_id.c_str());
            bool is_active = (id(active_slot) == slot);
            if (is_active) {
              copy_slot_to_display(meta, id(current_display));
              if (!meta.is_portrait) id(active_slot_displayed) = true;
            }
            if (is_active && !meta.is_portrait) {
              id(immich_display_current).execute();
            } else if (is_active && meta.is_portrait) {
              id(immich_start_portrait_active).execute();
            } else if (!is_active && meta.is_portrait) {
              id(companion_target_slot) = slot;
              id(portrait_search_datetime) = meta.datetime;
              id(portrait_primary_asset_id) = meta.asset_id;
              id(immich_fetch_portrait_companion).execute();
            } else if (!is_active) {
              id(immich_prefetch_chain).execute();
            }
    on_error:
      then:
        - lambda: 'id(last_downloaded_slot) = 2;'
        - script.execute: handle_slot_download_error

  # --- Portrait pair half-width image components (640x1200 each) ---
  - id: immich_portrait_left
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 640x1200
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait_left_ready) = true;
            ESP_LOGI("immich", "Portrait left ready");
        - if:
            condition:
              lambda: 'return id(portrait_left_ready) && id(portrait_right_ready);'
            then:
              - script.execute: immich_display_portrait_pair
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait left decode failed, falling back to single");
            id(portrait_left_ready) = false;
            id(portrait_companion_found) = false;
            if (!id(active_slot_displayed)) {
              id(active_slot_displayed) = true;
              id(immich_display_current).execute();
            }

  - id: immich_portrait_right
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 640x1200
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait_right_ready) = true;
            ESP_LOGI("immich", "Portrait right ready");
        - if:
            condition:
              lambda: 'return id(portrait_left_ready) && id(portrait_right_ready);'
            then:
              - script.execute: immich_display_portrait_pair
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait right decode failed, falling back to single");
            id(portrait_right_ready) = false;
            id(portrait_companion_found) = false;
            if (!id(active_slot_displayed)) {
              id(active_slot_displayed) = true;
              id(immich_display_current).execute();
            }

  # --- Portrait preload components (downloaded during prefetch) ---
  - id: immich_portrait_preload_left
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 640x1200
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait_preload_left_ready) = true;
            ESP_LOGI("immich", "Portrait preload left ready (slot %d)", id(portrait_preload_slot));
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload left failed");
            id(portrait_preload_left_ready) = false;

  - id: immich_portrait_preload_right
    url: "https://via.placeholder.com/1x1.jpg"
    format: JPEG
    resize: 640x1200
    type: RGB565
    byte_order: little_endian
    request_headers:
      x-api-key: !lambda 'return id(immich_api_key_text).state;'
    on_download_finished:
      then:
        - lambda: |-
            id(portrait_preload_right_ready) = true;
            ESP_LOGI("immich", "Portrait preload right ready (slot %d)", id(portrait_preload_slot));
    on_error:
      then:
        - lambda: |-
            ESP_LOGE("immich", "Portrait preload right failed");
            id(portrait_preload_right_ready) = false;

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # ---------------------------------------------------------------------------
  # Shared handler for any slot's on_error
  # ---------------------------------------------------------------------------
  - id: handle_slot_download_error
    mode: single
    then:
      - lambda: |-
          id(immich_download_retries)++;
          ESP_LOGE("immich", "Slot %d decode failed (attempt %d)", id(last_downloaded_slot), id(immich_download_retries));
      - if:
          condition:
            lambda: 'return id(immich_download_retries) < MAX_ERROR_RETRIES;'
          then:
            - delay: 2s
            - script.execute: immich_prefetch_chain
          else:
            - lambda: 'id(immich_download_retries) = 0;'

  # ---------------------------------------------------------------------------
  # Start portrait pair download for the active slot
  # ---------------------------------------------------------------------------
  - id: immich_start_portrait_active
    mode: single
    then:
      - lambda: |-
          int s = id(active_slot);
          auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
          id(portrait_left_ready) = false;
          id(portrait_right_ready) = false;
          id(portrait_using_preload) = false;
          id(portrait_primary_asset_id) = meta.asset_id;
          if (!meta.companion_url.empty()) {
            id(portrait_companion_found) = true;
            id(portrait_companion_url) = meta.companion_url;
            ESP_LOGI("immich", "Portrait slot %d: companion URL known, starting both downloads", s);
          } else {
            id(portrait_companion_found) = false;
            id(portrait_companion_url) = "";
            id(portrait_search_datetime) = meta.datetime;
            id(companion_target_slot) = s;
            ESP_LOGI("immich", "Portrait slot %d: no companion, searching", s);
          }
      - online_image.set_url:
          id: immich_portrait_left
          url: !lambda |-
            int s = id(active_slot);
            auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
            return meta.image_url;
      - if:
          condition:
            lambda: 'return id(portrait_companion_found);'
          then:
            - online_image.set_url:
                id: immich_portrait_right
                url: !lambda 'return id(portrait_companion_url);'
          else:
            - script.execute: immich_fetch_portrait_companion

  # ---------------------------------------------------------------------------
  # Display whichever slot is active
  # ---------------------------------------------------------------------------
  - id: immich_display_current
    mode: single
    then:
      - lambda: |-
          lv_obj_clear_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          id(immich_is_portrait_pair) = false;

          int s = id(active_slot);
          esphome::image::Image *imgs[] = { id(immich_img_0), id(immich_img_1), id(immich_img_2) };
          lv_img_set_src(id(slideshow_img), imgs[s]->get_lv_img_dsc());

          auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
          lv_img_set_zoom(id(slideshow_img), meta.zoom);
      - script.execute: extract_accent_color
      - if:
          condition:
            lambda: |-
              int s = id(active_slot);
              auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
              return meta.is_portrait && id(portrait_preload_slot) == s
                     && id(portrait_preload_left_ready) && id(portrait_preload_right_ready);
          then:
            - lambda: |-
                id(immich_is_portrait_pair) = true;
                id(portrait_using_preload) = true;
                id(portrait_preload_slot) = -1;
                id(active_slot_displayed) = true;
                lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
                lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
                lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
                ESP_LOGI("immich", "Instant portrait pair from preload");
            - lvgl.image.update:
                id: portrait_left_img
                src: immich_portrait_preload_left
            - lvgl.image.update:
                id: portrait_right_img
                src: immich_portrait_preload_right
            - script.execute: extract_accent_color
      - if:
          condition:
            lambda: |-
              int s = id(active_slot);
              auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
              return meta.is_portrait && !id(immich_is_portrait_pair);
          then:
            - script.execute: immich_start_portrait_active

  # ---------------------------------------------------------------------------
  # Advance forward: move ring index, display if ready, else fetch fresh
  # ---------------------------------------------------------------------------
  - id: immich_advance_forward
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(active_slot_displayed);'
          then:
            - logger.log:
                level: WARN
                tag: immich
                format: "Active slot not displayed yet, skipping advance"
          else:
            - lambda: |-
                if (!id(current_display).asset_id.empty()) {
                  int s_old = id(active_slot);
                  auto &old_meta = (s_old == 0) ? id(slot0) : (s_old == 1) ? id(slot1) : id(slot2);
                  id(prev_display) = id(current_display);
                  id(prev_display).zoom = old_meta.zoom;
                  id(prev_display).valid = true;
                }
                id(portrait_left_ready) = false;
                id(portrait_right_ready) = false;
                id(portrait_companion_found) = false;
                id(immich_is_portrait_pair) = false;
                id(portrait_using_preload) = false;
                int old_slot_idx = id(active_slot);
                id(active_slot) = (old_slot_idx + 1) % 3;
                id(active_slot_displayed) = false;
                auto &cleared = (old_slot_idx == 0) ? id(slot0) : (old_slot_idx == 1) ? id(slot1) : id(slot2);
                cleared.ready = false;
                id(immich_last_advance_ms) = millis();
                ESP_LOGI("immich", "Advancing: slot %d -> %d", old_slot_idx, id(active_slot));
            - if:
                condition:
                  lambda: |-
                    int s = id(active_slot);
                    auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
                    return meta.ready;
                then:
                  - lambda: |-
                      int s = id(active_slot);
                      auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
                      copy_slot_to_display(meta, id(current_display));
                      if (!meta.is_portrait) id(active_slot_displayed) = true;
                      ESP_LOGI("immich", "Instant display slot %d: %s (portrait=%d)", s, id(current_display).asset_id.c_str(), meta.is_portrait);
                  - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          return !(((s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2)).is_portrait);
                      then:
                        - script.execute: immich_display_current
                        - script.execute: immich_prefetch_chain
                  - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
                          return meta.is_portrait && id(portrait_preload_slot) == s
                                 && id(portrait_preload_left_ready) && id(portrait_preload_right_ready);
                      then:
                        - script.execute: immich_display_current
                        - script.execute: immich_prefetch_chain
                  - if:
                      condition:
                        lambda: |-
                          int s = id(active_slot);
                          auto &meta = (s == 0) ? id(slot0) : (s == 1) ? id(slot1) : id(slot2);
                          return meta.is_portrait && !(id(portrait_preload_slot) == s
                                 && id(portrait_preload_left_ready) && id(portrait_preload_right_ready));
                      then:
                        - script.execute: immich_start_portrait_active
                        - script.execute: immich_prefetch_chain
                else:
                  - lambda: |-
                      id(target_slot) = id(active_slot);
                      ESP_LOGI("immich", "Slot %d not ready, fetching fresh", id(active_slot));
                  - script.execute: immich_fetch_into_slot

  # ---------------------------------------------------------------------------
  # Show previous image (swipe right)
  # ---------------------------------------------------------------------------
  - id: immich_show_previous
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(prev_display).valid;'
          then:
            - logger.log:
                level: INFO
                tag: immich
                format: "No previous image available"
          else:
            - lambda: |-
                int cur_s = id(active_slot);
                auto &cur_meta = (cur_s == 0) ? id(slot0) : (cur_s == 1) ? id(slot1) : id(slot2);
                DisplayMeta tmp = id(current_display);
                tmp.zoom = cur_meta.zoom;

                id(current_display) = id(prev_display);
                id(prev_display) = tmp;

                id(portrait_left_ready) = false;
                id(portrait_right_ready) = false;
                id(portrait_companion_found) = false;
                id(immich_is_portrait_pair) = false;
                id(portrait_using_preload) = false;

                int prev_slot = (id(active_slot) + 2) % 3;
                id(active_slot) = prev_slot;
                id(active_slot_displayed) = false;

                auto &meta = (prev_slot == 0) ? id(slot0) : (prev_slot == 1) ? id(slot1) : id(slot2);
                meta.ready = false;
                meta.is_portrait = false;
                meta.companion_url = "";
                meta.datetime = "";
                copy_display_to_slot(id(current_display), meta);
                meta.pending_asset_id = id(current_display).asset_id;

                std::string url = meta.image_url;
                if (prev_slot == 0) { id(immich_img_0).set_url(url); id(immich_img_0).update(); }
                else if (prev_slot == 1) { id(immich_img_1).set_url(url); id(immich_img_1).update(); }
                else { id(immich_img_2).set_url(url); id(immich_img_2).update(); }
                ESP_LOGI("immich", "Showing previous in slot %d: %s", prev_slot, id(current_display).asset_id.c_str());

  # ---------------------------------------------------------------------------
  # Display portrait pair (called when both left and right are ready)
  # ---------------------------------------------------------------------------
  - id: immich_display_portrait_pair
    mode: single
    then:
      - lambda: |-
          id(immich_is_portrait_pair) = true;
          id(active_slot_displayed) = true;
          lv_img_set_zoom(id(slideshow_img), ZOOM_IDENTITY);
          lv_obj_add_flag(id(slideshow_img), LV_OBJ_FLAG_HIDDEN);
          lv_obj_clear_flag(id(portrait_pair_container), LV_OBJ_FLAG_HIDDEN);
          ESP_LOGI("immich", "Displaying portrait pair");
      - lvgl.image.update:
          id: portrait_left_img
          src: immich_portrait_left
      - lvgl.image.update:
          id: portrait_right_img
          src: immich_portrait_right
      - script.execute: extract_accent_color
      - script.execute: immich_prefetch_chain

  # ---------------------------------------------------------------------------
  # Prefetch chain: fill the next empty slot(s) ahead of active_slot
  # ---------------------------------------------------------------------------
  - id: immich_prefetch_chain
    mode: single
    then:
      - lambda: |-
          int next1 = (id(active_slot) + 1) % 3;
          int next2 = (id(active_slot) + 2) % 3;
          auto &n1 = (next1 == 0) ? id(slot0) : (next1 == 1) ? id(slot1) : id(slot2);
          auto &n2 = (next2 == 0) ? id(slot0) : (next2 == 1) ? id(slot1) : id(slot2);
          if (!n1.ready) {
            id(target_slot) = next1;
            ESP_LOGI("immich", "Prefetch chain: filling slot %d (next)", next1);
            id(immich_fetch_into_slot).execute();
          } else if (!n2.ready) {
            id(target_slot) = next2;
            ESP_LOGI("immich", "Prefetch chain: filling slot %d (next-next)", next2);
            id(immich_fetch_into_slot).execute();
          } else {
            ESP_LOGI("immich", "Prefetch chain: all slots filled");
          }
