name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}

jobs:
  build-docs:
    name: Build Docs
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/.vitepress/dist/firmware
          gh release download --pattern 'manifest*.json' --dir docs/.vitepress/dist/firmware/ || echo "::warning::No firmware manifests found in latest release"
          gh release download --pattern '*.factory.bin' --dir docs/.vitepress/dist/firmware/ || echo "::warning::No factory binary found in latest release"
          gh release download --pattern '*.ota.bin' --dir docs/.vitepress/dist/firmware/ || echo "::warning::No OTA binary found in latest release"

      - name: Download firmware from latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BETA_TAG=$(gh release list --limit 20 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[0].tagName // empty')
          if [ -n "$BETA_TAG" ]; then
            mkdir -p docs/.vitepress/dist/firmware/beta
            gh release download "$BETA_TAG" \
              --pattern 'manifest*.json' \
              --dir docs/.vitepress/dist/firmware/beta/ || true
            gh release download "$BETA_TAG" \
              --pattern '*.ota.bin' \
              --dir docs/.vitepress/dist/firmware/beta/ || true
          fi

      - name: Remove stale Pages artifact from reruns
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_IDS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name == "'"${PAGES_ARTIFACT_NAME}"'") | .id')
          if [ -n "$EXISTING_IDS" ]; then
            while IFS= read -r ARTIFACT_ID; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}
            done <<< "$EXISTING_IDS"
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: docs/.vitepress/dist

  deploy-docs:
    name: Deploy Docs
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
