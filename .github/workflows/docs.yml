name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_run:
    workflows: ["Build Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-docs:
    name: Build & Deploy Docs
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Download firmware from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/.vitepress/dist/firmware
          gh release download --pattern 'manifest.json' --dir docs/.vitepress/dist/firmware/ || true
          gh release download --pattern '*.factory.bin' --dir docs/.vitepress/dist/firmware/ || true
          gh release download --pattern '*.ota.bin' --dir docs/.vitepress/dist/firmware/ || true

      - name: Download firmware from latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BETA_TAG=$(gh release list --limit 20 --json tagName,isPrerelease \
            -q '[.[] | select(.isPrerelease)] | .[0].tagName // empty')
          if [ -n "$BETA_TAG" ]; then
            mkdir -p docs/.vitepress/dist/firmware/beta
            gh release download "$BETA_TAG" \
              --pattern 'manifest.json' \
              --dir docs/.vitepress/dist/firmware/beta/ || true
            gh release download "$BETA_TAG" \
              --pattern '*.ota.bin' \
              --dir docs/.vitepress/dist/firmware/beta/ || true
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
