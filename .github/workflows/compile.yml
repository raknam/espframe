name: Compile Check

on:
  pull_request:
    paths:
      - "components/**"
      - "common/**"
      - "devices/guition-esp32-p4-jc8012p4a1/**"
      - "devices/guition-esp32-p4-jc1060p470/**"
      - "builds/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "tests/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Generated Files and Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated files
        run: npm run check:generated

      - name: Run helper unit tests
        run: npm run test:helpers

      - name: Build docs
        run: npm run docs:build

  compile:
    name: Compile Firmware
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Compile 10-inch P4 firmware
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.1
          compile /config/builds/guition-esp32-p4-jc8012p4a1.factory.yaml

      - name: Compile 7-inch P4 firmware
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.1
          compile /config/builds/guition-esp32-p4-jc1060p470.factory.yaml
