name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Compile 10-inch P4 firmware
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.0
          -s firmware_version "${VERSION}"
          compile /config/builds/guition-esp32-p4-jc8012p4a1.factory.yaml

      - name: Compile 7-inch P4 firmware
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.4.0
          -s firmware_version "${VERSION}"
          compile /config/builds/guition-esp32-p4-jc1060p470.factory.yaml

      - name: Collect firmware files and generate manifest
        id: firmware
        run: |
          BUILD_DIR_10="builds/.esphome/build/immich-frame-10inch/.pioenvs/immich-frame-10inch"
          BUILD_DIR_7="builds/.esphome/build/immich-frame-7inch/.pioenvs/immich-frame-7inch"
          mkdir -p output

          if [ ! -f "${BUILD_DIR_10}/firmware.factory.bin" ]; then
            echo "::error::10-inch firmware compilation failed — factory binary not found"
            exit 1
          fi
          if [ ! -f "${BUILD_DIR_7}/firmware.factory.bin" ]; then
            echo "::error::7-inch firmware compilation failed — factory binary not found"
            exit 1
          fi

          sudo cp "${BUILD_DIR_10}/firmware.factory.bin" output/immich-frame.factory.bin
          sudo cp "${BUILD_DIR_10}/firmware.bin" output/immich-frame.ota.bin
          sudo cp "${BUILD_DIR_7}/firmware.factory.bin" output/immich-frame-7inch.factory.bin
          sudo cp "${BUILD_DIR_7}/firmware.bin" output/immich-frame-7inch.ota.bin

          OTA_MD5_10=$(md5sum output/immich-frame.ota.bin | cut -d ' ' -f 1)
          OTA_MD5_7=$(md5sum output/immich-frame-7inch.ota.bin | cut -d ' ' -f 1)
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"

          cat > output/manifest.json << EOF
          {
            "name": "Immich Frame",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "builds": [
              {
                "chipFamily": "ESP32-P4",
                "parts": [
                  { "path": "immich-frame.factory.bin", "offset": 0 }
                ],
                "ota": {
                  "path": "immich-frame.ota.bin",
                  "md5": "${OTA_MD5_10}",
                  "release_url": "https://github.com/jtenniswood/espframe/releases/tag/${VERSION}"
                }
              }
            ]
          }
          EOF

          cat > output/manifest-7inch.json << EOF
          {
            "name": "Immich Frame 7-inch",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "builds": [
              {
                "chipFamily": "ESP32-P4",
                "parts": [
                  { "path": "immich-frame-7inch.factory.bin", "offset": 0 }
                ],
                "ota": {
                  "path": "immich-frame-7inch.ota.bin",
                  "md5": "${OTA_MD5_7}",
                  "release_url": "https://github.com/jtenniswood/espframe/releases/tag/${VERSION}"
                }
              }
            ]
          }
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: output/

      - name: Upload firmware to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          output/immich-frame.factory.bin
          output/immich-frame.ota.bin
          output/immich-frame-7inch.factory.bin
          output/immich-frame-7inch.ota.bin
          output/manifest.json
          output/manifest-7inch.json
          --clobber
