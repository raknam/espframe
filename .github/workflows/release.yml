name: Build & Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Build ESPHome firmware
        id: build
        uses: esphome/build-action@v7
        continue-on-error: true
        with:
          yaml-file: guition-esp32-p4-jc8012p4a1/factory.yaml

      - name: Verify build and generate manifest
        id: firmware
        run: |
          OUT_DIR=$(find . -maxdepth 2 -name "*.factory.bin" -not -path "./.esphome/*" -printf '%h\n' | head -1)
          if [ -z "$OUT_DIR" ]; then
            echo "::error::Firmware compilation failed"
            exit 1
          fi
          FACTORY_BIN=$(basename "$OUT_DIR"/*.factory.bin)
          echo "dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          cat > "$OUT_DIR/manifest.json" << MANIFEST
          {
            "name": "Immich Frame",
            "version": "${{ github.event.release.tag_name || github.ref_name }}",
            "home_assistant_domain": "esphome",
            "builds": [
              {
                "chipFamily": "ESP32-P4",
                "parts": [
                  { "path": "$FACTORY_BIN", "offset": 0 }
                ]
              }
            ]
          }
          MANIFEST

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.firmware.outputs.dir }}/

      - name: Upload firmware to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.firmware.outputs.dir }}/*.factory.bin
            ${{ steps.firmware.outputs.dir }}/manifest.json

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-firmware
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware/

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Copy firmware into docs output
        run: |
          mkdir -p docs/.vitepress/dist/firmware
          cp firmware/manifest.json docs/.vitepress/dist/firmware/
          cp firmware/*.factory.bin docs/.vitepress/dist/firmware/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
