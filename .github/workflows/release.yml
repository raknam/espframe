name: Build & Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-firmware:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Compile P4 firmware
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.2.4
          compile /config/guition-esp32-p4-jc8012p4a1/factory.yaml

      - name: Collect firmware files and generate manifest
        id: firmware
        run: |
          BUILD_DIR="guition-esp32-p4-jc8012p4a1/.esphome/build/immich-frame-10inch/.pioenvs/immich-frame-10inch"
          mkdir -p output

          if [ ! -f "${BUILD_DIR}/firmware.factory.bin" ]; then
            echo "::error::Firmware compilation failed — factory binary not found"
            exit 1
          fi

          sudo cp "${BUILD_DIR}/firmware.factory.bin" output/immich-frame.factory.bin

          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          cat > output/manifest.json << EOF
          {
            "name": "Immich Frame",
            "version": "${VERSION}",
            "home_assistant_domain": "esphome",
            "builds": [
              {
                "chipFamily": "ESP32-P4",
                "parts": [
                  { "path": "immich-frame.factory.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware
          path: output/

      - name: Upload firmware to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "${{ github.event.release.tag_name }}"
          output/immich-frame.factory.bin
          output/manifest.json
          --clobber

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-firmware
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download firmware artifact
        uses: actions/download-artifact@v7
        with:
          name: firmware
          path: firmware/

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Copy firmware into docs output
        run: |
          mkdir -p docs/.vitepress/dist/firmware
          cp firmware/manifest.json docs/.vitepress/dist/firmware/
          cp firmware/*.factory.bin docs/.vitepress/dist/firmware/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
