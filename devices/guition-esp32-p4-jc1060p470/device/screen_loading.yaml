# =============================================================================
# SCREEN: LOADING
# =============================================================================
# Boot screen with progress bar. Must be the first page included in
# packages.yaml so LVGL shows it at startup. on_boot advances the bar and
# status text. If saved WiFi exists it stays on this page while connecting;
# otherwise it switches to wifi_setup_page.
# =============================================================================

# -----------------------------------------------------------------------------
# Boot grace period (delay before showing WiFi setup on disconnect)
# -----------------------------------------------------------------------------
globals:
  - id: boot_grace_period
    type: bool
    initial_value: 'true'

# -----------------------------------------------------------------------------
# Loading page: title, status label, progress bar
# -----------------------------------------------------------------------------
lvgl:
  pages:
    - id: loading_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        - image:
            src: lvgl_rgb565a8_support_marker
            hidden: true
        - obj:
            align: center
            width: 700
            height: SIZE_CONTENT
            bg_opa: 0%
            border_width: 0
            pad_all: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: center
              flex_align_cross: center
              pad_row: 40
            widgets:
              - label:
                  id: loading_title_label
                  text: "Starting up"
                  text_font: roboto_light46_font
                  text_color: 0xFFFFFF
                  width: 700
                  text_align: center
              - label:
                  id: loading_status_label
                  text: "Booting"
                  text_font: roboto_light32_font
                  text_color: 0x888888
                  width: 700
                  text_align: center
              - bar:
                  id: loading_progress_bar
                  width: 75
                  height: 4
                  bg_color: 0x333333
                  bg_opa: 100%
                  radius: 3
                  min_value: 0
                  max_value: 100
                  value: 0
                  indicator:
                    bg_color: 0xFFFFFF
                    radius: 3
    - id: screen_off_page
      bg_color: 0x000000
      scrollable: false

# -----------------------------------------------------------------------------
# Boot sequence: progress steps, backlight on, then show WiFi setup if not connected
# -----------------------------------------------------------------------------
esphome:
  on_boot:
    - priority: -200
      then:
        - lambda: |-
            lv_bar_set_value(id(loading_progress_bar), 25, LV_ANIM_OFF);
            lv_label_set_text(id(loading_status_label), "Initializing display");
        - delay: 100ms
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !id(sntp_time).now().is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - light.turn_on:
                  id: backlight
                  brightness: 90%
                  transition_length: 500ms
    - priority: -100
      then:
        - lambda: |-
            lv_bar_set_value(id(loading_progress_bar), 50, LV_ANIM_OFF);
            lv_label_set_text(id(loading_title_label), "Starting up");
            lv_label_set_text(id(loading_status_label), "Connecting to WiFi");
        - if:
            condition:
              lambda: 'return wifi::global_wifi_component != nullptr && wifi::global_wifi_component->has_sta();'
            then:
              - if:
                  condition:
                    wifi.connected:
                  then:
                    - lambda: 'id(boot_grace_period) = false;'
                  else:
                    - globals.set:
                        id: wifi_setup_connect_timeout_expired
                        value: 'false'
                    - script.execute: wifi_connecting_before_setup
                    - delay: 15s
                    - lambda: 'id(boot_grace_period) = false;'
            else:
              - lambda: 'id(boot_grace_period) = false;'
              - script.execute: show_wifi_setup_page
