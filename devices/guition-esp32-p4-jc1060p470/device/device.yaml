# =============================================================================
# HARDWARE CONFIGURATION - Guition ESP32-P4-JC1060P470
# =============================================================================
# Base device config: ESP32-P4 host, ESP32-C6 coprocessor (WiFi/BT over SDIO),
# PSRAM, display (MIPI DSI JC1060P470), touch (GT911), backlight, I2C. Also
# API, logger, web server, OTA, and espframe external components. Display is
# 1024x600 landscape; OTA dims backlight before apply.
# =============================================================================

# -----------------------------------------------------------------------------
# Build and log
# -----------------------------------------------------------------------------
substitutions:
  package_ref: "main"
  log_level: "INFO"

esp32:
  variant: ESP32P4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_HTTPD_MAX_URI_LEN: "128"
      CONFIG_LV_USE_MATRIX: "y"
      CONFIG_LV_DRAW_TRANSFORM_USE_MATRIX: "y"
    advanced:
      enable_idf_experimental_features: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"

# -----------------------------------------------------------------------------
# ESP32-C6 coprocessor (WiFi and Bluetooth via SDIO)
# -----------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# -----------------------------------------------------------------------------
# PSRAM (hex mode, 200 MHz)
# -----------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# -----------------------------------------------------------------------------
# API, logger, JSON, web server, OTA, debug (reset reason for crash diagnosis)
# -----------------------------------------------------------------------------
api:
  reboot_timeout: 0s

logger:
  level: ${log_level}
  logs:
    component: WARN
    remote_image: WARN
    immich: INFO
    warm: WARN
    accent: WARN

debug:
  update_interval: 60s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"

json:

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: "https://jtenniswood.github.io/espframe/webserver/app.js"
  sorting_groups:
    - id: sg_connection
      name: "Connection"
      sorting_weight: 10
    - id: sg_photos
      name: "Photos"
      sorting_weight: 20
    - id: sg_screen
      name: "Screen"
      sorting_weight: 30
    - id: sg_clock
      name: "Clock"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40

ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off:
            id: backlight
            transition_length: 300ms
        - delay: 350ms

# -----------------------------------------------------------------------------
# External components (espframe: remote_image, espframe)
# -----------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: https://github.com/jtenniswood/espframe
      ref: ${package_ref}
      path: components
    components: [remote_image, espframe]
    refresh: 0s

espframe:

# -----------------------------------------------------------------------------
# DSI PHY power rail, backlight output, I2C
# -----------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

# -----------------------------------------------------------------------------
# MIPI DSI display (JC1060P470, 1024x600)
# -----------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    model: JC1060P470
    id: tft_display
    reset_pin: GPIO5
    auto_clear_enabled: false
    update_interval: never
    color_order: RGB
    pclk_frequency: 51.2MHz
    hsync_pulse_width: 24
    hsync_back_porch: 136
    hsync_front_porch: 160
    vsync_pulse_width: 2
    vsync_back_porch: 21
    vsync_front_porch: 12
    dimensions:
      width: 1024
      height: 600

interval:
  - interval: 2s
    then:
      - lambda: |-
          const int32_t physical_width = 1024;
          const int32_t physical_height = 600;
          const int32_t width_compensation_scale = 244;  // 244/256 ~= 0.954
          const int32_t virtual_width = (physical_width * 256 + width_compensation_scale / 2) / width_compensation_scale;  // 1074

          auto apply_page_compensation = [&](lv_obj_t *page) {
            lv_obj_set_pos(page, 0, 0);
            lv_obj_set_size(page, physical_width, physical_height);
            lv_obj_set_style_transform_pivot_x(page, physical_width / 2, LV_PART_MAIN);
            lv_obj_set_style_transform_scale_x(page, width_compensation_scale, LV_PART_MAIN);
            lv_obj_invalidate(page);
          };

          auto apply_layer_compensation = [&](lv_obj_t *page, lv_obj_t *layer) {
            lv_obj_set_pos(page, 0, 0);
            lv_obj_set_size(page, virtual_width, physical_height);
            lv_obj_set_style_transform_scale_x(page, 256, LV_PART_MAIN);

            lv_obj_set_pos(layer, 0, 0);
            lv_obj_set_size(layer, virtual_width, physical_height);
            lv_obj_clear_flag(layer, LV_OBJ_FLAG_SCROLLABLE);
            lv_obj_set_style_bg_color(layer, lv_color_hex(0x000000), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(layer, LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_transform_pivot_x(layer, 0, LV_PART_MAIN);
            lv_obj_set_style_transform_scale_x(layer, width_compensation_scale, LV_PART_MAIN);
            lv_obj_invalidate(page);
          };

          apply_page_compensation(id(loading_page)->obj);
          apply_page_compensation(id(wifi_setup_page)->obj);
          apply_page_compensation(id(immich_setup_page)->obj);
          apply_layer_compensation(id(slideshow_page)->obj, id(slideshow_compensation_layer));

# -----------------------------------------------------------------------------
# Touch (GT911 capacitive)
# -----------------------------------------------------------------------------
touchscreen:
  - platform: gt911
    id: tft_touch
    i2c_id: i2c_bus_a
    reset_pin: GPIO22
    interrupt_pin: GPIO21
