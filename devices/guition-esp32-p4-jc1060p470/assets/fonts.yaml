    ΆΈΉΊΌΎΏΐΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩΪΫάέήίΰαβγδεζηθικλμνξοπρςστυφχψωϊϋόύώЁЂЃЄЅІЇЈЉЊЋЌЍЎЏАБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдежзийклмнопрстуфхцчшщъыьэюяёђѓєѕіїјљњћќѝўџҐґƠơƯưẠạẢảẤấẦầẨẩẪẫẬậẮắẰằẲẳẴẵẶặẸẹẺẻẼẽẾếỀềỂểỄễỆệỈỉỊịỌọỎỏỐốỒồỔổỖỗỘộỚớỜờỞởỠỡỢợỤụỦủỨứỪừỬửỮữỰựỲỳỴỵỶỷỸỹ

# -----------------------------------------------------------------------------
# Clock and numeric (minimal glyph set for lower memory)
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto@Light"
    id: roboto_light150_font
    size: 150
    bpp: 4
    glyphs: " 0123456789:"

# -----------------------------------------------------------------------------
# UI and setup text (full Latin + extended glyphs)
# -----------------------------------------------------------------------------
  - file: "gfonts://Roboto@Light"
    id: roboto_light46_font
    size: 46
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Roboto"
    id: roboto30_font
    size: 30
    bpp: 4
    glyphs: "${latin_extended_glyphs}"

  - file: "gfonts://Roboto@Light"
    id: roboto_light32_font
    size: 32
    bpp: 4
    glyphs: "${latin_extended_glyphs}${greek_cyrillic_vietnamese_glyphs}"
