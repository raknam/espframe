# =============================================================================
# CONNECTION FAILED DIM TIMER
# =============================================================================
# Dims the backlight after 120s of showing the connection failed overlay to
# prevent burn-in from the static message. Touch restores brightness.
# =============================================================================

script:
  - id: slideshow_on_press
    mode: single
    then:
      - lambda: |-
          id(touch_started_while_off) = !id(backlight).current_values.is_on();
          if (id(touch_started_while_off)) id(backlight_wake).execute();
          else id(backlight_hold_timer).execute();

  - id: slideshow_on_release
    mode: single
    then:
      - script.stop: backlight_hold_timer
      - if:
          condition:
            lambda: |-
              return !id(touch_started_while_off) && !id(backlight_paused) && !id(photo_details_open);
          then:
            - script.execute: open_photo_details

  - id: hide_connection_failed
    mode: single
    then:
      - lambda: |-
          if (!lv_obj_has_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN)) {
            id(connection_failed_dim).stop();
            id(connection_failed_shift).stop();
            lv_obj_align(id(connection_failed_content), LV_ALIGN_CENTER, 0, 0);
            id(backlight_apply_brightness).execute();
          }
          lv_obj_add_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN);
          id(last_photo_displayed_ms) = millis();
          id(immich_last_http_status) = 0;

  - id: connection_failed_dim
    mode: restart
    then:
      - delay: 120s
      - if:
          condition:
            lambda: 'return !id(backlight_paused);'
          then:
            - light.turn_on:
                id: backlight
                brightness: 50%
                transition_length: 2s

  - id: connection_failed_shift
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return !id(backlight_paused);'
          then:
            - delay: 30s
            - lambda: |-
                int x = ((int)(esp_random() % 61)) - 30;
                int y = ((int)(esp_random() % 41)) - 20;
                lv_obj_align(id(connection_failed_content), LV_ALIGN_CENTER, x, y);

# =============================================================================
# CACHED INTERVAL VALUES (avoid repeated string parsing every 2s)
# =============================================================================

globals:
  - id: slideshow_interval_sec
    type: uint32_t
    initial_value: '120'
  - id: connection_timeout_sec
    type: uint32_t
    initial_value: '120'

# =============================================================================
# USER-CONFIGURABLE SETTINGS
# =============================================================================

select:
  - platform: template
    name: "Photos: Slideshow Interval"
    id: slideshow_interval
    options:
      - "10 seconds"
      - "15 seconds"
      - "20 seconds"
      - "30 seconds"
      - "45 seconds"
      - "1 minute"
      - "2 minutes"
      - "3 minutes"
      - "5 minutes"
      - "10 minutes"
    initial_option: ${immich_slide_interval}
    optimistic: true
    restore_value: true
    icon: "mdi:timer-outline"
    on_value:
      then:
        - lambda: |-
            int num = atoi(x.c_str());
            id(slideshow_interval_sec) = (x.find("minute") != std::string::npos) ? num * 60 : num;
    web_server:
      sorting_group_id: sg_photos

  - platform: template
    name: "Screen: Connection Timeout"
    id: connection_timeout
    options:
      - "30 seconds"
      - "45 seconds"
      - "1 minute"
      - "2 minutes"
      - "3 minutes"
      - "5 minutes"
      - "10 minutes"
      - "15 minutes"
      - "20 minutes"
      - "30 minutes"
    initial_option: "2 minutes"
    optimistic: true
    restore_value: true
    icon: "mdi:connection"
    on_value:
      then:
        - lambda: |-
            int num = atoi(x.c_str());
            id(connection_timeout_sec) = (x.find("minute") != std::string::npos) ? num * 60 : num;
    web_server:
      sorting_group_id: sg_screen


# =============================================================================
# SLIDESHOW TIMER
# =============================================================================

interval:
  - interval: ${slideshow_check_interval}
    then:
      - if:
          condition:
            lambda: |-
              if (!id(immich_fetch_started)) return false;
              if (id(backlight_paused)) return false;
              if (id(photo_details_open)) return false;
              return (millis() - id(immich_last_advance_ms)) >= (id(slideshow_interval_sec) * 1000);
          then:
            - script.execute: immich_advance_forward
      - if:
          condition:
            lambda: |-
              if (!id(immich_fetch_started)) return false;
              if (id(backlight_paused)) return false;
              if (id(photo_details_open)) return false;
              bool any_inflight = id(slot_flags).fetch_in_flight[0] || id(slot_flags).fetch_in_flight[1] || id(slot_flags).fetch_in_flight[2];
              if (any_inflight || id(portrait).workflow_busy || id(noncritical_remote_updates_in_flight) > 0) return false;
              int next1 = (id(active_slot) + 1) % 3;
              int next2 = (id(active_slot) + 2) % 3;
              auto &n1 = get_slot(next1, id(slot0), id(slot1), id(slot2));
              auto &n2 = get_slot(next2, id(slot0), id(slot1), id(slot2));
              return !n1.ready || !n2.ready;
          then:
            - script.execute: immich_prefetch_chain
      - if:
          condition:
            lambda: |-
              if (id(last_photo_displayed_ms) == 0) return false;
              if (id(backlight_paused)) return false;
              if (id(photo_details_open)) return false;
              return (millis() - id(last_photo_displayed_ms)) >= (id(connection_timeout_sec) * 1000);
          then:
            - lambda: |-
                if (lv_obj_has_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN)) {
                  ESP_LOGE("immich", "No photo displayed for %s, showing connection failed screen", id(connection_timeout).current_option().c_str());
                  if (id(immich_last_http_status) == 401) {
                    lv_label_set_text(id(connection_failed_title), "Invalid API Key");
                    lv_label_set_text(id(connection_failed_subtitle), "Check your Immich API key in\nthe espframe settings.");
                  } else {
                    lv_label_set_text(id(connection_failed_title), "Unable to connect to Immich");
                    lv_label_set_text(id(connection_failed_subtitle), "Check your internet connection and\nthe health of your Immich server.");
                  }
                }
                lv_obj_clear_flag(id(connection_failed_overlay), LV_OBJ_FLAG_HIDDEN);
                id(immich_download_retries) = 0;
            - script.execute: connection_failed_dim
            - script.execute: connection_failed_shift
            - lambda: |-
                if (!id(slot_flags).fetch_in_flight[id(active_slot)]) {
                  id(target_slot) = id(active_slot);
                  id(immich_fetch_into_slot).execute();
                }
