# =============================================================================
# FACTORY FIRMWARE - Guition ESP32-P4 JC1060P470
# =============================================================================
# Secrets-free config for the ESPHome web installer. Boots into AP mode
# for WiFi setup via captive portal.
#
# Compiled by CI (see .github/workflows/release.yml) — not used locally.
# For local development, see devices/guition-esp32-p4-jc1060p470/esphome.yaml.
# =============================================================================

substitutions:
  name: "immich-frame-7inch"
  friendly_name: "Immich Frame 7inch"
  firmware_version: "0.0.0"

packages:
  espframe: !include ../devices/guition-esp32-p4-jc1060p470/packages.yaml

external_components:
  - source:
      type: local
      path: ../components
    components: [remote_image, espframe]

web_server:
  port: 80
  version: 3
  js_url: ""
  css_include: "../docs/public/webserver/style.css"
  js_include: "../docs/public/webserver/app.js"
