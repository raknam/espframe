# Compiled by CI (see .github/workflows/release.yml) — not used locally.
# For local development, see guition-esp32-p4-jc8012p4a1/esphome.yaml.
# =============================================================================

substitutions:
  name: "immich-frame-10inch"
  friendly_name: "Immich Frame 10inch"
  firmware_version: "0.0.0"

packages:
  espframe: !include ../guition-esp32-p4-jc8012p4a1/packages.yaml

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/app.js"
